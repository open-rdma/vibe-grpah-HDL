      \        pendingDmaCntrlReqQ.clear;\n        pendingDmaReadReqQ.clear;\n\n        cancelReg[1]       <= False;\n        gracefulStopReg[1] <= False;\n    endrule\n\n    // rule debugNotFull if (!(\n\
      \    //     reqQ.notFull                &&\n    //     respQ.notFull               &&\n    //     pendingDmaCntrlReqQ.notFull &&\n    //     pendingDmaReadReqQ.notFull\n    //     // firstDmaReqChunkQ.notFull\
