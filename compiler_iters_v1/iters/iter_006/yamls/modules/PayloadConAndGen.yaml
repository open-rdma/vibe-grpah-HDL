      \ Bool isIdle() = gracefulStopReg[0];\n    endinterface;\nendmodule\n\ninterface DmaWriteCntrl;\n    interface DmaWriteSrv srvPort;\n    interface DmaCntrl dmaCntrl;\nendinterface\n\nmodule mkDmaWriteCntrl#(\n\
