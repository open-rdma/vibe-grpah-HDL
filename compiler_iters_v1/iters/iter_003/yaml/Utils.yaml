  args: WorkReqOpCode opcode
  bsv_equivalent: "function Bool isReadOrAtomicWorkReq(WorkReqOpCode opcode);\n  \
    \  return case (opcode)\n        IBV_WR_RDMA_READ,\n        IBV_WR_ATOMIC_CMP_AND_SWP,\n\
    \        IBV_WR_ATOMIC_FETCH_AND_ADD: True;\n        default: False;\n    endcase;\n\
    endfunction"
- name: workReqNeedRecvReq
  return_type: Bool
  args: WorkReqOpCode opcode
  bsv_equivalent: "function Bool workReqNeedRecvReq(WorkReqOpCode opcode);\n    return\
    \ case (opcode)\n        IBV_WR_SEND               ,\n        IBV_WR_SEND_WITH_IMM\
    \      ,\n        IBV_WR_SEND_WITH_INV      ,\n        IBV_WR_RDMA_WRITE_WITH_IMM:\
    \ True;\n        default                   : False;\n    endcase;\nendfunction"
- name: workReqHasImmDt
  return_type: Bool
  args: WorkReqOpCode opcode
  bsv_equivalent: "function Bool workReqHasImmDt(WorkReqOpCode opcode);\n    return\
    \ case (opcode)\n        IBV_WR_RDMA_WRITE_WITH_IMM,\n        IBV_WR_SEND_WITH_IMM:\
    \ True;\n        default: False;\n    endcase;\nendfunction"
- name: workReqHasInv
  return_type: Bool
  args: WorkReqOpCode opcode
  bsv_equivalent: "function Bool workReqHasInv(WorkReqOpCode opcode);\n    return\
    \ opcode == IBV_WR_SEND_WITH_INV;\nendfunction"
