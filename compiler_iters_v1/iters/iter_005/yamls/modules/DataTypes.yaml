      \ TLB_PAYLOAD_WIDTH;\n\ntypedef UInt#(MR_INDEX_WIDTH) IndexMR;\ntypedef Bit#(MR_KEY_PART_WIDTH) KeyPartMR;\n\n// Common types\n\ntypedef Server#(DmaReadReq, DmaReadResp)   DmaReadSrv;\ntypedef Server#(DmaWriteReq,\
      \ DmaWriteResp) DmaWriteSrv;\ntypedef Client#(DmaReadReq, DmaReadResp)   DmaReadClt;\ntypedef Client#(DmaWriteReq, DmaWriteResp) DmaWriteClt;\n\ntypedef Server#(PermCheckReq, Bool) PermCheckSrv;\n\
      typedef Client#(PermCheckReq, Bool) PermCheckClt;\n\ninterface RdmaPktMetaDataAndPayloadPipeOut;\n    interface PipeOut#(RdmaPktMetaData) pktMetaData;\n    interface DataStreamPipeOut payload;\nendinterface\n\
      \n// RDMA related requests and responses\n\ntypedef enum {\n    RDMA_RESP_NORMAL,\n    RDMA_RESP_RETRY,\n    RDMA_RESP_ERROR,\n    RDMA_RESP_UNKNOWN\n} RdmaRespType deriving(Bits, Eq, FShow);\n\n\
      typedef enum {\n    RETRY_REASON_NOT_RETRY,\n    RETRY_REASON_RNR,\n    RETRY_REASON_SEQ_ERR,\n    RETRY_REASON_IMPLICIT,\n    RETRY_REASON_TIMEOUT\n} RetryReason deriving(Bits, Eq, FShow);\n\n//\
      \ DATA and ByteEn are left aligned\ntypedef struct {\n    DATA data;\n    ByteEn byteEn;\n    Bool isFirst;\n    Bool isLast;\n} DataStream deriving(Bits, Bounded, Eq, FShow);\n\ntypedef struct {\n\
      \    HeaderByteNum headerLen;\n    HeaderFragNum headerFragNum;\n    ByteEnBitNum lastFragValidByteNum;\n    Bool hasPayload;\n    Bool isEmptyHeader;\n} HeaderMetaData deriving(Bits, Bounded, Eq);\n\
      \ninstance FShow#(HeaderMetaData);\n    function Fmt fshow(HeaderMetaData hmd);\n        return $format(\n            \"HeaderMetaData { headerLen=%0d, headerFragNum=%0d, lastFragValidByteNum=%0d,\
