      \ Bool isSQ)(AddrChunkSrv);\n    FIFOF#(AddrChunkReq)   reqQ <- mkFIFOF;\n    FIFOF#(AddrChunkResp) respQ <- mkFIFOF;\n\n    Reg#(PktLen)   fullPktLenReg <- mkRegU;\n    Reg#(ResiduePMTU) residueReg\
