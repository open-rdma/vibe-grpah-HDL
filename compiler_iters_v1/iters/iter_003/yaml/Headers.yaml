    value: "Bit#(KEY_WIDTH)"
  - name: QKEY
    description: Queue Key type (alias for KEY_WIDTH)
    value: "Bit#(KEY_WIDTH)"
  - name: IMM
    description: Immediate data type
    value: "Bit#(IMM_WIDTH)"

