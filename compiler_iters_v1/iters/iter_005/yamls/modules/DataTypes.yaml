      \ deriving(Bits, Eq, FShow);\n\ninstance Flags#(WorkCompFlags);\n    function Bool isOneHotOrZero(WorkCompFlags inputVal) = 1 >= countOnes(pack(inputVal));\nendinstance\n\ntypedef struct {\n    WorkReqID\
