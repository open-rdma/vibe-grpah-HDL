    endfunction"
- name: unknown
  bsv_equivalent: "function Maybe#(WorkCompStatus) pktStatus2WorkCompStatusSQ(\n \
    \   PktVeriStatus pktStatus\n);\n    return case (pktStatus)\n        PKT_ST_VALID\
    \  : tagged Valid IBV_WC_SUCCESS;\n        PKT_ST_LEN_ERR: tagged Valid IBV_WC_LOC_LEN_ERR;\n\
    \        // PKT_ST_QP_ACC_ERR: tagged Valid IBV_WC_LOC_ACCESS_ERR;\n        default\
    \       : tagged Invalid;\n    endcase;\nendfunction"
- name: workReqOpCode2WorkCompOpCode4SQ
  return_type: Maybe#(WorkCompOpCode)
  args: WorkReqOpCode wrOpCode
  bsv_equivalent: "function Maybe#(WorkCompOpCode) workReqOpCode2WorkCompOpCode4SQ(WorkReqOpCode\
    \ wrOpCode);\n    return case (wrOpCode)\n        IBV_WR_RDMA_WRITE          :\
    \ tagged Valid IBV_WC_RDMA_WRITE;\n        IBV_WR_RDMA_WRITE_WITH_IMM : tagged\
    \ Valid IBV_WC_RDMA_WRITE;\n        IBV_WR_SEND                : tagged Valid\
    \ IBV_WC_SEND;\n        IBV_WR_SEND_WITH_IMM       : tagged Valid IBV_WC_SEND;\n\
    \        IBV_WR_RDMA_READ           : tagged Valid IBV_WC_RDMA_READ;\n       \
    \ IBV_WR_ATOMIC_CMP_AND_SWP  : tagged Valid IBV_WC_COMP_SWAP;\n        IBV_WR_ATOMIC_FETCH_AND_ADD:\
    \ tagged Valid IBV_WC_FETCH_ADD;\n        IBV_WR_LOCAL_INV           : tagged\
    \ Valid IBV_WC_LOCAL_INV;\n        IBV_WR_BIND_MW             : tagged Valid IBV_WC_BIND_MW;\n\
    \        IBV_WR_SEND_WITH_INV       : tagged Valid IBV_WC_SEND;\n        IBV_WR_TSO\
    \                 : tagged Valid IBV_WC_TSO;\n        // IBV_WR_DRIVER1      \
    \       : tagged Valid IBV_WC_DRIVER1;\n        default                    : tagged\
    \ Invalid;\n    endcase;\nendfunction"
- name: genErrWorkCompStatusFromAethSQ
  return_type: Maybe#(WorkCompStatus)
  args: AETH aeth
  bsv_equivalent: "function Maybe#(WorkCompStatus) genErrWorkCompStatusFromAethSQ(AETH\
    \ aeth);\n    case (aeth.code)\n        // AETH_CODE_ACK: return tagged Valid\
    \ IBV_WC_SUCCESS;\n        // AETH_CODE_RNR: return tagged Valid IBV_WC_RNR_RETRY_EXC_ERR;\n\
    \        AETH_CODE_NAK: return case (aeth.value)\n            // zeroExtend(pack(AETH_NAK_SEQ_ERR)):\
    \ tagged Valid IBV_WC_RETRY_EXC_ERR;\n            zeroExtend(pack(AETH_NAK_INV_REQ)):\
    \ tagged Valid IBV_WC_REM_INV_REQ_ERR;\n            zeroExtend(pack(AETH_NAK_RMT_ACC)):\
    \ tagged Valid IBV_WC_REM_ACCESS_ERR;\n            zeroExtend(pack(AETH_NAK_RMT_OP))\
    \ : tagged Valid IBV_WC_REM_OP_ERR;\n            zeroExtend(pack(AETH_NAK_INV_RD))\
    \ : tagged Valid IBV_WC_REM_INV_RD_REQ_ERR;\n            default             \
    \              : tagged Invalid;\n        endcase;\n        // AETH_CODE_RSVD\n\
    \        default: return tagged Invalid;\n    endcase\nendfunction"
- name: rdmaOpCode2WorkCompOpCode4RQ
  return_type: Maybe#(WorkCompOpCode)
  args: RdmaOpCode opcode
  bsv_equivalent: "function Maybe#(WorkCompOpCode) rdmaOpCode2WorkCompOpCode4RQ(RdmaOpCode\
    \ opcode);\n    return case (opcode)\n        SEND_FIRST                    ,\n\
    \        SEND_MIDDLE                   ,\n        SEND_LAST                  \
    \   ,\n        SEND_LAST_WITH_IMMEDIATE      ,\n        SEND_ONLY            \
    \         ,\n        SEND_ONLY_WITH_IMMEDIATE      ,\n        SEND_LAST_WITH_INVALIDATE\
    \     ,\n        SEND_ONLY_WITH_INVALIDATE     : tagged Valid IBV_WC_RECV;\n\n\
    \        RDMA_WRITE_LAST_WITH_IMMEDIATE,\n        RDMA_WRITE_ONLY_WITH_IMMEDIATE:\
    \ tagged Valid IBV_WC_RECV_RDMA_WITH_IMM;\n\n        default                 \
    \      : tagged Invalid;\n    endcase;\nendfunction"
- name: rdmaOpCode2WorkCompFlagsRQ
  return_type: WorkCompFlags
  args: RdmaOpCode opcode
  bsv_equivalent: "function WorkCompFlags rdmaOpCode2WorkCompFlagsRQ(RdmaOpCode opcode);\n\
    \    return case (opcode)\n        SEND_FIRST                    ,\n        SEND_MIDDLE\
    \                   ,\n        SEND_LAST                     ,\n        SEND_ONLY\
    \                     : IBV_WC_NO_FLAGS;\n\n        SEND_LAST_WITH_IMMEDIATE \
    \     ,\n        SEND_ONLY_WITH_IMMEDIATE      ,\n        RDMA_WRITE_LAST_WITH_IMMEDIATE,\n\
    \        RDMA_WRITE_ONLY_WITH_IMMEDIATE: IBV_WC_WITH_IMM;\n\n        SEND_LAST_WITH_INVALIDATE\
    \     ,\n        SEND_ONLY_WITH_INVALIDATE     : IBV_WC_WITH_INV;\n\n        default\
    \                       : IBV_WC_NO_FLAGS;\n    endcase;\nendfunction"
- name: unknown
  bsv_equivalent: "function PipeOut#(anytype) muxPipeOut(\n    Bool sel, PipeOut#(anytype)\
    \ pipeIn1, PipeOut#(anytype) pipeIn2\n);\n    PipeOut#(anytype) resultPipeOut\
    \ = interface PipeOut;\n        method anytype first();\n            return sel\
    \ ? pipeIn1.first : pipeIn2.first;\n        endmethod\n\n        method Action\
    \ deq();\n            if (sel) begin\n                pipeIn1.deq;\n         \
    \   end\n            else begin\n                pipeIn2.deq;\n            end\n\
    \        endmethod\n\n        method Bool notEmpty();\n            return sel\
    \ ? pipeIn1.notEmpty : pipeIn2.notEmpty;\n        endmethod\n    endinterface;\n\
    \n    return resultPipeOut;\nendfunction"
- name: unknown
  bsv_equivalent: "function Tuple2#(PipeOut#(anytype), PipeOut#(anytype)) deMuxPipeOut(\n\
    \    Bool sel, PipeOut#(anytype) pipeIn\n);\n    PipeOut#(anytype) p1 = interface\
    \ PipeOut;\n        method anytype first() if (sel);\n            return pipeIn.first;\n\
    \        endmethod\n        method Action deq() if (sel);\n            pipeIn.deq;\n\
    \        endmethod\n        method Bool notEmpty() if (sel);\n            return\
    \ pipeIn.notEmpty;\n        endmethod\n    endinterface;\n\n    PipeOut#(anytype)\
    \ p2 = interface PipeOut;\n        method anytype first() if (!sel);\n       \
    \     return pipeIn.first;\n        endmethod\n        method Action deq() if\
    \ (!sel);\n            pipeIn.deq;\n        endmethod\n        method Bool notEmpty()\
    \ if (!sel);\n            return pipeIn.notEmpty;\n        endmethod\n    endinterface;\n\
    \n    return tuple2(p1, p2);\nendfunction"
- name: unknown
  bsv_equivalent: "function Rules genEmptyPipeOutRule(\n    PipeOut#(anytype) inputPipeOut,\
    \ String assertMsg\n);\n    return (\n        rules\n            rule checkEmptyPipeIn;\n\
    \                immAssert(\n                    !inputPipeOut.notEmpty,\n   \
    \                 assertMsg,\n                    $format(\n                 \
    \       \"inputPipeOut.notEmpty=\",\n                        fshow(inputPipeOut.notEmpty),\n\
    \                        \" should be empty\"\n                    )\n       \
    \         );\n            endrule\n        endrules\n    );\nendfunction"
- name: unknown
  bsv_equivalent: "function ActionValue#(PayloadConReq) genDiscardPayloadReq(\n  \
    \  PktFragNum fragNum,\n    DmaReqSrcType initiator,\n    QPN sqpn,\n    ADDR\
    \ startAddr,\n    PktLen len,\n    PSN psn\n);\n    actionvalue\n        immAssert(\n\
    \            !isZero(fragNum),\n            \"fragNum non-zero assertion @ genDiscardPayloadReq()\"\
    ,\n            $format(\"fragNum=%0d\", fragNum, \" should be non-zero\")\n  \
    \      );\n        let discardReq = PayloadConReq {\n            fragNum    :\
    \ fragNum,\n            consumeInfo: tagged DiscardPayloadInfo DmaWriteMetaData\
    \ {\n                initiator: initiator,\n                sqpn     : sqpn,\n\
    \                startAddr: startAddr,\n                len      : len,\n    \
    \            psn      : psn\n            }\n        };\n        return discardReq;\n\
    \    endactionvalue\nendfunction"
- name: unknown
  bsv_equivalent: "function Action genDiscardPayloadReq(\n    PktFragNum fragNum,\n\
    \    DmaReqSrcType initiator,\n    QPN sqpn,\n    ADDR startAddr,\n    PktLen\
    \ len,\n    PSN psn,\n    FIFOF#(PayloadConReq) payloadConReqQ\n);\n    action\n\
    \        immAssert(\n            !isZero(fragNum),\n            \"fragNum non-zero\
    \ assertion @ genDiscardPayloadReq()\",\n            $format(\"fragNum=%0d\",\
    \ fragNum, \" should be non-zero\")\n        );\n        let discardReq = PayloadConReq\
    \ {\n            fragNum    : fragNum,\n            consumeInfo: tagged DiscardPayloadInfo\
    \ DmaWriteMetaData {\n                initiator: initiator,\n                sqpn\
    \     : sqpn,\n                startAddr: startAddr,\n                len    \
    \  : len,\n                psn      : psn\n            }\n        };\n       \
    \ payloadConReqQ.enq(discardReq);\n    endaction\nendfunction"
- name: unknown
  bsv_equivalent: "    function Action connectAction(anytype connectVal)\n)(Empty)\
    \ provisos(\n    FShow#(anytype),\n    Bits#(anytype, anysize)\n    // Bits#(DataStream,\
    \ anysize)\n);\n    Reg#(BTH) bthReg <- mkRegU;\n\n    rule connect;\n       \
    \ let data <- getIn.get;\n        putOut.put(data);\n        connectAction(data);\n\
    \n    endrule\nendmodule\n"
