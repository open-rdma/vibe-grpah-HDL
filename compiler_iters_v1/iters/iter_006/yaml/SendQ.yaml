    \ endcase;\n            end\n            IBV_WR_SEND: begin\n                return\
    \ case (wqe.qpType)\n                    IBV_QPT_RC,\n                    IBV_QPT_UC:\
    \ tagged Valid genPktHeaderInfo(\n                        zeroExtendLSB(pack(bth)),\n\
    \                        fromInteger(valueOf(BTH_BYTE_WIDTH)),\n             \
    \           hasPayload\n                    );\n                    IBV_QPT_XRC_SEND:\
    \ tagged Valid genPktHeaderInfo(\n                        zeroExtendLSB({ pack(bth),\
    \ pack(unwrapMaybe(xrceth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n       \
    \             );\n                    default: tagged Invalid;\n             \
    \   endcase;\n            end\n            IBV_WR_SEND_WITH_IMM: begin\n     \
    \           return case (wqe.qpType)\n                    IBV_QPT_RC,\n      \
    \              IBV_QPT_UC: tagged Valid genPktHeaderInfo(\n                  \
    \      isLastReqPkt ?\n                            zeroExtendLSB({ pack(bth),\
    \ pack(unwrapMaybe(immDt)) }) :\n                            zeroExtendLSB(pack(bth)),\n\
    \                        isLastReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(IMM_DT_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n\
    \                        hasPayload\n                    );\n                \
    \    IBV_QPT_XRC_SEND: tagged Valid genPktHeaderInfo(\n                      \
    \  isLastReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)),\
    \ pack(unwrapMaybe(immDt)) }) :\n                            zeroExtendLSB({ pack(bth),\
    \ pack(unwrapMaybe(xrceth)) }),\n                        isLastReqPkt ?\n    \
    \                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
    \ + valueOf(IMM_DT_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n       \
    \             );\n                    default: tagged Invalid;\n             \
    \   endcase;\n            end\n            IBV_WR_SEND_WITH_INV: begin\n     \
    \           return case (wqe.qpType)\n                    IBV_QPT_RC: tagged Valid\
    \ genPktHeaderInfo(\n                        isLastReqPkt ?\n                \
    \            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(ieth)) }) :\n       \
    \                     zeroExtendLSB(pack(bth)),\n                        isLastReqPkt\
    \ ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(IETH_BYTE_WIDTH))\
    \ :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n     \
    \                   hasPayload\n                    );\n                    IBV_QPT_XRC_SEND:\
    \ tagged Valid genPktHeaderInfo(\n                        isLastReqPkt ?\n   \
    \                         zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)),\
    \ pack(unwrapMaybe(ieth)) }) :\n                            zeroExtendLSB({ pack(bth),\
    \ pack(unwrapMaybe(xrceth)) }),\n                        isLastReqPkt ?\n    \
    \                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
    \ + valueOf(IETH_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n       \
    \             );\n                    default: tagged Invalid;\n             \
    \   endcase;\n            end\n            IBV_WR_RDMA_READ_RESP: begin\n    \
    \            return case (wqe.qpType)\n                    IBV_QPT_RC      ,\n\
    \                    IBV_QPT_XRC_SEND,\n                    IBV_QPT_XRC_RECV:\
    \ tagged Valid genPktHeaderInfo(\n                        zeroExtendLSB({ pack(bth),\
    \ pack(unwrapMaybe(reth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(RETH_BYTE_WIDTH)),\n                        hasPayload\n         \
    \           );\n                    default         : tagged Invalid;\n      \
    \          endcase;\n            end\n            default: return tagged Invalid;\n\
    \        endcase\n    end\n    else begin\n        return tagged Invalid;\n  \
    \  end\nendfunction"
