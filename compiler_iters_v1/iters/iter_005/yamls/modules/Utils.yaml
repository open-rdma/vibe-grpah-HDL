      \        IBV_WR_LOCAL_INV           : tagged Valid IBV_WC_LOCAL_INV;\n        IBV_WR_BIND_MW             : tagged Valid IBV_WC_BIND_MW;\n        IBV_WR_SEND_WITH_INV       : tagged Valid IBV_WC_SEND;\n\
