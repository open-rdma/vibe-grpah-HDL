      \ : 10] + zeroExtend(psn)), addr[9 : 0] };\n        end\n        IBV_MTU_2048: begin\n            // 11 = log2(2048)\n            { (addr[valueOf(ADDR_WIDTH)-1 : 11] + zeroExtend(psn)), addr[10 :\
      \ 0] };\n        end\n        IBV_MTU_4096: begin\n            // 12 = log2(4096)\n            { (addr[valueOf(ADDR_WIDTH)-1 : 12] + zeroExtend(psn)), addr[11 : 0] };\n        end\n    endcase;\n\
