      \ rightAlignedByteEn);\n    return byteEnBitNum;\nendfunction\n\n// PMTU related\n\nfunction Integer getPmtuLogValue(PMTU pmtu);\n    return case (pmtu)\n        IBV_MTU_256 :  8; // log2(256)\n \
