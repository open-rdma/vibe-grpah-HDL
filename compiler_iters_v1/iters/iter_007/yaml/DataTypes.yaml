    \ 1024,    // 1 << 10\n    IBV_QP_RNR_RETRY = 2048,    // 1 << 11\n    IBV_QP_RQ_PSN\
    \ = 4096,    // 1 << 12\n    IBV_QP_MAX_QP_RD_ATOMIC = 8192,    // 1 << 13\n \
