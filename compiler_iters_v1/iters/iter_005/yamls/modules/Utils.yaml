      \        RDMA_WRITE_ONLY_WITH_IMMEDIATE: True;\n        default                       : False;\n    endcase;\nendfunction\n\nfunction Bool isSendWriteImmReqRdmaOpCode(RdmaOpCode opcode);\n    return\
      \ case (opcode)\n        SEND_FIRST                    ,\n        SEND_MIDDLE                   ,\n        SEND_LAST                     ,\n        SEND_LAST_WITH_IMMEDIATE      ,\n        SEND_ONLY\
      \                     ,\n        SEND_ONLY_WITH_IMMEDIATE      ,\n        SEND_LAST_WITH_INVALIDATE     ,\n        SEND_ONLY_WITH_INVALIDATE     ,\n        RDMA_WRITE_LAST_WITH_IMMEDIATE,\n      \
      \  RDMA_WRITE_ONLY_WITH_IMMEDIATE: True;\n        default                       : False;\n    endcase;\nendfunction\n\nfunction Bool isReadReqRdmaOpCode(RdmaOpCode opcode);\n    return opcode == RDMA_READ_REQUEST;\n\
      endfunction\n\nfunction Bool isAtomicReqRdmaOpCode(RdmaOpCode opcode);\n    return case (opcode)\n        COMPARE_SWAP,\n        FETCH_ADD   : True;\n        default     : False;\n    endcase;\nendfunction\n\
      \nfunction Bool isReadRespRdmaOpCode(RdmaOpCode opcode);\n    return case (opcode)\n        RDMA_READ_RESPONSE_FIRST ,\n        RDMA_READ_RESPONSE_MIDDLE,\n        RDMA_READ_RESPONSE_LAST  ,\n   \
      \     RDMA_READ_RESPONSE_ONLY  : True;\n        default                  : False;\n    endcase;\nendfunction\n\nfunction Bool isRdmaRespOpCode(RdmaOpCode opcode);\n    return case (opcode)\n     \
      \   RDMA_READ_RESPONSE_FIRST ,\n        RDMA_READ_RESPONSE_MIDDLE,\n        RDMA_READ_RESPONSE_LAST  ,\n        RDMA_READ_RESPONSE_ONLY  ,\n        ACKNOWLEDGE              ,\n        ATOMIC_ACKNOWLEDGE\
      \       : True;\n        default                  : False;\n    endcase;\nendfunction\n\nfunction Bool rdmaRespHasAETH(RdmaOpCode opcode);\n    return case (opcode)\n        RDMA_READ_RESPONSE_FIRST\
      \ ,\n        RDMA_READ_RESPONSE_LAST  ,\n        RDMA_READ_RESPONSE_ONLY  ,\n        ACKNOWLEDGE              ,\n        ATOMIC_ACKNOWLEDGE       : True;\n        default                  : False;\n\
      \    endcase;\nendfunction\n\nfunction Bool isAtomicRespRdmaOpCode(RdmaOpCode opcode);\n    return opcode == ATOMIC_ACKNOWLEDGE;\nendfunction\n\nfunction Bool rdmaRespNeedDmaWrite(RdmaOpCode opcode);\n\
      \    return case (opcode)\n        RDMA_READ_RESPONSE_FIRST ,\n        RDMA_READ_RESPONSE_MIDDLE,\n        RDMA_READ_RESPONSE_LAST  ,\n        RDMA_READ_RESPONSE_ONLY  ,\n        ATOMIC_ACKNOWLEDGE\
      \       : True;\n        default                  : False;\n    endcase;\nendfunction\n\nfunction Bool rdmaReqHasRETH(RdmaOpCode opcode);\n    return case (opcode)\n        RDMA_WRITE_FIRST      \
      \        ,\n        RDMA_WRITE_ONLY               ,\n        RDMA_WRITE_ONLY_WITH_IMMEDIATE,\n        RDMA_READ_REQUEST             : True;\n        default                       : False;\n    endcase;\n\
      endfunction\n\nfunction Bool rdmaReqHasImmDt(RdmaOpCode opcode);\n    return case (opcode)\n        SEND_LAST_WITH_IMMEDIATE      ,\n        SEND_ONLY_WITH_IMMEDIATE      ,\n        RDMA_WRITE_LAST_WITH_IMMEDIATE,\n\
      \        RDMA_WRITE_ONLY_WITH_IMMEDIATE: True;\n        default                       : False;\n    endcase;\nendfunction\n\nfunction Bool rdmaReqHasIETH(RdmaOpCode opcode);\n    return case (opcode)\n\
      \        SEND_LAST_WITH_INVALIDATE,\n        SEND_ONLY_WITH_INVALIDATE: True;\n        default                  : False;\n    endcase;\nendfunction\n\nfunction RdmaRespType getRdmaRespType(RdmaOpCode\
      \ opcode, AETH aeth);\n    case (opcode)\n        RDMA_READ_RESPONSE_FIRST ,\n        RDMA_READ_RESPONSE_MIDDLE,\n        RDMA_READ_RESPONSE_LAST  ,\n        RDMA_READ_RESPONSE_ONLY  ,\n        ATOMIC_ACKNOWLEDGE\
      \       : return RDMA_RESP_NORMAL;\n        ACKNOWLEDGE              : case (aeth.code)\n            AETH_CODE_ACK: return RDMA_RESP_NORMAL;\n            AETH_CODE_RNR: return RDMA_RESP_RETRY;\n \
      \           AETH_CODE_NAK: return case (aeth.value)\n                zeroExtend(pack(AETH_NAK_SEQ_ERR)): RDMA_RESP_RETRY;\n                zeroExtend(pack(AETH_NAK_INV_REQ)),\n                zeroExtend(pack(AETH_NAK_RMT_ACC)),\n\
      \                zeroExtend(pack(AETH_NAK_RMT_OP)) ,\n                zeroExtend(pack(AETH_NAK_INV_RD)) : RDMA_RESP_ERROR;\n                default                           : RDMA_RESP_UNKNOWN;\n\
      \            endcase;\n            // AETH_CODE_RSVD\n            default: return RDMA_RESP_UNKNOWN;\n        endcase\n        default: return RDMA_RESP_UNKNOWN;\n    endcase\nendfunction\n\nfunction\
      \ RetryReason getRetryReasonFromAETH(AETH aeth);\n    return case (aeth.code)\n        AETH_CODE_RNR: RETRY_REASON_RNR;\n        AETH_CODE_NAK: (\n            (aeth.value == zeroExtend(pack(AETH_NAK_SEQ_ERR)))\
      \ ?\n                RETRY_REASON_SEQ_ERR : RETRY_REASON_NOT_RETRY\n        );\n        default: RETRY_REASON_NOT_RETRY;\n    endcase;\nendfunction\n\nfunction Bool checkNormalRespOpCodeSeqSQ(\n \
      \   RdmaOpCode preOpCode, RdmaOpCode curOpCode\n);\n    return case (preOpCode)\n        RDMA_READ_RESPONSE_FIRST ,\n        RDMA_READ_RESPONSE_MIDDLE: (\n            curOpCode == RDMA_READ_RESPONSE_MIDDLE\
      \ ||\n            curOpCode == RDMA_READ_RESPONSE_LAST\n        );\n        RDMA_READ_RESPONSE_LAST  ,\n        RDMA_READ_RESPONSE_ONLY  ,\n        ACKNOWLEDGE              ,\n        ATOMIC_ACKNOWLEDGE\
      \       : True;\n        default                  : False;\n    endcase;\nendfunction\n\nfunction Bool checkNormalReqOpCodeSeqRQ(\n    RdmaOpCode preOpCode, RdmaOpCode curOpCode\n);\n    case (preOpCode)\n\
      \        SEND_FIRST                    ,\n        SEND_MIDDLE                   : return case (curOpCode)\n                                            SEND_MIDDLE              ,\n                \
      \                            SEND_LAST                ,\n                                            SEND_LAST_WITH_IMMEDIATE ,\n                                            SEND_LAST_WITH_INVALIDATE:\
      \ True;\n                                            default                  : False;\n                                        endcase;\n        SEND_LAST                     ,\n        SEND_LAST_WITH_IMMEDIATE\
      \      ,\n        SEND_LAST_WITH_INVALIDATE     ,\n        SEND_ONLY                     ,\n        SEND_ONLY_WITH_IMMEDIATE      ,\n        SEND_ONLY_WITH_INVALIDATE     : return True;\n        RDMA_WRITE_FIRST\
      \              ,\n        RDMA_WRITE_MIDDLE             : return case (curOpCode)\n                                            RDMA_WRITE_MIDDLE             ,\n                                   \
      \         RDMA_WRITE_LAST               ,\n                                            RDMA_WRITE_LAST_WITH_IMMEDIATE: True;\n                                            default                  \
      \     : False;\n                                        endcase;\n        RDMA_WRITE_LAST               ,\n        RDMA_WRITE_LAST_WITH_IMMEDIATE,\n        RDMA_WRITE_ONLY               ,\n      \
      \  RDMA_WRITE_ONLY_WITH_IMMEDIATE,\n        RDMA_READ_REQUEST             ,\n        COMPARE_SWAP                  ,\n        FETCH_ADD                     : return True;\n\n        default      \
      \                 : return False;\n    endcase\nendfunction\n\n// WorkReq related\n\nfunction Bool containWorkReqFlag(\n    FlagsType#(WorkReqSendFlag) flags, WorkReqSendFlag flag\n);\n    return\
      \ containEnum(flags, flag);\n    // return !isZero(pack(flags & enum2Flag(flag)));\nendfunction\n\nfunction ResiduePMTU truncateByPMTU(Bit#(nSz) bits, PMTU pmtu) provisos(\n    Add#(MAX_PMTU_WIDTH,\
      \ anysizeJ, nSz),\n    Add#(TSub#(MAX_PMTU_WIDTH, 1), anysizeK, nSz),\n    Add#(TSub#(MAX_PMTU_WIDTH, 2), anysizeL, nSz),\n    Add#(TSub#(MAX_PMTU_WIDTH, 3), anysizeM, nSz),\n    Add#(TSub#(MAX_PMTU_WIDTH,\
      \ 4), anysizeN, nSz)\n);\n    return case (pmtu)\n        IBV_MTU_256 : begin\n            Bit#(TSub#(MAX_PMTU_WIDTH, 4)) residue = truncate(bits); // [7 : 0]\n            zeroExtend(residue);\n \
      \       end\n        IBV_MTU_512 : begin\n            Bit#(TSub#(MAX_PMTU_WIDTH, 3)) residue = truncate(bits); // [8 : 0]\n            zeroExtend(residue);\n        end\n        IBV_MTU_1024: begin\n\
      \            Bit#(TSub#(MAX_PMTU_WIDTH, 2)) residue = truncate(bits); // [9 : 0]\n            zeroExtend(residue);\n        end\n        IBV_MTU_2048: begin\n            Bit#(TSub#(MAX_PMTU_WIDTH,\
      \ 1)) residue = truncate(bits); // [10 : 0]\n            zeroExtend(residue);\n        end\n        IBV_MTU_4096: begin\n            Bit#(MAX_PMTU_WIDTH) residue = truncate(bits); // [11 : 0]\n  \
      \          zeroExtend(residue);\n        end\n    endcase;\nendfunction\n\n// TODO: remove this function, it should consider start address to calculate PktNum\n// The returned PktNum might be zero\
      \ or one less than actual PktNum\nfunction Tuple2#(PktNum, ResiduePMTU) truncateLenByPMTU(Length len, PMTU pmtu);\n    return case (pmtu)\n        IBV_MTU_256 : begin\n            Bit#(8) residue\
      \ = truncate(len); // [7 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 8)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen), zeroExtend(residue));\n        end\n  \
      \      IBV_MTU_512 : begin\n            Bit#(9) residue = truncate(len); // [8 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 9)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
      \ zeroExtend(residue));\n        end\n        IBV_MTU_1024: begin\n            Bit#(10) residue = truncate(len); // [9 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 10)) truncatedLen = truncateLSB(len);\n\
      \            tuple2(zeroExtend(truncatedLen), zeroExtend(residue));\n        end\n        IBV_MTU_2048: begin\n            Bit#(11) residue = truncate(len); // [10 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
      \ 11)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen), zeroExtend(residue));\n        end\n        IBV_MTU_4096: begin\n            Bit#(12) residue = truncate(len);\
      \ // [11 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 12)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen), zeroExtend(residue));\n        end\n    endcase;\nendfunction\n\
      \nfunction Tuple2#(PSN, PSN) calcNextAndEndPSN(\n    PSN startPSN, PktNum pktNum, Bool isOnlyPkt, PMTU pmtu\n);\n    let startPlusOne = startPSN + 1;\n    // In case pktNum is zero\n    PSN nextPSN\
      \ = isOnlyPkt ? startPlusOne : truncate(zeroExtend(startPSN) + pktNum);\n    PSN endPSN = isOnlyPkt ? startPSN : (nextPSN - 1);\n    return tuple2(nextPSN, endPSN);\nendfunction\n\nfunction Bool workReqHasAckReq(WorkReq\
      \ wr);\n    return containWorkReqFlag(wr.flags, IBV_SEND_SIGNALED);\nendfunction\n\nfunction Bool workReqRequireAck(WorkReq wr);\n    return workReqHasAckReq(wr) || isReadOrAtomicWorkReq(wr.opcode);\n\
      endfunction\n\nfunction Bool workReqNeedDmaReadSQ(WorkReq wr);\n    return case (wr.opcode)\n        IBV_WR_RDMA_WRITE         ,\n        IBV_WR_RDMA_WRITE_WITH_IMM,\n        IBV_WR_SEND         \
      \      ,\n        IBV_WR_SEND_WITH_IMM      ,\n        IBV_WR_SEND_WITH_INV      : !isZeroR(wr.len);\n        default                   : False;\n    endcase;\nendfunction\n\nfunction Bool workReqNeedDmaWriteSQ(WorkReq\
      \ wr);\n    return case (wr.opcode)\n        IBV_WR_RDMA_READ           : !isZeroR(wr.len);\n        IBV_WR_ATOMIC_CMP_AND_SWP  ,\n        IBV_WR_ATOMIC_FETCH_AND_ADD: True;\n        default     \
      \               : False;\n    endcase;\nendfunction\n\nfunction Bool workReqHasPayload(WorkReq wr);\n    return !(isZeroR(wr.len) || isReadOrAtomicWorkReq(wr.opcode));\nendfunction\n\nfunction Bool\
      \ workReqNeedWorkCompSQ(WorkReq wr);\n    return\n        containWorkReqFlag(wr.flags, IBV_SEND_SIGNALED) ||\n        isReadOrAtomicWorkReq(wr.opcode);\nendfunction\n\nfunction Bool workReqHasComp(WorkReqOpCode\
      \ opcode);\n    return opcode == IBV_WR_ATOMIC_CMP_AND_SWP;\nendfunction\n\nfunction Bool workReqHasSwap(WorkReqOpCode opcode);\n    return case (opcode)\n        IBV_WR_ATOMIC_CMP_AND_SWP  ,\n  \
      \      IBV_WR_ATOMIC_FETCH_AND_ADD: True;\n        default: False;\n    endcase;\nendfunction\n\nfunction Bool isSendWorkReq(WorkReqOpCode opcode);\n    return case (opcode)\n        IBV_WR_SEND \
      \        ,\n        IBV_WR_SEND_WITH_IMM,\n        IBV_WR_SEND_WITH_INV: True;\n        default             : False;\n    endcase;\nendfunction\n\nfunction Bool isReadWorkReq(WorkReqOpCode opcode);\n\
      \    return opcode == IBV_WR_RDMA_READ;\nendfunction\n\nfunction Bool isReadRespWorkReq(WorkReqOpCode opcode);\n    return opcode == IBV_WR_RDMA_READ_RESP;\nendfunction\n\nfunction Bool isAtomicWorkReq(WorkReqOpCode\
      \ opcode);\n    return workReqHasSwap(opcode);\nendfunction\n\nfunction Bool isReadOrAtomicWorkReq(WorkReqOpCode opcode);\n    return case (opcode)\n        IBV_WR_RDMA_READ,\n        IBV_WR_ATOMIC_CMP_AND_SWP,\n\
      \        IBV_WR_ATOMIC_FETCH_AND_ADD: True;\n        default: False;\n    endcase;\nendfunction\n\nfunction Bool workReqNeedRecvReq(WorkReqOpCode opcode);\n    return case (opcode)\n        IBV_WR_SEND\
      \               ,\n        IBV_WR_SEND_WITH_IMM      ,\n        IBV_WR_SEND_WITH_INV      ,\n        IBV_WR_RDMA_WRITE_WITH_IMM: True;\n        default                   : False;\n    endcase;\nendfunction\n\
      \nfunction Bool workReqHasImmDt(WorkReqOpCode opcode);\n    return case (opcode)\n        IBV_WR_RDMA_WRITE_WITH_IMM,\n        IBV_WR_SEND_WITH_IMM: True;\n        default: False;\n    endcase;\n\
      endfunction\n\nfunction Bool workReqHasInv(WorkReqOpCode opcode);\n    return opcode == IBV_WR_SEND_WITH_INV;\nendfunction\n\nfunction PendingWorkReq genNewPendingWorkReq(WorkReq wr) = PendingWorkReq\
      \ {\n    wr: wr,\n    startPSN: tagged Invalid,\n    endPSN: tagged Invalid,\n    pktNum: tagged Invalid,\n    isOnlyReqPkt: tagged Invalid\n};\n\n/*\nmodule mkConnectPendingWorkReqPipeOut2PendingWorkReqQ#(\n\
