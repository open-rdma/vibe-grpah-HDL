meta:
  name: "priority_arbiter"
  description: "Multi-level hierarchical priority arbiter tree with round-robin fairness"
  knowledge: |
    # Priority Arbiter System (4 modules, deeply nested)

    ## Module 1: mkPriorityEncoder (combinational)
    - Fixed-priority encoder: finds highest-priority asserted request bit
    - Input: reqVec (Bit#(reqNum)), Output: grantVec (Bit#(reqNum), one-hot)
    - Priority: bit 0 = highest, bit (reqNum-1) = lowest
    - Uses fold-for with combinational logic, no registers

    ## Module 2: mkRoundRobinArbiter (state machine)
    - Takes reqVec, outputs one-hot grant with round-robin fairness
    - Maintains priorityBase register that rotates after each grant
    - Calls mkPriorityEncoder internally on rotated request vector
    - Interface: RoundRobinArbiter#(reqNum) with grant method

    ## Module 3: mkArbiterTree (recursive, uses RecursiveUtils)
    - Hierarchical tree: splits reqNum into nGroups groups
    - Each group has a mkRoundRobinArbiter
    - Group winners compete in a top-level mkRoundRobinArbiter
    - Recursively subdivides until group size = 1 (base case)
    - Outputs one-hot grant across full width

    ## Module 4: mkPriorityArbiterTop (integration)
    - Wraps mkArbiterTree with request/grant pipeline
    - FIFO-buffered request input, grant output
    - CReg for concurrent request/clear access
    - Interface: PriorityArbiterTop#(reqNum)

    ## Imports
    FIFOF, Vector, PrimUtils (for CReg, mkCReg), RecursiveUtils

    ## Types
    All Bit#(reqNum) — no external type dependencies

ports:
  - name: "arbiter_ifc"
    direction: "output"
    category: "data"
    type: "PriorityArbiterTop_T"
