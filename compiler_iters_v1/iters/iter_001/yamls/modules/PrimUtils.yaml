meta:
  name: PrimUtils
  description: 'Primitive utility functions: isZero, isLessOrEqOne, isOne, isTwo,
    bit manipulation helpers used across the project'
knowledge:
  bsv:
    code: "import FIFOF :: *;\nimport PAClib :: *;\n\ntypedef 2 TWO;\ntypedef 4 FOUR;\n\
      \nfunction Bool isZero(Bit#(nSz) bits); // provisos(Add#(1, anysize, nSz));\n\
      \    Bool ret = unpack(|bits);\n    return !ret;\nendfunction\n\n// TODO: consider\
      \ using fold\nfunction Bool isZeroR(Bit#(nSz) bits) provisos(\n    NumAlias#(TDiv#(nSz,\
      \ 2), halfSz)\n);\n    if (valueOf(halfSz) > 1) begin\n        Tuple2#(Bit#(TSub#(nSz,\
      \ halfSz)), Bit#(halfSz)) pair = split(bits);\n        let { left, right } =\
      \ pair;\n        return isZeroR(left) && isZeroR(right);\n    end\n    else\
      \ begin\n        return isZero(bits);\n    end\nendfunction\n\nfunction Bool\
      \ isZeroByteEn(Bit#(nSz) byteEn); // provisos(Add#(1, anysize, nSz));\n    return\
      \ isZero({ msb(byteEn), lsb(byteEn) });\nendfunction\n\nfunction Bool isLessOrEqOne(Bit#(nSz)\
      \ bits); // provisos(Add#(1, anysize, nSz));\n    Bool ret = isZero(bits >>\
      \ 1);\n    // Bool ret = isZero(bits >> 1) && unpack(bits[0]);\n    return ret;\n\
      endfunction\n\nfunction Bool isLessOrEqOneR(Bit#(nSz) bits); // provisos(Add#(1,\
      \ anysize, nSz));\n    Bool ret = isZeroR(bits >> 1);\n    return ret;\nendfunction\n\
      \nfunction Bool isOne(Bit#(nSz) bits); // provisos(Add#(1, anysize, nSz));\n\
      \    return isLessOrEqOne(bits) && unpack(lsb(bits));\nendfunction\n\nfunction\
      \ Bool isOneR(Bit#(nSz) bits); // provisos(Add#(1, anysize, nSz));\n    return\
      \ isLessOrEqOneR(bits) && unpack(lsb(bits));\nendfunction\n\nfunction Bool isTwo(Bit#(nSz)\
      \ bits) provisos(Add#(2, anysize, nSz));\n    return isZero(bits >> 2) && unpack(bits[1])\
      \ && !unpack(lsb(bits));\nendfunction\n\nfunction Bool isTwoR(Bit#(nSz) bits)\
      \ provisos(Add#(2, anysize, nSz));\n    return isZero(bits >> 2) && unpack(bits[1])\
      \ && !unpack(lsb(bits));\nendfunction\n\n// function Bool isAllOnes(Bit#(nSz)\
      \ bits);\n//     Bool ret = unpack(&bits);\n//     return ret;\n// endfunction\n\
      \nfunction Bool isAllOnesR(Bit#(nSz) bits) provisos(\n    NumAlias#(TDiv#(nSz,\
      \ 2), halfSz)\n);\n    if (valueOf(halfSz) > 1) begin\n        Tuple2#(Bit#(TSub#(nSz,\
      \ halfSz)), Bit#(halfSz)) pair = split(bits);\n        let { left, right } =\
      \ pair;\n        return isAllOnesR(left) && isAllOnesR(right);\n    end\n  \
      \  else begin\n        Bool ret = unpack(&bits);\n        return ret;\n    end\n\
      endfunction\n\nfunction Bool isLargerThanOne(Bit#(nSz) bits); // provisos(Add#(1,\
      \ anysize, nSz));\n    return !isZero(bits >> 1);\nendfunction\n\n// 64 >= nSz\
      \ >= 32\nfunction Tuple2#(Bool, Bool) isZero4LargeBits(Bit#(nSz) bits) provisos(\n\
      \    Add#(32, anysizeJ, nSz),\n    Add#(nSz, anysizeK, 64),\n    NumAlias#(TDiv#(nSz,\
      \ 2), lowPartSz),\n    NumAlias#(TSub#(nSz, lowPartSz), highPartSz),\n    Add#(anysizeL,\
      \ TDiv#(nSz, 2), nSz),\n    // Add#(1, anysizeM, TDiv#(nSz, 2)),\n    // Add#(1,\
      \ anysizeN, TSub#(nSz, TDiv#(nSz, 2))),\n    Add#(lowPartSz, highPartSz, nSz)\n\
      );\n    Bit#(lowPartSz)   lowPartBits = truncate(bits);\n    Bit#(highPartSz)\
      \ highPartBits = truncateLSB(bits);\n    let isLowPartZero  = isZero(lowPartBits);\n\
      \    let isHighPartZero = isZero(highPartBits);\n    return tuple2(isHighPartZero,\
      \ isLowPartZero);\nendfunction\n\nfunction Bit#(nSz) zeroExtendLSB(Bit#(mSz)\
      \ bits) provisos(Add#(mSz, anysize, nSz));\n    return { bits, 0 };\nendfunction\n\
      \nfunction Bit#(TSub#(nSz, 1)) removeMSB(Bit#(nSz) bits) provisos(Add#(1, anysize,\
      \ nSz));\n    return truncateLSB(bits << 1);\nendfunction\n\nfunction anytype\
      \ dontCareValue() provisos(Bits#(anytype, tSz));\n    return ?;\nendfunction\n\
      \nfunction anytype unwrapMaybe(Maybe#(anytype) maybe) provisos(Bits#(anytype,\
      \ tSz));\n    return fromMaybe(?, maybe);\nendfunction\n\nfunction anytype unwrapMaybeWithDefault(\n\
      \    Maybe#(anytype) maybe, anytype defaultVal\n) provisos(Bits#(anytype, nSz));\n\
      \    return fromMaybe(defaultVal, maybe);\nendfunction\n\nfunction anytype1\
      \ getTupleFirst(Tuple2#(anytype1, anytype2) tupleVal);\n    return tpl_1(tupleVal);\n\
      endfunction\n\nfunction anytype2 getTupleSecond(Tuple2#(anytype1, anytype2)\
      \ tupleVal);\n    return tpl_2(tupleVal);\nendfunction\n\nfunction anytype3\
      \ getTupleThird(Tuple3#(anytype1, anytype2, anytype3) tupleVal);\n    return\
      \ tpl_3(tupleVal);\nendfunction\n\nfunction anytype4 getTupleFourth(Tuple4#(anytype1,\
      \ anytype2, anytype3, anytype4) tupleVal);\n    return tpl_4(tupleVal);\nendfunction\n\
      \nfunction anytype5 getTupleFifth(Tuple5#(anytype1, anytype2, anytype3, anytype4,\
      \ anytype5) tupleVal);\n    return tpl_5(tupleVal);\nendfunction\n\nfunction\
      \ anytype6 getTupleSixth(Tuple6#(anytype1, anytype2, anytype3, anytype4, anytype5,\
      \ anytype6) tupleVal);\n    return tpl_6(tupleVal);\nendfunction\n\nfunction\
      \ anytype identityFunc(anytype inputVal);\n    return inputVal;\nendfunction\n\
      \nfunction Action immAssert(Bool condition, String assertName, Fmt assertFmtMsg);\n\
      \    action\n        let pos = printPosition(getStringPosition(assertName));\n\
      \        // let pos = printPosition(getEvalPosition(condition));\n        if\
      \ (!condition) begin\n            $error(\n                \"ImmAssert failed\
      \ in %m @time=%0t: %s-- %s: \",\n                $time, pos, assertName, assertFmtMsg\n\
      \            );\n            $finish(1);\n        end\n    endaction\nendfunction\n\
      \nfunction Action immFail(String assertName, Fmt assertFmtMsg);\n    action\n\
      \        let pos = printPosition(getStringPosition(assertName));\n        //\
      \ let pos = printPosition(getEvalPosition(condition));\n        $error(\n  \
      \          \"ImmAssert failed in %m @time=%0t: %s-- %s: \",\n            $time,\
      \ pos, assertName, assertFmtMsg\n        );\n        $finish(1);\n    endaction\n\
      endfunction\n\n// PipeOut related\n\nfunction PipeOut#(anytype) toPipeOut(FIFOF#(anytype)\
      \ queue);\n    return f_FIFOF_to_PipeOut(queue);\nendfunction\n/*\nfunction\
      \ PipeOut#(anytype) toPipeOutWithAction(\n    FIFOF#(anytype) queue,\n    function\
      \ Action deqAction(anytype deqVal)\n);\n    return (interface PipeOut;\n   \
      \     method anytype first();\n            return queue.first;\n        endmethod\n\
      \        method Action deq();\n            queue.deq;\n            deqAction(queue.first);\n\
      \        endmethod\n        method Bool notEmpty();\n            return queue.notEmpty;\n\
      \        endmethod\n    endinterface);\nendfunction\n*/\n// FlagsType related\n\
      \ntypedef struct {\n    Bit#(SizeOf#(enumType)) flags;\n} FlagsType#(type enumType)\
      \ deriving(Bits, Bitwise, Eq);\n\ninstance FShow#(FlagsType#(enumType)) provisos(\n\
      \    Bits#(enumType, tSz),\n    FShow#(enumType)\n);\n    function Fmt fshow(FlagsType#(enumType)\
      \ inputVal);\n        Bit#(tSz) enumBits = pack(inputVal);\n\n        Fmt resultFmt\
      \ = $format(\"FlagsType { flags: \", pack(inputVal), \" = \");\n        for\
      \ (Integer idx = 0; idx < valueOf(tSz); idx = idx + 1) begin\n            Bool\
      \ bitValid = unpack(enumBits[idx]);\n            enumType enumVal = unpack(1\
      \ << idx);\n            if (bitValid) begin\n                resultFmt = resultFmt\
      \ + $format(fshow(enumVal), \" | \");\n            end\n        end\n\n    \
      \    if (isZero(enumBits)) begin\n            enumType enumVal = unpack(0);\n\
      \            resultFmt = resultFmt + $format(fshow(enumVal), \" }\");\n    \
      \    end\n        else begin\n            resultFmt = resultFmt + $format(\"\
      }\");\n        end\n        return resultFmt;\n    endfunction\nendinstance\n\
      \ntypeclass Flags#(type enumType);\n    function Bool isOneHotOrZero(enumType\
      \ inputVal);\nendtypeclass\n\nfunction FlagsType#(enumType) enum2Flag(enumType\
      \ inputVal) provisos(\n    Bits#(enumType, tSz),\n    Flags#(enumType)\n);\n\
      \    // TODO: check inputVal is onehot or zero\n    // immAssert(\n    //  \
      \   isOneHotOrZero(inputVal),\n    //     \"numOnes assertion @ convert2Flag\"\
      ,\n    //     $format(\n    //         \"inputVal=\", fshow(inputVal),\n   \
      \ //         \" should be one-hot but its value=%0d\", pack(inputValue)\n  \
      \  //     )\n    // );\n    return unpack(pack(inputVal));\nendfunction\n\n\
      // Check flags1 contains flags2 or not\nfunction Bool containFlags(FlagsType#(enumType)\
      \ flags1, FlagsType#(enumType) flags2) provisos(\n    Bits#(enumType, tSz),\n\
      \    Flags#(enumType)\n);\n    return (flags1 & flags2) == flags2;\n    // Bit#(tSz)\
      \ bitWiseResult = pack((flags1 & flags2) ^ flags2);\n    // return isZero(bitWiseResult);\n\
      endfunction\n\nfunction Bool containEnum(FlagsType#(enumType) flags, enumType\
      \ enumVal) provisos(\n    Bits#(enumType, tSz),\n    Flags#(enumType)\n);\n\
      \    return !isZero(pack(flags & enum2Flag(enumVal)));\nendfunction\n\n// _read\
      \ SB (incr CF decr) SB _write\ninterface CountCF#(type anytype);\n    method\
      \ Action incrOne();\n    method Action decrOne();\n    method Action _write\
      \ (anytype write_val);\n    method anytype _read();\nendinterface\n\nmodule\
      \ mkCountCF#(anytype resetVal)(CountCF#(anytype)) provisos(\n    Arith#(anytype),\
      \ Bits#(anytype, tSz)\n);\n    Reg#(anytype) cntReg <- mkReg(resetVal);\n  \
      \  FIFOF#(Bool)   incrQ <- mkFIFOF;\n    FIFOF#(Bool)   decrQ <- mkFIFOF;\n\n\
      \    Reg#(Maybe#(anytype)) writeReg[2] <- mkCReg(2, tagged Invalid);\n    Reg#(Bool)\
      \ incrReg[2] <- mkCReg(2, False);\n    Reg#(Bool) decrReg[2] <- mkCReg(2, False);\n\
      \n    (* no_implicit_conditions, fire_when_enabled *)\n    rule write if (writeReg[1]\
      \ matches tagged Valid .writeVal);\n        cntReg <= writeVal;\n        incrQ.clear;\n\
      \        decrQ.clear;\n        writeReg[1] <= tagged Invalid;\n        incrReg[1]\
      \  <= False;\n        decrReg[1]  <= False;\n    endrule\n\n    (* fire_when_enabled\
      \ *)\n    rule increment if (!isValid(writeReg[1]));\n        incrReg[0] <=\
      \ True;\n        incrQ.deq;\n    endrule\n\n    (* fire_when_enabled *)\n  \
      \  rule decrement if (!isValid(writeReg[1]));\n        decrReg[0] <= True;\n\
      \        decrQ.deq;\n    endrule\n\n    (* no_implicit_conditions, fire_when_enabled\
      \ *)\n    rule incrAndDecr if (!isValid(writeReg[1]));\n        if (incrReg[1]\
      \ && !decrReg[1]) begin\n            cntReg <= cntReg + 1;\n        end\n  \
      \      else if (!incrReg[1] && decrReg[1]) begin\n            cntReg <= cntReg\
      \ - 1;\n        end\n\n        incrReg[1] <= False;\n        decrReg[1] <= False;\n\
      \    endrule\n\n    method Action incrOne();\n        incrQ.enq(True);\n   \
      \ endmethod\n    method Action decrOne();\n        decrQ.enq(True);\n    endmethod\n\
      \    method Action _write(anytype writeVal);\n        writeReg[0] <= tagged\
      \ Valid writeVal;\n    endmethod\n    method anytype _read() = cntReg;\nendmodule\n\
      /*\n// All Count interface methods of mkCountCF are CF\nmodule mkCountCF#(anytype\
      \ resetVal)(Count#(anytype)) provisos(\n    Arith#(anytype), ModArith#(anytype),\
      \ Bits#(anytype, tSz)\n);\n    Reg#(anytype)     cntReg <- mkReg(resetVal);\n\
      \    Reg#(anytype) incrReg[2] <- mkCReg(2, 0);\n    Reg#(anytype) decrReg[2]\
      \ <- mkCReg(2, 0);\n\n    Reg#(Maybe#(anytype)) writeReg[2] <- mkCReg(2, tagged\
      \ Invalid);\n\n    (* no_implicit_conditions, fire_when_enabled *)\n    rule\
      \ canonicalize;\n        if (writeReg[1] matches tagged Valid .writeVal) begin\n\
      \            cntReg <= writeVal;\n        end\n        else begin\n        \
      \    cntReg <= cntReg + incrReg[1] - decrReg[1];\n        end\n\n        incrReg[1]\
      \  <= 0;\n        decrReg[1]  <= 0;\n        writeReg[1] <= tagged Invalid;\n\
      \        // updateReg[1] <= tagged Invalid;\n    endrule\n\n    method Action\
      \ incr(anytype incrVal);\n        incrReg[0] <= incrVal;\n    endmethod\n  \
      \  method Action decr(anytype decrVal);\n        decrReg[0] <= decrVal;\n  \
      \  endmethod\n    method Action update(anytype updateVal);\n        error(\"\
      update is not defined for mkCountCF\");\n    endmethod\n    method Action _write(anytype\
      \ writeVal);\n        writeReg[0] <= tagged Valid writeVal;\n    endmethod\n\
      \    method anytype _read() = cntReg;\nendmodule\n*/"
