  bsv_equivalent: "function Maybe#(XRCETH) genXRCETH(WorkReq wr, CntrlStatus cntrlStatus);\n\
    \    return case (cntrlStatus.getTypeQP)\n        IBV_QPT_XRC_SEND: tagged Valid\
    \ XRCETH {\n            srqn: unwrapMaybe(wr.srqn),\n            rsvd: unpack(0)\n\
