_reference_bsv: "// Adjustible settings\n// typedef 500 TARGET_FREQ_MHZ;\ntypedef\
  \ 2 TARGET_CYCLE_NS;\n\ntypedef 2 MIN_PKT_NUM_IN_RECV_BUF;\ntypedef TMul#(2, MAX_QP_WR)\
  \ MAX_PENDING_WORK_COMP_NUM;\n\n// RDMA device attributes\n// Must be power of 2\n\
  typedef 256 DATA_BUS_WIDTH;\n\ntypedef TExp#(31)           MAX_MR_SIZE;   // 2GB\n\
  typedef TExp#(21)           PAGE_SIZE_CAP; // 2MB\ntypedef 4                   MAX_QP;\n\
  typedef 32                  MAX_QP_WR;\ntypedef 8                   MAX_SGE;\ntypedef\
  \ 8                   MAX_CQ;\ntypedef MAX_QP_WR           MAX_CQE;\ntypedef 256\
  \                 MAX_MR;\ntypedef 2                   MAX_PD;\ntypedef TDiv#(MAX_QP_WR,\
  \ 2) MAX_QP_RD_ATOM;\ntypedef TDiv#(MAX_QP_WR, 2) MAX_QP_DST_RD_ATOM;\ntypedef 0\
  \                   MAX_SRQ;\ntypedef MAX_QP_WR           MAX_SRQ_WR;\ntypedef MAX_SGE\
  \             MAX_SRQ_SGE;\n// End must-be-power-of-2\n\ntypedef 1 MAX_SEND_SGE;\n\
  typedef 1 MAX_RECV_SGE;\ntypedef 0 MAX_INLINE_DATA; // No inline data\n\n/*\nstruct\
  \ ibv_device_attr {\n    char                fw_ver[64];\n    __be64           \
  \   node_guid;\n    __be64              sys_image_guid;\n    uint64_t          \
  \  max_mr_size;\n    uint64_t            page_size_cap;\n    uint32_t          \
  \  vendor_id;\n    uint32_t            vendor_part_id;\n    uint32_t           \
  \ hw_ver;\n    int                 max_qp;\n    int                 max_qp_wr;\n\
  \    unsigned int        device_cap_flags;\n    int                 max_sge;\n \
  \   int                 max_sge_rd;\n    int                 max_cq;\n    int  \
  \               max_cqe;\n    int                 max_mr;\n    int             \
  \    max_pd;\n    int                 max_qp_rd_atom;\n    int                 max_ee_rd_atom;\n\
  \    int                 max_res_rd_atom;\n    int                 max_qp_init_rd_atom;\n\
  \    int                 max_ee_init_rd_atom;\n    enum ibv_atomic_cap atomic_cap;\n\
  \    int                 max_ee;\n    int                 max_rdd;\n    int    \
  \             max_mw;\n    int                 max_raw_ipv6_qp;\n    int       \
  \          max_raw_ethy_qp;\n    int                 max_mcast_grp;\n    int   \
  \              max_mcast_qp_attach;\n    int                 max_total_mcast_qp_attach;\n\
  \    int                 max_ah;\n    int                 max_fmr;\n    int    \
  \             max_map_per_fmr;\n    int                 max_srq;\n    int      \
  \           max_srq_wr;\n    int                 max_srq_sge;\n    uint16_t    \
  \        max_pkeys;\n    uint8_t             local_ca_ack_delay;\n    uint8_t  \
  \           phys_port_cnt;\n};\n*/"
design_knowledge:
  description: 'System-wide configuration constants for the RDMA engine. These define
    hardware resource limits, bus widths, and protocol parameters. All values are
    numeric typedefs used throughout the codebase.

    '
meta:
  description: RDMA engine configuration constants
  name: Settings
module_type: typedef_only
project_context: 'This is part of an RDMA (RoCEv2) hardware engine implemented in
  Bluespec SystemVerilog. These constants define the device attributes and capabilities.

  '
typedefs:
- description: Target clock cycle time in nanoseconds
  name: TARGET_CYCLE_NS
  value: '2'
- description: Minimum number of packets that can be buffered in receive buffer
  name: MIN_PKT_NUM_IN_RECV_BUF
  value: '2'
- description: Maximum pending work completion entries, calculated as 2 * MAX_QP_WR
  name: MAX_PENDING_WORK_COMP_NUM
  value: TMul#(2, MAX_QP_WR)
- description: Width of the data bus in bits, must be power of 2
  name: DATA_BUS_WIDTH
  value: '256'
- description: Maximum memory region size (2GB = 2^31)
  name: MAX_MR_SIZE
  value: TExp#(31)
- description: Maximum page size capacity (2MB = 2^21)
  name: PAGE_SIZE_CAP
  value: TExp#(21)
- description: Maximum number of Queue Pairs
  name: MAX_QP
  value: '4'
- description: Maximum Work Requests per Queue Pair
  name: MAX_QP_WR
  value: '32'
- description: Maximum Scatter-Gather Elements per Work Request
  name: MAX_SGE
  value: '8'
- description: Maximum number of Completion Queues
  name: MAX_CQ
  value: '8'
- description: Maximum Completion Queue Entries (equals MAX_QP_WR)
  name: MAX_CQE
  value: MAX_QP_WR
- description: Maximum number of Memory Regions
  name: MAX_MR
  value: '256'
- description: Maximum number of Protection Domains
  name: MAX_PD
  value: '2'
- description: Maximum number of outstanding RDMA Read and Atomic operations per QP.
    Equals MAX_QP_WR / 2
  name: MAX_QP_RD_ATOM
  value: TDiv#(MAX_QP_WR, 2)
- description: Maximum number of destination RDMA Read and Atomic operations per QP.
    Equals MAX_QP_WR / 2
  name: MAX_QP_DST_RD_ATOM
  value: TDiv#(MAX_QP_WR, 2)
- description: Maximum number of Shared Receive Queues (0 = not supported)
  name: MAX_SRQ
  value: '0'
- description: Maximum Work Requests per Shared Receive Queue
  name: MAX_SRQ_WR
  value: MAX_QP_WR
- description: Maximum Scatter-Gather Elements per SRQ Work Request
  name: MAX_SRQ_SGE
  value: MAX_SGE
- description: Maximum scatter-gather elements for send operations
  name: MAX_SEND_SGE
  value: '1'
- description: Maximum scatter-gather elements for receive operations
  name: MAX_RECV_SGE
  value: '1'
- description: Maximum inline data size in bytes (0 = no inline data support)
  name: MAX_INLINE_DATA
  value: '0'
