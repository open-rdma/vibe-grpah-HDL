      \    IBV_WC_RDMA_READ          = 2,\n    IBV_WC_COMP_SWAP          = 3,\n    IBV_WC_FETCH_ADD          = 4,\n    IBV_WC_BIND_MW            = 5,\n    IBV_WC_LOCAL_INV          = 6,\n    IBV_WC_TSO\
      \                = 7,\n    // consumers can test if a completion is a receive by testing (opcode & IBV_WC_RECV)\n    IBV_WC_RECV               = 128, // 1 << 7\n    IBV_WC_RECV_RDMA_WITH_IMM = 129,\n\
