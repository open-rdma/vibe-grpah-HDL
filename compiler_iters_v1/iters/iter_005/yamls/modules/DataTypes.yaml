      \ PmtuValueWidth;\ntypedef Bit#(MAX_PMTU_WIDTH)       ResiduePMTU;\ntypedef Bit#(TOTAL_FRAG_NUM_WIDTH) TotalFragNum;\ntypedef Bit#(PMTU_FRAG_NUM_WIDTH)  PktFragNum;\ntypedef Bit#(PKT_NUM_WIDTH)  \
