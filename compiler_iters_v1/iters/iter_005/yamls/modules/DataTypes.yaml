      } PayloadConResp deriving(Bits, FShow);\n\ntypedef struct {\n    DmaReqSrcType initiator;\n    Bool casOrFetchAdd;\n    ADDR startAddr;\n    Long compData;\n    Long swapData;\n    QPN sqpn;\n   \
      \ PSN psn;\n} AtomicOpReq deriving(Bits);\n\ntypedef struct {\n    DmaReqSrcType initiator;\n    Long original;\n    QPN sqpn;\n    PSN psn;\n} AtomicOpResp deriving(Bits);\n\n// QP related types\n\
