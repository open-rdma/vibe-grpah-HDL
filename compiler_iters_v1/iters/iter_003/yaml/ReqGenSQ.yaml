  bsv_equivalent: "function Maybe#(IETH) genIETH(WorkReq wr);\n    return case (wr.opcode)\n\
    \        IBV_WR_SEND_WITH_INV: tagged Valid IETH {\n            rkey: unwrapMaybe(wr.rkey2Inv)\n\
    \        };\n        default             : tagged Invalid;\n    endcase;\nendfunction"
- name: unknown
  bsv_equivalent: "function Maybe#(Tuple3#(HeaderData, HeaderByteNum, Bool)) genFirstOrOnlyReqHeader(\n\
    \    WorkReq wr, CntrlStatus cntrlStatus, PSN psn, Bool isOnlyReqPkt\n);\n   \
    \ let maybeTrans  = qpType2TransType(cntrlStatus.getTypeQP);\n    let maybeOpCode\
    \ = genFirstOrOnlyReqRdmaOpCode(wr.opcode, isOnlyReqPkt);\n    let maybeDQPN \
    \  = getMaybeDestQpnSQ(wr, cntrlStatus);\n\n    let isReadOrAtomicWR = isReadOrAtomicWorkReq(wr.opcode);\n\
    \    if (\n        maybeTrans  matches tagged Valid .trans  &&&\n        maybeOpCode\
    \ matches tagged Valid .opcode &&&\n        maybeDQPN   matches tagged Valid .dqpn\n\
    \    ) begin\n        let bth = BTH {\n            trans    : trans,\n       \
    \     opcode   : opcode,\n            solicited: wr.solicited,\n            migReq\
    \   : unpack(0),\n            padCnt   : (isOnlyReqPkt && !isReadOrAtomicWR) ?\
    \ calcPadCnt(wr.len) : 0,\n            tver     : unpack(0),\n            pkey\
    \     : cntrlStatus.comm.getPKEY,\n            fecn     : unpack(0),\n       \
    \     becn     : unpack(0),\n            resv6    : unpack(0),\n            dqpn\
    \     : dqpn,\n            ackReq   : cntrlStatus.comm.getSigAll || (isOnlyReqPkt\
    \ && workReqRequireAck(wr)),\n            resv7    : unpack(0),\n            psn\
    \      : psn\n        };\n\n        let xrceth = genXRCETH(wr, cntrlStatus);\n\
    \        let deth = genDETH(wr, cntrlStatus);\n        let reth = genRETH(wr);\n\
    \        let atomicEth = genAtomicEth(wr);\n        let immDt = genImmDt(wr);\n\
    \        let ieth = genIETH(wr);\n\n        // If WR has zero length, then no\
    \ payload, no matter what kind of opcode\n        let hasPayload = workReqHasPayload(wr);\n\
    \        case (wr.opcode)\n            IBV_WR_RDMA_WRITE: begin\n            \
    \    return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC,\n  \
    \                  IBV_QPT_UC: tagged Valid tuple3(\n                        zeroExtendLSB({\
    \ pack(bth), pack(unwrapMaybe(reth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(RETH_BYTE_WIDTH)),\n                        hasPayload\n         \
    \           );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n \
    \                       zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)),\
    \ pack(unwrapMaybe(reth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)),\n                \
    \        hasPayload\n                    );\n                    default: tagged\
    \ Invalid;\n                endcase;\n            end\n            IBV_WR_RDMA_WRITE_WITH_IMM:\
    \ begin\n                return case (cntrlStatus.getTypeQP)\n               \
    \     IBV_QPT_RC,\n                    IBV_QPT_UC: tagged Valid tuple3(\n    \
    \                    isOnlyReqPkt ?\n                            zeroExtendLSB({\
    \ pack(bth), pack(unwrapMaybe(reth)), pack(unwrapMaybe(immDt))}) :\n         \
    \                   zeroExtendLSB({ pack(bth), pack(unwrapMaybe(reth))}),\n  \
    \                      isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(RETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n               \
    \             fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)),\n\
    \                        hasPayload\n                    );\n                \
    \    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        isOnlyReqPkt\
    \ ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)),\
    \ pack(unwrapMaybe(reth)), pack(unwrapMaybe(immDt)) }) :\n                   \
    \         zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(reth))\
    \ }),\n                        isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH))\
    \ :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
    \ + valueOf(RETH_BYTE_WIDTH)),\n                        hasPayload\n         \
    \           );\n                    default: tagged Invalid;\n               \
    \ endcase;\n            end\n            IBV_WR_SEND: begin\n                return\
    \ case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC,\n            \
    \        IBV_QPT_UC: tagged Valid tuple3(\n                        zeroExtendLSB(pack(bth)),\n\
    \                        fromInteger(valueOf(BTH_BYTE_WIDTH)),\n             \
    \           hasPayload\n                    );\n                    IBV_QPT_UD:\
    \ tagged Valid tuple3(\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(deth))\
    \ }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(DETH_BYTE_WIDTH)),\n\
    \                        hasPayload\n                    );\n                \
    \    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        zeroExtendLSB({\
    \ pack(bth), pack(unwrapMaybe(xrceth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n       \
    \             );\n                    default: tagged Invalid;\n             \
    \   endcase;\n            end\n            IBV_WR_SEND_WITH_IMM: begin\n     \
    \           return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC,\n\
    \                    IBV_QPT_UC: tagged Valid tuple3(\n                      \
    \  isOnlyReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(immDt))\
    \ }) :\n                            zeroExtendLSB(pack(bth)),\n              \
    \          isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(IMM_DT_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n\
    \                        hasPayload\n                    );\n                \
    \    IBV_QPT_UD: tagged Valid tuple3(\n                        // UD always has\
    \ only pkt\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(deth)),\
    \ pack(unwrapMaybe(immDt)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(DETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)),\n                \
    \        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND:\
    \ tagged Valid tuple3(\n                        isOnlyReqPkt ?\n             \
    \               zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(immDt))\
    \ }) :\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth))\
    \ }),\n                        isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n             \
    \               fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n\
    \                        hasPayload\n                    );\n                \
    \    default: tagged Invalid;\n                endcase;\n            end\n   \
    \         IBV_WR_SEND_WITH_INV: begin\n                return case (cntrlStatus.getTypeQP)\n\
    \                    IBV_QPT_RC: tagged Valid tuple3(\n                      \
    \  isOnlyReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(ieth))\
    \ }) :\n                            zeroExtendLSB(pack(bth)),\n              \
    \          isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(IETH_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n\
    \                        hasPayload\n                    );\n                \
    \    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        isOnlyReqPkt\
    \ ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)),\
    \ pack(unwrapMaybe(ieth)) }) :\n                            zeroExtendLSB({ pack(bth),\
    \ pack(unwrapMaybe(xrceth)) }),\n                        isOnlyReqPkt ?\n    \
    \                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
    \ + valueOf(IETH_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n       \
    \             );\n                    default: tagged Invalid;\n             \
    \   endcase;\n            end\n            IBV_WR_RDMA_READ: begin\n         \
    \       return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC: tagged\
    \ Valid tuple3(\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(reth))\
    \ }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)),\n\
    \                        False // Read requests have no payload\n            \
    \        );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n    \
    \                    zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(reth))\
    \ }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
    \ + valueOf(RETH_BYTE_WIDTH)),\n                        False // Read requests\
    \ have no payload\n                    );\n                    default: tagged\
    \ Invalid;\n                endcase;\n            end\n            IBV_WR_ATOMIC_CMP_AND_SWP\
    \  ,\n            IBV_WR_ATOMIC_FETCH_AND_ADD: begin\n                return case\
    \ (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC: tagged Valid tuple3(\n\
    \                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(atomicEth))\
    \ }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(ATOMIC_ETH_BYTE_WIDTH)),\n\
    \                        False // Atomic requests have no payload\n          \
    \          );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n  \
    \                      zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(atomicEth))\
    \ }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
