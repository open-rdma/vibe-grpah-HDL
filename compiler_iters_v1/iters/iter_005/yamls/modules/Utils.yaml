      \nfunction Bool compareAccessTypeFlags(\n    FlagsType#(MemAccessTypeFlag) flags1, FlagsType#(MemAccessTypeFlag) flags2\n);\n    return containFlags(flags1, flags2);\n    // return !isZero(pack(flags1\
