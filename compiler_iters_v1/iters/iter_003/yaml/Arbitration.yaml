functions:
- name: unknown
  bsv_equivalent: "function Tuple3#(Bool, Bit#(TLog#(portSz)), Vector#(portSz, Bool))\
    \ arbitrate(\n    Vector#(portSz, Bool) priorityVec, Vector#(portSz, Bool) requestVec\n\
    );\n    function Bool isTrue(Bool inputVal) = inputVal;\n\n    let portNum = valueOf(portSz);\n\
    \n    Vector#(portSz, Bool) grantVec = replicate(False);\n    Bit#(TLog#(portSz))\
    \   grantIdx = 0;\n\n    Bool found   = True;\n    Bool granted = False;\n   \
    \ for (Integer x = 0; x < (2 * portNum); x = x + 1) begin\n        Integer y =\
    \ (x % portNum);\n\n        let hasReq = requestVec[y];\n        let hasPriority\
    \ = priorityVec[y];\n\n        if (hasPriority) begin\n            found = False;\n\
    \        end\n\n        if (!found && hasReq) begin\n            grantVec[y] =\
    \ True;\n            grantIdx    = fromInteger(y);\n            found   = True;\n\
    \            granted = True;\n        end\n    end\n\n    let nextPriorityVec\
    \ = granted ? rotateR(grantVec) : priorityVec;\n    return tuple3(granted, grantIdx,\
    \ nextPriorityVec);\nendfunction"
