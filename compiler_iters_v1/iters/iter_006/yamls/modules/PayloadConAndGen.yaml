      \        hasPendingReqQ.deq;\n    endrule\n\n    rule gracefulStopReq if (!clearAll && cancelReg[1] && !gracefulStopReg[1]);\n        let dmaWriteReq = reqQ.first;\n\n        if (!dmaWriteReq.dataStream.isFirst)\
