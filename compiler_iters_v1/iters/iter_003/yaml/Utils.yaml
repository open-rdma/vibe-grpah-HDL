    \ begin\n            // 11 = log2(2048)\n            { len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 12], (len[11 : 0] - truncate(pktLen)) };\n        end\n        IBV_MTU_4096:\
    \ begin\n            // 12 = log2(4096)\n            { len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 13], (len[12 : 0] - truncate(pktLen)) };\n        end\n    endcase;\nendfunction"
- name: lenAddPktLen
  return_type: Length
  args: Length len, PktLen pktLen, PMTU pmtu
  bsv_equivalent: "function Length lenAddPktLen(Length len, PktLen pktLen, PMTU pmtu);\n\
    \    let oneAsPSN = 1;\n    return pktLenEqPMTU(pktLen, pmtu) ?\n        lenAddPsnMultiplyPMTU(len,\
    \ oneAsPSN, pmtu) :\n        case (pmtu)\n            IBV_MTU_256 : begin\n  \
    \              // 8 = log2(256)\n                { len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 8], pktLen[7 : 0] };\n            end\n            IBV_MTU_512 : begin\n \
    \               // 9 = log2(512)\n                { len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 9], pktLen[8 : 0] };\n            end\n            IBV_MTU_1024: begin\n \
    \               // 10 = log2(1024)\n                { len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 10], pktLen[9 : 0] };\n            end\n            IBV_MTU_2048: begin\n\
    \                // 11 = log2(2048)\n                { len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 11], pktLen[10 : 0] };\n            end\n            IBV_MTU_4096: begin\n\
    \                // 12 = log2(4096)\n                { len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 12], pktLen[11 : 0] };\n            end\n        endcase;\nendfunction"
- name: lenGtEqPktLen
  return_type: Bool
  args: Length len, PktLen pktLen, PMTU pmtu
  bsv_equivalent: "function Bool lenGtEqPktLen(Length len, PktLen pktLen, PMTU pmtu);\n\
    \    return case (pmtu)\n        IBV_MTU_256 : begin\n            // 8 = log2(256)\n\
    \            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 9)) lenHighPart = truncateLSB(len);\
    \ // [valueOf(RDMA_MAX_LEN_WIDTH)-1 : 9];\n            (!isZeroR(lenHighPart)\
    \ || (len[8 : 0] >= pktLen[8 : 0]));\n        end\n        IBV_MTU_512 : begin\n\
    \            // 9 = log2(512)\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 10))\
    \ lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1 : 10];\n \
    \           (!isZeroR(lenHighPart) || (len[9 : 0] >= pktLen[9 : 0]));\n      \
    \  end\n        IBV_MTU_1024: begin\n            // 10 = log2(1024)\n        \
    \    Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 11)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 11];\n            (!isZeroR(lenHighPart) || (len[10 : 0] >= pktLen[10 : 0]));\n\
    \        end\n        IBV_MTU_2048: begin\n            // 11 = log2(2048)\n  \
    \          Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 12)) lenHighPart = truncateLSB(len);\
    \ // [valueOf(RDMA_MAX_LEN_WIDTH)-1 : 12];\n            (!isZeroR(lenHighPart)\
    \ || (len[11 : 0] >= pktLen[11 : 0]));\n        end\n        IBV_MTU_4096: begin\n\
    \            // 12 = log2(4096)\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 13))\
    \ lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1 : 13];\n \
    \           (!isZeroR(lenHighPart) || (len[12 : 0] >= pktLen[12 : 0]));\n    \
    \    end\n    endcase;\nendfunction"
