knowledge:
  bsv:
    code: "import ClientServer :: *;\nimport FIFOF :: *;\nimport GetPut :: *;\nimport PAClib :: *;\n\nimport Controller :: *;\nimport DataTypes :: *;\nimport ExtractAndPrependPipeOut :: *;\nimport Headers\
      \ :: *;\nimport PayloadConAndGen :: *;\nimport PrimUtils :: *;\nimport Utils :: *;\n\nfunction Maybe#(QPN) getMaybeDestQpnSQ(WorkReq wr, CntrlStatus cntrlStatus);\n    return case (cntrlStatus.getTypeQP)\n\
      \        IBV_QPT_RC      ,\n        IBV_QPT_UC      ,\n        IBV_QPT_XRC_SEND: tagged Valid cntrlStatus.comm.getDQPN;\n        IBV_QPT_UD      : wr.dqpn;\n        default         : tagged Invalid;\n\
      \    endcase;\nendfunction\n\nfunction Maybe#(RdmaOpCode) genFirstOrOnlyReqRdmaOpCode(WorkReqOpCode wrOpCode, Bool isOnlyReqPkt);\n    return case (wrOpCode)\n        IBV_WR_RDMA_WRITE          :\
      \ tagged Valid (isOnlyReqPkt ? RDMA_WRITE_ONLY                : RDMA_WRITE_FIRST);\n        IBV_WR_RDMA_WRITE_WITH_IMM : tagged Valid (isOnlyReqPkt ? RDMA_WRITE_ONLY_WITH_IMMEDIATE : RDMA_WRITE_FIRST);\n\
      \        IBV_WR_SEND                : tagged Valid (isOnlyReqPkt ? SEND_ONLY                      : SEND_FIRST);\n        IBV_WR_SEND_WITH_IMM       : tagged Valid (isOnlyReqPkt ? SEND_ONLY_WITH_IMMEDIATE\
      \       : SEND_FIRST);\n        IBV_WR_SEND_WITH_INV       : tagged Valid (isOnlyReqPkt ? SEND_ONLY_WITH_INVALIDATE      : SEND_FIRST);\n        IBV_WR_RDMA_READ           : tagged Valid RDMA_READ_REQUEST;\n\
      \        IBV_WR_ATOMIC_CMP_AND_SWP  : tagged Valid COMPARE_SWAP;\n        IBV_WR_ATOMIC_FETCH_AND_ADD: tagged Valid FETCH_ADD;\n        default                    : tagged Invalid;\n    endcase;\n\
      endfunction\n\nfunction Maybe#(RdmaOpCode) genMiddleOrLastReqRdmaOpCode(WorkReqOpCode wrOpCode, Bool isLastReqPkt);\n    return case (wrOpCode)\n        IBV_WR_RDMA_WRITE         : tagged Valid (isLastReqPkt\
      \ ? RDMA_WRITE_LAST                : RDMA_WRITE_MIDDLE);\n        IBV_WR_RDMA_WRITE_WITH_IMM: tagged Valid (isLastReqPkt ? RDMA_WRITE_LAST_WITH_IMMEDIATE : RDMA_WRITE_MIDDLE);\n        IBV_WR_SEND\
      \               : tagged Valid (isLastReqPkt ? SEND_LAST                      : SEND_MIDDLE);\n        IBV_WR_SEND_WITH_IMM      : tagged Valid (isLastReqPkt ? SEND_LAST_WITH_IMMEDIATE       : SEND_MIDDLE);\n\
      \        IBV_WR_SEND_WITH_INV      : tagged Valid (isLastReqPkt ? SEND_LAST_WITH_INVALIDATE      : SEND_MIDDLE);\n        default                   : tagged Invalid;\n    endcase;\nendfunction\n\n\
      function Maybe#(XRCETH) genXRCETH(WorkReq wr, CntrlStatus cntrlStatus);\n    return case (cntrlStatus.getTypeQP)\n        IBV_QPT_XRC_SEND: tagged Valid XRCETH {\n            srqn: unwrapMaybe(wr.srqn),\n\
      \            rsvd: unpack(0)\n        };\n        default: tagged Invalid;\n    endcase;\nendfunction\n\nfunction Maybe#(DETH) genDETH(WorkReq wr, CntrlStatus cntrlStatus);\n    return case (cntrlStatus.getTypeQP)\n\
      \        IBV_QPT_UD: tagged Valid DETH {\n            qkey: unwrapMaybe(wr.qkey),\n            sqpn: cntrlStatus.comm.getSQPN,\n            rsvd: unpack(0)\n        };\n        default: tagged Invalid;\n\
      \    endcase;\nendfunction\n\nfunction Maybe#(RETH) genRETH(WorkReq wr);\n    return case (wr.opcode)\n        IBV_WR_RDMA_WRITE         ,\n        IBV_WR_RDMA_WRITE_WITH_IMM,\n        IBV_WR_RDMA_READ\
      \          : tagged Valid RETH {\n            va: wr.raddr,\n            rkey: wr.rkey,\n            dlen: wr.len\n        };\n        default                   : tagged Invalid;\n    endcase;\nendfunction\n\
      \nfunction Maybe#(AtomicEth) genAtomicEth(WorkReq wr);\n    if (wr.swap matches tagged Valid .swap &&& wr.comp matches tagged Valid .comp) begin\n        return case (wr.opcode)\n            IBV_WR_ATOMIC_CMP_AND_SWP\
      \  ,\n            IBV_WR_ATOMIC_FETCH_AND_ADD: tagged Valid AtomicEth {\n                va: wr.raddr,\n                rkey: wr.rkey,\n                swap: swap,\n                comp: comp\n  \
      \          };\n            default                    : tagged Invalid;\n        endcase;\n    end\n    else begin\n        return tagged Invalid;\n    end\nendfunction\n\nfunction Maybe#(ImmDt) genImmDt(WorkReq\
      \ wr);\n    return case (wr.opcode)\n        IBV_WR_RDMA_WRITE_WITH_IMM,\n        IBV_WR_SEND_WITH_IMM      : tagged Valid ImmDt {\n            data: unwrapMaybe(wr.immDt)\n        };\n        default\
      \                   : tagged Invalid;\n    endcase;\nendfunction\n\nfunction Maybe#(IETH) genIETH(WorkReq wr);\n    return case (wr.opcode)\n        IBV_WR_SEND_WITH_INV: tagged Valid IETH {\n   \
      \         rkey: unwrapMaybe(wr.rkey2Inv)\n        };\n        default             : tagged Invalid;\n    endcase;\nendfunction\n\nfunction Maybe#(Tuple3#(HeaderData, HeaderByteNum, Bool)) genFirstOrOnlyReqHeader(\n\
      \    WorkReq wr, CntrlStatus cntrlStatus, PSN psn, Bool isOnlyReqPkt\n);\n    let maybeTrans  = qpType2TransType(cntrlStatus.getTypeQP);\n    let maybeOpCode = genFirstOrOnlyReqRdmaOpCode(wr.opcode,\
      \ isOnlyReqPkt);\n    let maybeDQPN   = getMaybeDestQpnSQ(wr, cntrlStatus);\n\n    let isReadOrAtomicWR = isReadOrAtomicWorkReq(wr.opcode);\n    if (\n        maybeTrans  matches tagged Valid .trans\
      \  &&&\n        maybeOpCode matches tagged Valid .opcode &&&\n        maybeDQPN   matches tagged Valid .dqpn\n    ) begin\n        let bth = BTH {\n            trans    : trans,\n            opcode\
      \   : opcode,\n            solicited: wr.solicited,\n            migReq   : unpack(0),\n            padCnt   : (isOnlyReqPkt && !isReadOrAtomicWR) ? calcPadCnt(wr.len) : 0,\n            tver     :\
      \ unpack(0),\n            pkey     : cntrlStatus.comm.getPKEY,\n            fecn     : unpack(0),\n            becn     : unpack(0),\n            resv6    : unpack(0),\n            dqpn     : dqpn,\n\
      \            ackReq   : cntrlStatus.comm.getSigAll || (isOnlyReqPkt && workReqRequireAck(wr)),\n            resv7    : unpack(0),\n            psn      : psn\n        };\n\n        let xrceth = genXRCETH(wr,\
      \ cntrlStatus);\n        let deth = genDETH(wr, cntrlStatus);\n        let reth = genRETH(wr);\n        let atomicEth = genAtomicEth(wr);\n        let immDt = genImmDt(wr);\n        let ieth = genIETH(wr);\n\
      \n        // If WR has zero length, then no payload, no matter what kind of opcode\n        let hasPayload = workReqHasPayload(wr);\n        case (wr.opcode)\n            IBV_WR_RDMA_WRITE: begin\n\
      \                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC,\n                    IBV_QPT_UC: tagged Valid tuple3(\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(reth))\
      \ }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged\
      \ Valid tuple3(\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(reth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
      \ + valueOf(RETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_RDMA_WRITE_WITH_IMM:\
      \ begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC,\n                    IBV_QPT_UC: tagged Valid tuple3(\n                        isOnlyReqPkt ?\n      \
      \                      zeroExtendLSB({ pack(bth), pack(unwrapMaybe(reth)), pack(unwrapMaybe(immDt))}) :\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(reth))}),\n       \
      \                 isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
      \ + valueOf(RETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        isOnlyReqPkt ?\n   \
      \                         zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(reth)), pack(unwrapMaybe(immDt)) }) :\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)),\
      \ pack(unwrapMaybe(reth)) }),\n                        isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH))\
      \ :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n       \
      \             default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_SEND: begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC,\n\
      \                    IBV_QPT_UC: tagged Valid tuple3(\n                        zeroExtendLSB(pack(bth)),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n\
      \                    );\n                    IBV_QPT_UD: tagged Valid tuple3(\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(deth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH)\
      \ + valueOf(DETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        zeroExtendLSB({ pack(bth),\
      \ pack(unwrapMaybe(xrceth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n          \
      \          default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_SEND_WITH_IMM: begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC,\n\
      \                    IBV_QPT_UC: tagged Valid tuple3(\n                        isOnlyReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(immDt)) }) :\n              \
      \              zeroExtendLSB(pack(bth)),\n                        isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n                \
      \            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_UD: tagged Valid tuple3(\n                        // UD\
      \ always has only pkt\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(deth)), pack(unwrapMaybe(immDt)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(DETH_BYTE_WIDTH)\
      \ + valueOf(IMM_DT_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        isOnlyReqPkt ?\n \
      \                           zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(immDt)) }) :\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)) }),\n\
      \                        isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
      \ + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_SEND_WITH_INV:\
      \ begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC: tagged Valid tuple3(\n                        isOnlyReqPkt ?\n                            zeroExtendLSB({\
      \ pack(bth), pack(unwrapMaybe(ieth)) }) :\n                            zeroExtendLSB(pack(bth)),\n                        isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
      \ + valueOf(IETH_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND:\
      \ tagged Valid tuple3(\n                        isOnlyReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(ieth)) }) :\n                   \
      \         zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)) }),\n                        isOnlyReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)\
      \ + valueOf(IETH_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n      \
      \              default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_RDMA_READ: begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC:\
      \ tagged Valid tuple3(\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(reth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)),\n \
      \                       False // Read requests have no payload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        zeroExtendLSB({ pack(bth),\
      \ pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(reth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)),\n                  \
      \      False // Read requests have no payload\n                    );\n                    default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_ATOMIC_CMP_AND_SWP\
      \  ,\n            IBV_WR_ATOMIC_FETCH_AND_ADD: begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC: tagged Valid tuple3(\n                        zeroExtendLSB({\
      \ pack(bth), pack(unwrapMaybe(atomicEth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(ATOMIC_ETH_BYTE_WIDTH)),\n                        False // Atomic requests have\
      \ no payload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(atomicEth))\
      \ }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(ATOMIC_ETH_BYTE_WIDTH)),\n                        False // Atomic requests have no payload\n\
      \                    );\n                    default: tagged Invalid;\n                endcase;\n            end\n            default: return tagged Invalid;\n        endcase\n    end\n    else begin\n\
      \        return tagged Invalid;\n    end\nendfunction\n\nfunction Maybe#(Tuple3#(HeaderData, HeaderByteNum, Bool)) genMiddleOrLastReqHeader(\n    WorkReq wr, CntrlStatus cntrlStatus, PSN psn, Bool\
      \ isLastReqPkt\n);\n    let maybeTrans  = qpType2TransType(cntrlStatus.getTypeQP);\n    let maybeOpCode = genMiddleOrLastReqRdmaOpCode(wr.opcode, isLastReqPkt);\n    let maybeDQPN   = getMaybeDestQpnSQ(wr,\
      \ cntrlStatus);\n\n    if (\n        maybeTrans  matches tagged Valid .trans  &&&\n        maybeOpCode matches tagged Valid .opcode &&&\n        maybeDQPN   matches tagged Valid .dqpn\n    ) begin\n\
      \        let bth = BTH {\n            trans    : trans,\n            opcode   : opcode,\n            solicited: wr.solicited,\n            migReq   : unpack(0),\n            padCnt   : isLastReqPkt\
      \ ? calcPadCnt(wr.len) : 0,\n            tver     : unpack(0),\n            pkey     : cntrlStatus.comm.getPKEY,\n            fecn     : unpack(0),\n            becn     : unpack(0),\n           \
      \ resv6    : unpack(0),\n            dqpn     : dqpn,\n            ackReq   : cntrlStatus.comm.getSigAll || (isLastReqPkt && workReqRequireAck(wr)),\n            resv7    : unpack(0),\n          \
      \  psn      : psn\n        };\n\n        let xrceth = genXRCETH(wr, cntrlStatus);\n        let immDt = genImmDt(wr);\n        let ieth = genIETH(wr);\n\n        let hasPayload = True;\n        case\
      \ (wr.opcode)\n            IBV_WR_RDMA_WRITE:begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC: tagged Valid tuple3(\n                        zeroExtendLSB(pack(bth)),\n\
      \                        fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n           \
      \             zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n\
      \                    );\n                    default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_RDMA_WRITE_WITH_IMM: begin\n                return case (cntrlStatus.getTypeQP)\n\
      \                    IBV_QPT_RC: tagged Valid tuple3(\n                        isLastReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(immDt))}) :\n               \
      \             zeroExtendLSB(pack(bth)),\n                        isLastReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n                 \
      \           fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        isLastReqPkt\
      \ ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(immDt)) }) :\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth))\
      \ }),\n                        isLastReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n                      \
      \      fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    default: tagged Invalid;\n              \
      \  endcase;\n            end\n            IBV_WR_SEND: begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC: tagged Valid tuple3(\n                        zeroExtendLSB(pack(bth)),\n\
      \                        fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n           \
      \             zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)) }),\n                        fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n\
      \                    );\n                    default: tagged Invalid;\n                endcase;\n            end\n            IBV_WR_SEND_WITH_IMM: begin\n                return case (cntrlStatus.getTypeQP)\n\
      \                    IBV_QPT_RC: tagged Valid tuple3(\n                        isLastReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(immDt)) }) :\n              \
      \              zeroExtendLSB(pack(bth)),\n                        isLastReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n                \
      \            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                       \
      \ isLastReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)), pack(unwrapMaybe(immDt)) }) :\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth))\
      \ }),\n                        isLastReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH)) :\n                      \
      \      fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n                    );\n                    default: tagged Invalid;\n              \
      \  endcase;\n            end\n            IBV_WR_SEND_WITH_INV: begin\n                return case (cntrlStatus.getTypeQP)\n                    IBV_QPT_RC: tagged Valid tuple3(\n                 \
      \       isLastReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(ieth)) }) :\n                            zeroExtendLSB(pack(bth)),\n                        isLastReqPkt\
      \ ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(IETH_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)),\n                        hasPayload\n\
      \                    );\n                    IBV_QPT_XRC_SEND: tagged Valid tuple3(\n                        isLastReqPkt ?\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)),\
      \ pack(unwrapMaybe(ieth)) }) :\n                            zeroExtendLSB({ pack(bth), pack(unwrapMaybe(xrceth)) }),\n                        isLastReqPkt ?\n                            fromInteger(valueOf(BTH_BYTE_WIDTH)\
      \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(IETH_BYTE_WIDTH)) :\n                            fromInteger(valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH)),\n                        hasPayload\n \
      \                   );\n                    default: tagged Invalid;\n                endcase;\n            end\n            default: return tagged Invalid;\n        endcase\n    end\n    else begin\n\
      \        return tagged Invalid;\n    end\nendfunction\n\ntypedef struct {\n    PSN            curPSN;\n    PendingWorkReq pendingWR;\n    Bool           isFirstReqPkt;\n    Bool           isLastReqPkt;\n\
      } ReqPktHeaderInfo deriving(Bits);\n\ntypedef struct {\n    Bool isNewWorkReq;\n    Bool isZeroPmtuResidue;\n    Bool isReliableConnection;\n    Bool isUnreliableDatagram;\n    Bool needDmaRead;\n\
      } WorkReqInfo deriving(Bits, FShow);\n\ninterface ReqGenSQ;\n    interface PipeOut#(PendingWorkReq) pendingWorkReqPipeOut;\n    interface DataStreamPipeOut rdmaReqDataStreamPipeOut;\n    interface\
      \ PipeOut#(WorkCompGenReqSQ) workCompGenReqPipeOut;\n    method Bool reqHeaderOutNotEmpty();\nendinterface\n\nmodule mkReqGenSQ#(\n    ContextSQ contextSQ,\n    PayloadGenerator payloadGenerator,\n\
      \    // DmaReadSrv dmaReadSrv,\n    PipeOut#(PendingWorkReq) pendingWorkReqPipeIn,\n    Bool pendingWorkReqBufNotEmpty\n)(ReqGenSQ);\n    // Output FIFO for PipeOut\n    FIFOF#(PendingWorkReq)   pendingWorkReqOutQ\
      \ <- mkFIFOF;\n    FIFOF#(WorkCompGenReqSQ) workCompGenReqOutQ <- mkFIFOF;\n\n    // Pipeline FIFO\n    FIFOF#(Tuple7#(\n        PendingWorkReq, PktNum, ResiduePMTU, Bool, Bool, Bool, Bool\n    ))\
      \ workReqPayloadGenQ <- mkFIFOF;\n    FIFOF#(Tuple3#(PendingWorkReq, PktNum, WorkReqInfo)) workReqPktNumQ <- mkFIFOF;\n    FIFOF#(Tuple2#(PendingWorkReq, WorkReqInfo))            workReqPsnQ <- mkFIFOF;\n\
      \    FIFOF#(Tuple2#(PendingWorkReq, WorkReqInfo))            workReqOutQ <- mkFIFOF;\n    FIFOF#(Tuple2#(PendingWorkReq, WorkReqInfo))          workReqCheckQ <- mkFIFOF;\n    FIFOF#(Tuple2#(PendingWorkReq,\
      \ WorkReqInfo))              reqCountQ <- mkFIFOF;\n    FIFOF#(Tuple2#(ReqPktHeaderInfo, WorkReqInfo))    reqHeaderPrepareQ <- mkFIFOF;\n    FIFOF#(Tuple4#(\n        PendingWorkReq, WorkReqInfo, Maybe#(Tuple3#(HeaderData,\
      \ HeaderByteNum, Bool)), PSN\n    )) pendingReqHeaderQ <- mkFIFOF;\n    FIFOF#(Tuple4#(\n        PendingWorkReq, Maybe#(HeaderRDMA), Maybe#(PayloadGenResp), PSN\n    )) reqHeaderGenQ <- mkFIFOF;\n\
      \    FIFOF#(HeaderRDMA)  reqHeaderOutQ <- mkFIFOF;\n    FIFOF#(PSN)            psnReqOutQ <- mkFIFOF;\n\n    let cntrlStatus = contextSQ.statusSQ;\n\n    function Action flushInternalNormalStatePipelineQ();\n\
      \        action\n            workReqPktNumQ.clear;\n            workReqPsnQ.clear;\n            workReqOutQ.clear;\n            workReqCheckQ.clear;\n            reqCountQ.clear;\n            reqHeaderPrepareQ.clear;\n\
      \            pendingReqHeaderQ.clear;\n            reqHeaderGenQ.clear;\n            reqHeaderOutQ.clear;\n            psnReqOutQ.clear;\n        endaction\n    endfunction\n\n    Reg#(PktNum)   remainingPktNumReg\
      \ <- mkRegU;\n    Reg#(PSN)               curPsnReg <- mkRegU;\n    Reg#(Bool)       isNormalStateReg <- mkReg(True);\n    Reg#(Bool) isFirstOrOnlyReqPktReg <- mkReg(True);\n\n    let rdmaReqPipeOut\
      \ <- mkCombineHeaderAndPayload(\n        cntrlStatus,\n        toPipeOut(reqHeaderOutQ),\n        toPipeOut(psnReqOutQ),\n        payloadGenerator.payloadDataStreamPipeOut\n    );\n\n    (* no_implicit_conditions,\
      \ fire_when_enabled *)\n    rule resetAndClear if (cntrlStatus.comm.isReset);\n        // Flush output FIFO\n        pendingWorkReqOutQ.clear;\n        workCompGenReqOutQ.clear;\n\n        // Flush\
      \ pipeline FIFO\n        workReqPayloadGenQ.clear;\n        flushInternalNormalStatePipelineQ;\n        // psnReqOutQ.clear;\n\n        // payloadGenReqOutQ.clear;\n\n        isNormalStateReg    \
      \   <= True;\n        isFirstOrOnlyReqPktReg <= True;\n\n        // $display(\"time=%0t: reset and clear mkReqGenSQ\", $time);\n    endrule\n\n    // rule debugNotFullSQ if (!(\n    //     workReqPayloadGenQ.notFull\
      \ &&\n    //     workReqPktNumQ.notFull     &&\n    //     workReqPsnQ.notFull        &&\n    //     workReqOutQ.notFull        &&\n    //     workReqCheckQ.notFull      &&\n    //     reqCountQ.notFull\
      \          &&\n    //     reqHeaderPrepareQ.notFull  &&\n    //     pendingReqHeaderQ.notFull  &&\n    //     reqHeaderGenQ.notFull      &&\n    //     reqHeaderOutQ.notFull      &&\n    //     psnReqOutQ.notFull\
