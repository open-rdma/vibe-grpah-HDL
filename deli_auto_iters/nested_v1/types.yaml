types:
  Bit_N:
    description: "Generic N-bit vector. Bit#(N) where N is a numeric type parameter. Always parameterized by the module."
    category: "builtin"
  Bool:
    description: "Boolean type, values True/False"
    category: "builtin"
  Reg_T:
    description: "Bluespec Reg#(T): stores state, methods _write(T val) and _read() returning T"
    category: "builtin"
  FIFOF_T:
    description: "Bluespec FIFOF#(T): FIFO queue, methods enq(T), deq(), first(), clear(), notEmpty(), notFull()"
    category: "builtin"
  Maybe_T:
    description: "Bluespec Maybe#(T): tagged Valid value or tagged Invalid"
    category: "builtin"
  PipeOut_T:
    description: "Bluespec PipeOut#(T): methods T first(), Action deq(), Bool notEmpty()"
    category: "builtin"
