      endfunction\n\nfunction Tuple3#(BusBitNum, ByteEnBitNum, BusBitNum) calcFragBitNumAndByteNum(\n    ByteEnBitNum fragValidByteNum\n);\n    BusBitNum fragValidBitNum = zeroExtend(fragValidByteNum) <<\
      \ 3;\n    ByteEnBitNum fragInvalidByteNum =\n        fromInteger(valueOf(DATA_BUS_BYTE_WIDTH)) - fragValidByteNum;\n    BusBitNum fragInvalidBitNum = zeroExtend(fragInvalidByteNum) << 3;\n\n    return\
      \ tuple3(fragValidBitNum, fragInvalidByteNum, fragInvalidBitNum);\nendfunction\n\n// TODO: check timing of the for loop\n// TODO: refactor the for loop using case statement\nfunction Maybe#(ByteEnBitNum)\
      \ calcFragByteNumFromByteEn(ByteEn fragByteEn);\n    let rightAlignedByteEn = reverseBits(fragByteEn);\n    Maybe#(ByteEnBitNum) byteEnBitNum = tagged Invalid;\n    let step = valueOf(FRAG_MIN_VALID_BYTE_NUM);\n\
      \    // Bool matched = False;\n    for (\n        Integer idx = 0;\n        idx <= valueOf(DATA_BUS_BYTE_WIDTH);\n        idx = idx + step\n    ) begin\n        if (rightAlignedByteEn == (fromInteger(1)\
