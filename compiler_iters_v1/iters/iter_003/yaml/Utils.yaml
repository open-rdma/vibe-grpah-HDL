  bsv_equivalent: "function PendingWorkReq genNewPendingWorkReq(WorkReq wr) = PendingWorkReq\
    \ {\n    wr: wr,\n    startPSN: tagged Invalid,\n    endPSN: tagged Invalid,\n\
    \    pktNum: tagged Invalid,\n    isOnlyReqPkt: tagged Invalid\n};\n\n/*\nmodule\
