      , fshow(maybeMiddleOrLastHeaderGenInfo),\n                    \" is not valid, and current WR=\", fshow(pendingWR.wr)\n                )\n            );\n\n            maybeReqHeaderGenInfo = maybeMiddleOrLastHeaderGenInfo;\n\
