meta:
  name: "round_robin_arbiter"
  description: "Round-robin arbiter that provides fair arbitration among requestors. After granting a requestor, that requestor becomes lowest priority for the next cycle."
  knowledge: |
    # mkRoundRobinArbiter

    ## Purpose
    Fair round-robin arbiter. Maintains a rotating priority so that every requestor
    gets a turn. After a requestor is granted, it moves to the back of the priority queue.

    ## Internal Architecture
    - Maintains a priority state: a one-hot mask (Bit#(reqNum)) indicating which
      requestor currently has the highest priority
    - The priority mask starts with bit 0 as highest priority (priorityOneHot = 1)
    - On each grant, the priority rotates: the NEXT bit after the granted one becomes
      the new highest priority, wrapping around from bit (reqNum-1) to bit 0
    - e.g., after granting bit 0, bit 1 becomes highest priority (rotate RIGHT: i → i+1)
    - Priority rotation: nextPriority = {grant[0], grant[reqNum-1:1]}
      This shifts the grant one-hot right by 1, wrapping bit 0 to MSB

    ## Submodule
    Instantiates ONE mkPriorityEncoder (see child node "encoder_inst") to perform
    fixed-priority encoding within the current priority window.

    ## Arbitration Algorithm
    1. Compute a "high mask" = priorityOneHot - 1 (bits BELOW the priority position set to 1)
    2. High-priority requests = reqVec & ~highMask (bits at/after priority position)
    3. Low-priority requests = reqVec & highMask (bits before priority position)
    4. Use mkPriorityEncoder on the high-priority subset first
    5. If no high-priority request wins, use mkPriorityEncoder on the low-priority subset
    6. If a grant is issued (grant != 0), rotate priority RIGHT by 1 bit position
    7. Return the final grant

provisos:
  - "Add#(1, _, reqNum)"                                          # reqNum >= 1
  - "NumAlias#(TLog#(reqNum), logReqNum)"                          # alias for log2(reqNum)
  - "Add#(TLog#(reqNum), 1, TLog#(TAdd#(1, reqNum)))"             # reqNum must be power of 2

ports:
  - name: "reqVec"
    direction: "input"
    category: "data"
    type: "Bit#(reqNum)"
    description: "Request vector from requestors"

  - name: "grantVec"
    direction: "output"
    category: "data"
    type: "Bit#(reqNum)"
    description: "One-hot grant vector. Only one bit is asserted."

signals:
  - name: "priorityOneHot"
    type: "Reg#(Bit#(reqNum))"
    init: "1  (bit 0 starts with highest priority)"
    description: "One-hot priority mask tracking which requestor has highest priority"

methods:
  - name: "grant"
    arguments:
      - name: "reqVec"
        type: "Bit#(reqNum)"
    returns: "ActionValue#(Bit#(reqNum))"
    maps_to_port: "grantVec"
    description: "Returns one-hot grant, updates internal priority state on grant"

nodes:
  - id: "encoder_inst"
    ref: "library/priority_encoder/priority_encoder.yaml"
    description: "Fixed-priority encoder used for selecting within priority window"
    parameters:
      reqNum: "reqNum"

connections:
  - from: { node: "graph_input", port: "reqVec" }
    to:
      - { node: "encoder_inst", port: "reqVec" }
      - { signal: "reqVec_copy" }
    description: "Request vector feeds both the encoder and the priority mask calculation"

  - from: { node: "encoder_inst", port: "grantVec" }
    to: [{ signal: "highGrant" }]
    description: "Encoder's fixed-priority result feeds into the round-robin selection logic"
