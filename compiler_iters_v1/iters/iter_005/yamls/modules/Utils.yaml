      // Header related\n\nfunction HeaderByteEn genHeaderByteEn(HeaderByteNum headerLen);\n    return reverseBits((1 << headerLen) - 1);\nendfunction\n\nfunction Tuple2#(HeaderFragNum, ByteEnBitNum) calcHeaderFragNumAndLastFragValidByeNum(\n\
