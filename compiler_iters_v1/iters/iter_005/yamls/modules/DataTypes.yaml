      \ Bit#(TIMER_WIDTH)     RnrTimer;\n\ntypedef Bit#(TLog#(ATOMIC_ADDR_BYTE_ALIGNMENT)) AtomicAddrByteAlignment;\n\ntypedef Bit#(RNR_WAIT_CYCLE_CNT_WIDTH) RnrWaitCycleCnt;\ntypedef Bit#(TIMEOUT_CYCLE_CNT_WIDTH)\
