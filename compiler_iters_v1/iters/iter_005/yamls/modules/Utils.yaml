      endfunction\n\nfunction PktFragNum calcFragNumByPMTU(PMTU pmtu) provisos(\n    // Check DATA_BUS_BYTE_WIDTH must be power of 2\n    Add#(TLog#(DATA_BUS_BYTE_WIDTH), 1, TLog#(TAdd#(1, DATA_BUS_BYTE_WIDTH)))\n\
