      \ <- mkFIFOF;\n\n    Reg#(Bool) gracefulStopReg[2] <- mkCReg(2, False);\n    Reg#(Bool)       cancelReg[2] <- mkCReg(2, False);\n\n    let clearAll = cntrlStatus.comm.isReset;\n\n    rule resetAndClear\
