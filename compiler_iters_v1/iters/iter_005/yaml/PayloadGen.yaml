    \            //     \", curPayloadFrag.byteEn=%h\", curPayloadFrag.byteEn\n  \
    \          // );\n            return nextPrePayloadFrag;\n        endactionvalue\n\
    \    endfunction"
- name: unknown
  bsv_equivalent: "    function ActionValue#(DataStream) preprocessNextSGL();\n  \
