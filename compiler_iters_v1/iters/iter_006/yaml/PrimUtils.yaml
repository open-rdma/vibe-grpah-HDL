meta:
  name: PrimUtils
  description: Primitive utility functions and types for the RDMA engine

module_type: typedef_and_functions

project_context: >
  PrimUtils provides foundational utility functions used throughout the RDMA engine.
  Includes bit manipulation helpers (isZero, isOne, isAllOnes), tuple accessors,
  immediate assertions, the FlagsType generic, and the CountCF credit counter module.

design_knowledge:
  description: >
    Collection of primitive utility functions and types including:
    - Bit manipulation: isZero, isOne, isAllOnes, isLessOrEqOne, isLargerThanOne
    - Recursive bit check variants: isZeroR, isOneR, isAllOnesR
    - Byte enable checks: isZeroByteEn
    - Tuple accessors: getTupleFirst through getTupleSixth
    - Assertions: immAssert (compile-time), immFail
    - PipeOut conversion: toPipeOut
    - Generic FlagsType with FShow instance
    - CountCF: conflict-free credit counter module (CF = Conflict Free)

typedefs:
  - name: TWO
    value: "2"
  - name: FOUR
    value: "4"

enums: []

structs:
  - name: FlagsType
    description: >
      Generic flags wrapper type. Wraps a Bit vector where each bit corresponds
      to an enum variant. Parameterized by the enum type.
    deriving: Bits, Bitwise, Eq
    fields:
      - name: flags
        type: "Bit#(SizeOf#(enumType))"

functions:
  - name: isZero
    return_type: Bool
    args: "Bit#(nSz) bits"
    description: >
      Returns True if all bits are zero. Uses reduction OR (|bits), then logical NOT.
      Implementation: Bool ret = unpack(|bits); return !ret;

  - name: isZeroR
    return_type: Bool
    args: "Bit#(nSz) bits"
    description: >
      Recursive zero check using divide-and-conquer. Splits bits in half,
      recursively checks each half. provisos: NumAlias#(TDiv#(nSz, 2), halfSz)

  - name: isZeroByteEn
    return_type: Bool
    args: "Bit#(nSz) byteEn"
    description: >
      Checks if byte enable is all zeros. Combines MSB and LSB parts before checking.

  - name: isLessOrEqOne
    return_type: Bool
    args: "Bit#(nSz) bits"
    description: >
      Returns True if the value is 0 or 1. Shifts right by 1 and checks if zero.

  - name: isOne
    return_type: Bool
    args: "Bit#(nSz) bits"
    description: >
      Returns True exactly when value is 1. Uses isLessOrEqOne AND checks lsb is 1.

  - name: isAllOnesR
    return_type: Bool
    args: "Bit#(nSz) bits"
    description: >
      Recursive all-ones check. provisos: NumAlias#(TDiv#(nSz, 2), halfSz)

  - name: isLargerThanOne
    return_type: Bool
    args: "Bit#(nSz) bits"
    description: >
      Returns True if value > 1. Checks bits>>1 is non-zero.

  - name: isZero4LargeBits
    return_type: "Tuple2#(Bool, Bool)"
    args: "Bit#(nSz) bits"
    description: >
      For 32-64 bit values. Returns (isHighPartZero, isLowPartZero).

  - name: zeroExtendLSB
    return_type: "Bit#(nSz)"
    args: "Bit#(mSz) bits"
    description: >
      Zero-extend by appending 0 to LSB: { bits, 0 }. provisos: Add#(mSz, anysize, nSz)

  - name: removeMSB
    return_type: "Bit#(TSub#(nSz, 1))"
    args: "Bit#(nSz) bits"
    description: >
      Remove most significant bit. provisos: Add#(1, anysize, nSz)

  - name: dontCareValue
    return_type: anytype
    args: ""
    description: >
      Returns don't-care value (?). provisos: Bits#(anytype, tSz)

  - name: unwrapMaybe
    return_type: anytype
    args: "Maybe#(anytype) maybe"
    description: >
      Unwrap Maybe: returns value if Valid, ? if Invalid. provisos: Bits#(anytype, tSz)

  - name: unwrapMaybeWithDefault
    return_type: anytype
    args: "Maybe#(anytype) maybe, anytype defaultVal"
    description: >
      Unwrap Maybe with explicit default value. provisos: Bits#(anytype, nSz)

  - name: getTupleFirst
    return_type: anytype1
    args: "Tuple2#(anytype1, anytype2) tupleVal"
    description: "Return first element of 2-tuple using tpl_1"

  - name: getTupleSecond
    return_type: anytype2
    args: "Tuple2#(anytype1, anytype2) tupleVal"
    description: "Return second element of 2-tuple using tpl_2"

  - name: immAssert
    return_type: Action
    args: "Bool condition, String assertName, Fmt assertFmtMsg"
    description: >
      Immediate assertion: prints position and message, calls $finish(1) on failure.

  - name: immFail
    return_type: Action
    args: "String assertName, Fmt assertFmtMsg"
    description: >
      Always-fail assertion: prints position and message, calls $finish(1).

  - name: toPipeOut
    return_type: "PipeOut#(anytype)"
    args: "FIFOF#(anytype) queue"
    description: "Convert FIFOF to PipeOut interface"

  - name: enum2Flag
    return_type: "FlagsType#(enumType)"
    args: "enumType inputVal"
    description: >
      Convert enum value to FlagsType. provisos: Bits#(enumType, tSz), Flags#(enumType)

  - name: containFlags
    return_type: Bool
    args: "FlagsType#(enumType) flags1, FlagsType#(enumType) flags2"
    description: >
      Check if flags1 contains all bits of flags2. provisos: Bits#(enumType, tSz), Flags#(enumType)

  - name: containEnum
    return_type: Bool
    args: "FlagsType#(enumType) flags, enumType enumVal"
    description: >
      Check if flags contain a specific enum value. provisos: Bits#(enumType, tSz), Flags#(enumType)

module_def:
  name: mkCountCF
  interface_name: CountCF
  methods:
    - name: incrOne
      return_type: Action
      args: ""
    - name: decrOne
      return_type: Action
      args: ""
    - name: _write
      return_type: Action
      args: "anytype write_val"
    - name: _read
      return_type: anytype
      args: ""

behavior:
  description: >
    CountCF is a conflict-free counter module. It supports concurrent
    increment, decrement, and write operations without scheduling conflicts.

    Implementation approach:
    1. Use mkCReg(2, ...) for all control state (writeReg, incrReg, decrReg)
    2. Use mkFIFOF for incrQ and decrQ to buffer requests
    3. Four rules with proper scheduling attributes:
       - write: (* no_implicit_conditions, fire_when_enabled *) - priority over incr/decr
       - increment: enqueues incr request, uses incrQ
       - decrement: enqueues decr request, uses decrQ
       - incrAndDecr: applies pending incr/decr to cntReg

    The Module is parameterized by anytype with Arith# and Bits# provisos.

state_elements:
  - name: cntReg
    type: "Reg#(anytype)"
    init: resetVal
  - name: incrQ
    type: "FIFOF#(Bool)"
  - name: decrQ
    type: "FIFOF#(Bool)"
  - name: writeReg
    type: "Reg#(Maybe#(anytype))[2]"
    init: "mkCReg(2, tagged Invalid)"
  - name: incrReg
    type: "Reg#(Bool)[2]"
    init: "mkCReg(2, False)"
  - name: decrReg
    type: "Reg#(Bool)[2]"
    init: "mkCReg(2, False)"

rules:
  - name: write
    description: When writeReg[1] has valid value, write it to cntReg and clear all pending incr/decr
  - name: increment
    description: Dequeue from incrQ and set incrReg[0]
  - name: decrement
    description: Dequeue from decrQ and set decrReg[0]
  - name: incrAndDecr
    description: Apply pending incr/decr to cntReg based on incrReg[1] and decrReg[1] flags
