types:
  HeaderRDMA:
    description: >
      Struct: { HeaderData headerData; HeaderByteEn headerByteEn; HeaderMetaData headerMetaData; }
      HeaderData = Bit#(512), HeaderByteEn = Bit#(64)
    category: "user"
  HeaderMetaData:
    description: >
      Struct: { HeaderByteNum headerLen; HeaderFragNum headerFragNum;
      ByteEnBitNum lastFragValidByteNum; Bool hasPayload; Bool isEmptyHeader; }
      HeaderByteNum = Bit#(7), HeaderFragNum = Bit#(2), ByteEnBitNum = Bit#(6)
    category: "user"
  DataStream:
    description: >
      Struct: { DATA data; ByteEn byteEn; Bool isFirst; Bool isLast; }
      DATA = Bit#(256), ByteEn = Bit#(32)
    category: "user"
  PSN:
    description: "Packet Sequence Number. Bit#(PSN_WIDTH) = Bit#(24). Import from Headers package."
    category: "builtin"
  CntrlStatus:
    description: >
      Control status struct. Contains sub-struct 'comm' which has Bool field 'isReset'.
      When isReset is True, the design is in reset state. Import from Controller package.
      Access pattern: cntrlStatus.comm.isReset
    category: "user"
  PipeOut_T:
    description: "Bluespec PipeOut#(T): method T first(), Action deq(), Bool notEmpty()"
    category: "builtin"
  DataStreamPipeOut:
    description: "Alias for PipeOut#(DataStream)"
    category: "builtin"
  FIFOF_T:
    description: "Bluespec FIFOF: enq(T), deq(), first(), clear(), notEmpty(), notFull()"
    category: "builtin"
  Bool:
    description: "Boolean type"
    category: "builtin"
  Get_T:
    description: "Bluespec Get#(T): ActionValue#(T) get()"
    category: "builtin"
  Put_T:
    description: "Bluespec Put#(T): Action put(T)"
    category: "builtin"
