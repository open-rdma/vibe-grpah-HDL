      \ enum {\n    PKT_ST_VALID,\n    PKT_ST_LEN_ERR\n    // PKT_ST_QP_ACC_ERR,\n    // PKT_ST_DISCARD\n} PktVeriStatus deriving(Bits, Bounded, Eq, FShow);\n\ntypedef struct {\n    PktLen pktPayloadLen;\n\
