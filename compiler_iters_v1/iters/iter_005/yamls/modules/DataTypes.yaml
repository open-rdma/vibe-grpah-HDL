      \    struct {\n        DmaWriteMetaData atomicRespDmaWriteMetaData;\n        Long atomicRespPayload;\n    } AtomicRespInfoAndPayload;\n    DmaWriteMetaData SendWriteReqReadRespInfo;\n} PayloadConInfo\
