      \ PktLen calcPmtuLen(PMTU pmtu);\n    return fromInteger(case (pmtu)\n        IBV_MTU_256 :  256;\n        IBV_MTU_512 :  512;\n        IBV_MTU_1024: 1024;\n        IBV_MTU_2048: 2048;\n        IBV_MTU_4096:\
