- name: calcFragByteNumFromByteEn
  return_type: Maybe#(ByteEnBitNum)
  args: ByteEn fragByteEn
  bsv_equivalent: "function Maybe#(ByteEnBitNum) calcFragByteNumFromByteEn(ByteEn\
    \ fragByteEn);\n    let rightAlignedByteEn = reverseBits(fragByteEn);\n    Maybe#(ByteEnBitNum)\
    \ byteEnBitNum = tagged Invalid;\n    let step = valueOf(FRAG_MIN_VALID_BYTE_NUM);\n\
    \    // Bool matched = False;\n    for (\n        Integer idx = 0;\n        idx\
    \ <= valueOf(DATA_BUS_BYTE_WIDTH);\n        idx = idx + step\n    ) begin\n  \
    \      if (rightAlignedByteEn == (fromInteger(1) << idx) - 1) begin\n        \
    \    byteEnBitNum = tagged Valid fromInteger(idx);\n            // matched = True;\n\
    \        end\n    end\n    // $display(\"matched=%b, rightAlignedByteEn=%h\",\
    \ matched, rightAlignedByteEn);\n    return byteEnBitNum;\nendfunction"
