    \           (isZero(lenHighPart) && (len[9 : 0] == pktLen[9 : 0]));\n        end\n\
    \        IBV_MTU_1024: begin\n            // 10 = log2(1024)\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 11)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1 : 11];\n\
    \            (isZero(lenHighPart) && (len[10 : 0] == pktLen[10 : 0]));\n     \
    \   end\n        IBV_MTU_2048: begin\n            // 11 = log2(2048)\n       \
    \     Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 12)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 12];\n            (isZero(lenHighPart) && (len[11 : 0] == pktLen[11 : 0]));\n\
    \        end\n        IBV_MTU_4096: begin\n            // 12 = log2(4096)\n  \
    \          Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 13)) lenHighPart = truncateLSB(len);\
    \ // [valueOf(RDMA_MAX_LEN_WIDTH)-1 : 13];\n            (isZero(lenHighPart) &&\
