      \ = pendingWR.wr.laddr;\n                    readRespPktNum        = 1;\n                end\n                4'b0100: begin // isFirstRdmaOpCode(bth.opcode)\n                    nextReadRespWriteAddr\
      \ = addrAddPsnMultiplyPMTU(pendingWR.wr.laddr, oneAsPSN, cntrlStatus.comm.getPMTU);\n                    readRespPktNum        = readRespPktNumReg + 1;\n                end\n                4'b0010:\
      \ begin // isMiddleRdmaOpCode(bth.opcode)\n                    nextReadRespWriteAddr = addrAddPsnMultiplyPMTU(nextReadRespWriteAddrReg, oneAsPSN, cntrlStatus.comm.getPMTU);\n                    readRespPktNum\
      \        = readRespPktNumReg + 1;\n                end\n                4'b0001: begin // isLastRdmaOpCode(bth.opcode)\n                    // No need to calculate next DMA write address for last\
