- name: psnInRangeExclusive
  return_type: Bool
  args: PSN psn, PSN psnStart, PSN psnEnd
  bsv_equivalent: "function Bool psnInRangeExclusive(PSN psn, PSN psnStart, PSN psnEnd);\n\
    \    let result = False;\n    let psnGtStart = psnStart < psn;\n    let psnLtEnd\
    \ = psn < psnEnd;\n\n    if (msb(psnStart) == msb(psnEnd)) begin\n        // PSN\
    \ range no wrap around\n        result = psnGtStart && psnLtEnd;\n    end\n  \
    \  else begin\n        // PSN range has wrap around max PSN\n        result =\
    \ (psnGtStart && msb(psnStart) == msb(psn)) ||\n            (psnLtEnd && msb(psn)\
    \ == msb(psnEnd));\n    end\n    return result;\nendfunction"
