  bsv_equivalent: "function Maybe#(ImmDt) genImmDt(WorkReq wr);\n    return case (wr.opcode)\n\
    \        IBV_WR_RDMA_WRITE_WITH_IMM,\n        IBV_WR_SEND_WITH_IMM      : tagged\
    \ Valid ImmDt {\n            data: unwrapMaybe(wr.immDt)\n        };\n       \
    \ default                   : tagged Invalid;\n    endcase;\nendfunction"
- name: genIETH
