  bsv_equivalent: "function Bool pktLenEqPMTU(PktLen pktLen, PMTU pmtu);\n    let\
    \ tmpPktLen = pktLen;\n    let idx = getPmtuLogValue(pmtu);\n    tmpPktLen[idx]\
