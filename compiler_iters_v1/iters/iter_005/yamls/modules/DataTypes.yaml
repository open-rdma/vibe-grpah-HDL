      typedef Bit#(TAdd#(1, HEADER_MAX_DATA_WIDTH)) HeaderBitNum;\ntypedef Bit#(HEADER_FRAG_NUM_WIDTH)           HeaderFragNum;\n\ntypedef Bit#(DATA_BUS_BIT_NUM_WIDTH)  BusBitWidthMask; // 8\ntypedef Bit#(DATA_BUS_BYTE_NUM_WIDTH)\
