# Iteration 006 - Centralized types.yaml + Bottom-Up compilation
# Direction: "centralized-types-bottom-up"
# Hypothesis: A single shared type registry (types.yaml) + Bottom-Up compilation
# (types first, then leaf modules, then parent modules) produces correct results
# with better reusability and lower YAML overhead.

project:
  name: rdma_engine
  target_language: bsv

knowledge:
  bsv:
    imports:
      - Reserved
    templates:
      typedef_numeric: "typedef {value} {name};"
      typedef_bit: "typedef Bit#({width}) {name};"
      typedef_enum: "typedef enum {{ {variants} }} {name} deriving({deriving});"
      typedef_struct: "typedef struct {{ {fields} }} {name} deriving({deriving});"

# Centralized type registry - all types shared across the project
types:
  # --- Settings.bsv types ---
  - id: TARGET_CYCLE_NS
    kind: numeric
    value: 2
    description: "Target clock cycle period in ns"

  - id: DATA_BUS_WIDTH
    kind: numeric
    value: 256
    description: "RDMA data bus width in bits (power of 2)"

  - id: MAX_QP
    kind: numeric
    value: 4
    description: "Maximum Queue Pairs"

  - id: MAX_QP_WR
    kind: numeric
    value: 32
    description: "Maximum Work Requests per QP"

  - id: MAX_SGE
    kind: numeric
    value: 8
    description: "Maximum Scatter/Gather Elements"

  - id: MAX_CQ
    kind: numeric
    value: 8
    description: "Maximum Completion Queues"

  - id: MAX_CQE
    kind: alias
    value: MAX_QP_WR
    description: "Maximum CQ Entries"

  - id: MAX_MR
    kind: numeric
    value: 256
    description: "Maximum Memory Regions"

  - id: MAX_PD
    kind: numeric
    value: 2
    description: "Maximum Protection Domains"

  - id: MAX_QP_RD_ATOM
    kind: expr
    value: "TDiv#(MAX_QP_WR, 2)"
    description: "Max RDMA Read/Atomic per QP"

  - id: MAX_QP_DST_RD_ATOM
    kind: expr
    value: "TDiv#(MAX_QP_WR, 2)"
    description: "Max destination RDMA Read/Atomic"

  - id: MAX_SRQ
    kind: numeric
    value: 0
    description: "Maximum Shared Receive Queues"

  - id: MAX_SRQ_WR
    kind: alias
    value: MAX_QP_WR

  - id: MAX_SRQ_SGE
    kind: alias
    value: MAX_SGE

  - id: MAX_SEND_SGE
    kind: numeric
    value: 1

  - id: MAX_RECV_SGE
    kind: numeric
    value: 1

  - id: MAX_INLINE_DATA
    kind: numeric
    value: 0
    description: "No inline data"

  - id: MAX_PENDING_WORK_COMP_NUM
    kind: expr
    value: "TMul#(2, MAX_QP_WR)"

  - id: MIN_PKT_NUM_IN_RECV_BUF
    kind: numeric
    value: 2

  - id: MAX_MR_SIZE
    kind: expr
    value: "TExp#(31)"
    description: "2GB max MR size"

  - id: PAGE_SIZE_CAP
    kind: expr
    value: "TExp#(21)"
    description: "2MB page size cap"

  # --- Header field width typedefs ---
  - id: ADDR_WIDTH
    kind: numeric
    value: 64
  - id: PSN_WIDTH
    kind: numeric
    value: 24
  - id: QPN_WIDTH
    kind: numeric
    value: 24
  - id: RDMA_MAX_LEN_WIDTH
    kind: numeric
    value: 32
  - id: PKEY_WIDTH
    kind: numeric
    value: 16
  - id: KEY_WIDTH
    kind: numeric
    value: 32
  - id: PAD_WIDTH
    kind: numeric
    value: 2
  - id: AETH_VALUE_WIDTH
    kind: numeric
    value: 5
  - id: MSN_WIDTH
    kind: numeric
    value: 24
  - id: IMM_WIDTH
    kind: numeric
    value: 32

  # --- Bit typedefs ---
  - id: ADDR
    kind: bit_vector
    width: ADDR_WIDTH
  - id: PSN
    kind: bit_vector
    width: PSN_WIDTH
  - id: QPN
    kind: bit_vector
    width: QPN_WIDTH
  - id: Length
    kind: bit_vector
    width: RDMA_MAX_LEN_WIDTH
  - id: PKEY
    kind: bit_vector
    width: PKEY_WIDTH
  - id: RKEY
    kind: bit_vector
    width: KEY_WIDTH
  - id: LKEY
    kind: bit_vector
    width: KEY_WIDTH
  - id: PAD
    kind: bit_vector
    width: PAD_WIDTH
  - id: AethValue
    kind: bit_vector
    width: AETH_VALUE_WIDTH
  - id: MSN
    kind: bit_vector
    width: MSN_WIDTH
  - id: IMM
    kind: bit_vector
    width: IMM_WIDTH
  - id: Long
    kind: bit_vector
    width: 64
  - id: QKEY
    kind: bit_vector
    width: KEY_WIDTH
  - id: WR_ID_WIDTH
    kind: numeric
    value: 64

  # --- PMTU constants ---
  - id: MIN_PMTU
    kind: numeric
    value: 256
  - id: MAX_PMTU
    kind: numeric
    value: 4096

# Enum definitions (centralized)
enums:
  - id: TransType
    width: 3
    variants:
      - { name: TRANS_TYPE_RC, value: "3'h0" }
      - { name: TRANS_TYPE_UC, value: "3'h1" }
      - { name: TRANS_TYPE_RD, value: "3'h2" }
      - { name: TRANS_TYPE_UD, value: "3'h3" }
      - { name: TRANS_TYPE_CNP, value: "3'h4" }
      - { name: TRANS_TYPE_XRC, value: "3'h5" }
    deriving: [Bits, Bounded, Eq, FShow]

  - id: RdmaOpCode
    width: 5
    variants:
      - { name: RC_SEND_FIRST, value: "8'h00" }
      - { name: RC_SEND_MIDDLE, value: "8'h01" }
      - { name: RC_SEND_LAST, value: "8'h02" }
      - { name: RC_SEND_LAST_WITH_IMMEDIATE, value: "8'h03" }
      - { name: RC_SEND_ONLY, value: "8'h04" }
      - { name: RC_SEND_ONLY_WITH_IMMEDIATE, value: "8'h05" }
      - { name: RC_RDMA_WRITE_FIRST, value: "8'h06" }
      - { name: RC_RDMA_WRITE_MIDDLE, value: "8'h07" }
      - { name: RC_RDMA_WRITE_LAST, value: "8'h08" }
      - { name: RC_RDMA_WRITE_LAST_WITH_IMMEDIATE, value: "8'h09" }
      - { name: RC_RDMA_WRITE_ONLY, value: "8'h0a" }
      - { name: RC_RDMA_WRITE_ONLY_WITH_IMMEDIATE, value: "8'h0b" }
      - { name: RC_RDMA_READ_REQUEST, value: "8'h0c" }
      - { name: RC_RDMA_READ_RESPONSE_FIRST, value: "8'h0d" }
      - { name: RC_RDMA_READ_RESPONSE_MIDDLE, value: "8'h0e" }
      - { name: RC_RDMA_READ_RESPONSE_LAST, value: "8'h0f" }
      - { name: RC_RDMA_READ_RESPONSE_ONLY, value: "8'h10" }
      - { name: RC_ACKNOWLEDGE, value: "8'h11" }
      - { name: RC_ATOMIC_ACKNOWLEDGE, value: "8'h12" }
      - { name: RC_COMPARE_SWAP, value: "8'h13" }
      - { name: RC_FETCH_ADD, value: "8'h14" }
      - { name: RC_SEND_LAST_WITH_INVALIDATE, value: "8'h16" }
      - { name: RC_SEND_ONLY_WITH_INVALIDATE, value: "8'h17" }
    deriving: [Bits, Bounded, Eq, FShow]

# Bottom-Up compile order
compile_order:
  - phase: 1
    description: "Generate all type definitions"
    inputs: [types, enums]
    output: "generated/Types.bsv"
  - phase: 2
    description: "Generate Settings module"
    inputs: [types where kind in [numeric, alias, expr]]
    output: "generated/Settings.bsv"
