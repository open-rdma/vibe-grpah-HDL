functions:
- name: checkZeroFields4BTH
  return_type: Bool
  args: BTH bth
  bsv_equivalent: "function Bool checkZeroFields4BTH(BTH bth);\n    let bthRsvdCheck\
    \ =\n        isZero(pack(bth.tver))  &&\n        isZero(pack(bth.fecn))  &&\n\
    \        isZero(pack(bth.becn))  &&\n        isZero(pack(bth.resv6)) &&\n    \
    \    isZero(pack(bth.resv7));\n    return bthRsvdCheck;\nendfunction"
- name: padCntCheckReqHeader
  return_type: Bool
  args: BTH bth
  bsv_equivalent: "function Bool padCntCheckReqHeader(BTH bth);\n    let zeroPadCntCheck\
    \ = isZero(bth.padCnt);\n\n    return case (bth.opcode)\n        SEND_FIRST, SEND_MIDDLE\
    \            : zeroPadCntCheck;\n        SEND_LAST, SEND_ONLY               ,\n\
    \        SEND_LAST_WITH_IMMEDIATE           ,\n        SEND_ONLY_WITH_IMMEDIATE\
    \           ,\n        SEND_LAST_WITH_INVALIDATE          ,\n        SEND_ONLY_WITH_INVALIDATE\
    \          : True;\n\n        RDMA_WRITE_FIRST, RDMA_WRITE_MIDDLE: zeroPadCntCheck;\n\
    \        RDMA_WRITE_LAST, RDMA_WRITE_ONLY   ,\n        RDMA_WRITE_LAST_WITH_IMMEDIATE\
    \     ,\n        RDMA_WRITE_ONLY_WITH_IMMEDIATE     : True;\n\n        RDMA_READ_REQUEST\
    \                  ,\n        COMPARE_SWAP                       ,\n        FETCH_ADD\
    \                          : zeroPadCntCheck;\n\n        default             \
    \               : False;\n    endcase;\nendfunction"
- name: padCntCheckRespHeader
  return_type: Bool
  args: BTH bth, AETH aeth
  bsv_equivalent: "function Bool padCntCheckRespHeader(BTH bth, AETH aeth);\n    let\
    \ zeroPadCntCheck = isZero(bth.padCnt);\n\n    case (bth.opcode)\n        RDMA_READ_RESPONSE_MIDDLE:\
    \ return zeroPadCntCheck;\n        RDMA_READ_RESPONSE_LAST  ,\n        RDMA_READ_RESPONSE_ONLY\
    \  : return aeth.code == AETH_CODE_ACK;\n        RDMA_READ_RESPONSE_FIRST ,\n\
    \        ATOMIC_ACKNOWLEDGE       : return aeth.code == AETH_CODE_ACK && zeroPadCntCheck;\n\
    \        ACKNOWLEDGE              : case (aeth.code)\n            AETH_CODE_ACK,\n\
    \            AETH_CODE_RNR: return zeroPadCntCheck;\n            AETH_CODE_NAK:\
    \ return case (aeth.value)\n                zeroExtend(pack(AETH_NAK_SEQ_ERR)),\n\
    \                zeroExtend(pack(AETH_NAK_INV_REQ)),\n                zeroExtend(pack(AETH_NAK_RMT_ACC)),\n\
    \                zeroExtend(pack(AETH_NAK_RMT_OP)) ,\n                zeroExtend(pack(AETH_NAK_INV_RD))\
    \ : zeroPadCntCheck;\n                default                           : False;\n\
    \            endcase;\n            // AETH_CODE_RSVD\n            default: return\
    \ False;\n        endcase\n        default: return False;\n    endcase\nendfunction"
- name: validateHeader
  return_type: Bool
  args: TransType transType, QKEY qkey, CntrlStatus cntrlStatus, Bool isRespPkt
  bsv_equivalent: "function Bool validateHeader(TransType transType, QKEY qkey, CntrlStatus\
    \ cntrlStatus, Bool isRespPkt);\n    let transTypeMatch = transTypeMatchQpType(transType,\
    \ cntrlStatus.getTypeQP, isRespPkt);\n    let qpStateMatch = cntrlStatus.comm.isERR\
    \ ||\n        (isRespPkt ? cntrlStatus.comm.isRTS : cntrlStatus.comm.isNonErr);\n\
    \    // UD has no responses\n    let qKeyMatch = transType == TRANS_TYPE_UD ?\
    \ qkey == cntrlStatus.comm.getQKEY : True;\n    // TODO: verify RoCEv2 only use\
    \ default PKEY\n    // let pKeyMatch = isDefaultPKEY(cntrlStatus.comm.getPKEY);\n\
    \    return transTypeMatch && qpStateMatch && qKeyMatch;\nendfunction"
