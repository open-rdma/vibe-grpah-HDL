    \        scanStartReg[1]      <= False;\n        scanStopReg[1]       <= False;\n\
    \        preScanRestartReg[1] <= False;\n        scanDoneReg[1]       <= False;\n\
    \n        clearReg[1]          <= False;\n        // $display(\"time=%0t: clear\
