  \ valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH)\
  \ + valueOf(IMM_DT_BYTE_WIDTH);\n        fromInteger(valueOf(XRC_RDMA_WRITE_ONLY))\
  \               : valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH);\n\
  \        fromInteger(valueOf(XRC_RDMA_WRITE_ONLY_WITH_IMMEDIATE)): valueOf(BTH_BYTE_WIDTH)\
  \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH);\n\
  \        fromInteger(valueOf(XRC_RDMA_READ_REQUEST))             : valueOf(BTH_BYTE_WIDTH)\
  \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH) + valueOf(LETH_BYTE_WIDTH);\n\
  \        fromInteger(valueOf(XRC_COMPARE_SWAP))                  : valueOf(BTH_BYTE_WIDTH)\
  \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(ATOMIC_ETH_BYTE_WIDTH);\n        fromInteger(valueOf(XRC_FETCH_ADD))\
  \                     : valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(ATOMIC_ETH_BYTE_WIDTH);\n\
  \        fromInteger(valueOf(XRC_SEND_LAST_WITH_INVALIDATE))     : valueOf(BTH_BYTE_WIDTH)\
  \ + valueOf(XRCETH_BYTE_WIDTH) + valueOf(IETH_BYTE_WIDTH);\n        fromInteger(valueOf(XRC_SEND_ONLY_WITH_INVALIDATE))\
  \     : valueOf(BTH_BYTE_WIDTH) + valueOf(XRCETH_BYTE_WIDTH) + valueOf(IETH_BYTE_WIDTH);\n\
  \n        // UD requests\n        fromInteger(valueOf(UD_SEND_ONLY))           \
  \    : valueOf(BTH_BYTE_WIDTH) + valueOf(DETH_BYTE_WIDTH);\n        fromInteger(valueOf(UD_SEND_ONLY_WITH_IMMEDIATE)):\
  \ valueOf(BTH_BYTE_WIDTH) + valueOf(DETH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH);\n\
  \n        // CNP notification\n        fromInteger(valueOf(ROCE_CNP)): valueOf(BTH_BYTE_WIDTH)\
  \ + valueOf(CNP_PAYLOAD_BYTE_WIDTH);\n        default: 0;\n    endcase;\nendfunction\n\
  */\nfunction Bool rdmaOpCodeHasPayload(RdmaOpCode opcode);\n    return case (opcode)\n\
  \        SEND_FIRST                    ,\n        SEND_MIDDLE                  \
  \ ,\n        SEND_LAST                     ,\n        SEND_ONLY                \
  \     ,\n        SEND_LAST_WITH_IMMEDIATE      ,\n        SEND_ONLY_WITH_IMMEDIATE\
  \      ,\n        SEND_LAST_WITH_INVALIDATE     ,\n        SEND_ONLY_WITH_INVALIDATE\
  \     ,\n\n        RDMA_WRITE_FIRST              ,\n        RDMA_WRITE_MIDDLE  \
  \           ,\n        RDMA_WRITE_LAST               ,\n        RDMA_WRITE_ONLY\
  \               ,\n        RDMA_WRITE_LAST_WITH_IMMEDIATE,\n        RDMA_WRITE_ONLY_WITH_IMMEDIATE,\n\
  \n        RDMA_READ_RESPONSE_FIRST      ,\n        RDMA_READ_RESPONSE_MIDDLE   \
  \  ,\n        RDMA_READ_RESPONSE_LAST       ,\n        RDMA_READ_RESPONSE_ONLY \
  \      : True;\n\n        default                       : False;\n    endcase;\n\
  endfunction\n"
design_knowledge:
  description: 'Defines the RDMA wire protocol headers used in RoCEv2 (RDMA over Converged
    Ethernet v2). Includes the Base Transport Header (BTH), various extended transport
    headers (AETH, RETH, LETH, AtomicEth, etc.), and enumeration types for transport
    types, RDMA opcodes, and AETH acknowledgment/error codes.

    '
enums:
- deriving: Bits, Bounded, Eq, FShow
  description: RDMA transport types (3-bit encoding)
  name: TransType
  variants:
  - TRANS_TYPE_RC  = 3'h0
  - TRANS_TYPE_UC  = 3'h1
  - TRANS_TYPE_RD  = 3'h2
  - TRANS_TYPE_UD  = 3'h3
  - TRANS_TYPE_CNP = 3'h4
  - TRANS_TYPE_XRC = 3'h5
- deriving: Bits, Bounded, Eq, FShow
  description: RDMA operation codes (5-bit encoding)
  name: RdmaOpCode
  variants:
  - SEND_FIRST                     = 5'h00
  - SEND_MIDDLE                    = 5'h01
  - SEND_LAST                      = 5'h02
  - SEND_LAST_WITH_IMMEDIATE       = 5'h03
  - SEND_ONLY                      = 5'h04
  - SEND_ONLY_WITH_IMMEDIATE       = 5'h05
  - RDMA_WRITE_FIRST               = 5'h06
  - RDMA_WRITE_MIDDLE              = 5'h07
  - RDMA_WRITE_LAST                = 5'h08
  - RDMA_WRITE_LAST_WITH_IMMEDIATE = 5'h09
  - RDMA_WRITE_ONLY                = 5'h0a
  - RDMA_WRITE_ONLY_WITH_IMMEDIATE = 5'h0b
  - RDMA_READ_REQUEST              = 5'h0c
  - RDMA_READ_RESPONSE_FIRST       = 5'h0d
  - RDMA_READ_RESPONSE_MIDDLE      = 5'h0e
  - RDMA_READ_RESPONSE_LAST        = 5'h0f
  - RDMA_READ_RESPONSE_ONLY        = 5'h10
  - ACKNOWLEDGE                    = 5'h11
  - ATOMIC_ACKNOWLEDGE             = 5'h12
  - COMPARE_SWAP                   = 5'h13
  - FETCH_ADD                      = 5'h14
  - RESYNC                         = 5'h15
  - SEND_LAST_WITH_INVALIDATE      = 5'h16
  - SEND_ONLY_WITH_INVALIDATE      = 5'h17
- deriving: Bits, Bounded, Eq, FShow
  description: AETH acknowledgment/error code (2 bits)
  name: AethCode
  variants:
  - AETH_CODE_ACK  = 2'b00
  - AETH_CODE_RNR  = 2'b01
  - AETH_CODE_RSVD = 2'b10
  - AETH_CODE_NAK  = 2'b11
- deriving: Bits, Bounded, Eq
  description: AETH acknowledgment credit count value
  name: AethAckValueCreditCnt
  variants:
  - AETH_ACK_VALUE_INVALID_CREDIT_CNT = 5'b11111
- deriving: Bits, Bounded, Eq
  description: AETH NAK error code values (5 bits)
  name: AethNakValue
  variants:
  - AETH_NAK_SEQ_ERR = 5'h0
  - AETH_NAK_INV_REQ = 5'h1
  - AETH_NAK_RMT_ACC = 5'h2
  - AETH_NAK_RMT_OP  = 5'h3
  - AETH_NAK_INV_RD  = 5'h4
functions:
- args: TransType transType, RdmaOpCode rdmaOpCode
  description: 'Calculate the total header length in bytes for a given transport type
    and RDMA opcode combination. Uses a case statement on the concatenation of transport
    type and opcode. Key rules: - SEND_FIRST/MIDDLE/LAST/ONLY: BTH only (12 bytes)
    - SEND with IMMEDIATE: BTH + ImmDt (12 + 4 = 16 bytes) - RDMA_WRITE_FIRST/ONLY:
    BTH + RETH (12 + 16 = 28 bytes) - RDMA_WRITE_MIDDLE/LAST: BTH only (12 bytes)
    - RDMA_WRITE with IMMEDIATE: BTH + RETH + ImmDt (12 + 16 + 4 = 32 bytes) - RDMA_READ_REQUEST:
    BTH + RETH (12 + 16 = 28 bytes) - COMPARE_SWAP/FETCH_ADD: BTH + AtomicEth (12
    + 28 = 40 bytes) - SEND with INVALIDATE: BTH + IETH (12 + 4 = 16 bytes) - READ_RESPONSE_FIRST/LAST/ONLY:
    BTH + AETH (12 + 4 = 16 bytes) - READ_RESPONSE_MIDDLE: BTH only (12 bytes) - ACKNOWLEDGE:
    BTH + AETH (12 + 4 = 16 bytes) - ATOMIC_ACKNOWLEDGE: BTH + AETH + AtomicAckEth
    (12 + 4 + 8 = 24 bytes) - XRC variants: add XRCETH (4 bytes) to corresponding
    RC sizes - UD_SEND_ONLY: BTH + DETH (12 + 8 = 20 bytes) - UD with IMMEDIATE: BTH
    + DETH + ImmDt (12 + 8 + 4 = 24 bytes) - CNP: BTH + PayloadCNP (12 + 16 = 28 bytes)
    Use the corresponding BYTE_WIDTH constants (BTH_BYTE_WIDTH, RETH_BYTE_WIDTH, etc.)
    defined via SizeOf# and TDiv# after each struct. Use fromInteger(valueOf(...))
    to convert opcode constants to Integer for case matching. Use ''{'' pack(transType),
    pack(rdmaOpCode) ''}'' as the case discriminant. default: return 0.

    '
  name: calcHeaderLenByTransTypeAndRdmaOpCode
  return_type: Integer
- args: RdmaOpCode opcode
  description: 'Returns True if the given RDMA opcode carries a data payload. Payload-carrying
    opcodes include: - All SEND variants (SEND_FIRST through SEND_ONLY_WITH_INVALIDATE)
    - All RDMA_WRITE variants (RDMA_WRITE_FIRST through RDMA_WRITE_ONLY_WITH_IMMEDIATE)
    - All RDMA_READ_RESPONSE variants (READ_RESPONSE_FIRST through READ_RESPONSE_ONLY)
    All other opcodes return False (ACKNOWLEDGE, ATOMIC_ACKNOWLEDGE, etc.) Use a case
    statement with the opcode directly; list all True opcodes and default to False.

    '
  name: rdmaOpCodeHasPayload
  return_type: Bool
meta:
  description: RDMA protocol header definitions and utility functions
  name: Headers
module_type: typedef_and_functions
project_context: 'This is part of an RDMA (RoCEv2) hardware engine. The Headers module
  defines all RDMA protocol header structures, opcode enums, transport types, and
  helper functions for calculating header lengths.

  '
structs:
- deriving: Bits, Bounded, FShow
  description: 'Base Transport Header (12 bytes). Contains transport type, opcode,
    packet sequence number, destination QP number, partition key, and flags.

    '
  fields:
  - description: Transport type
    name: trans
    type: TransType
  - description: RDMA operation code
    name: opcode
    type: RdmaOpCode
  - description: Solicited event flag
    name: solicited
    type: Bool
  - description: Migration request (not supported)
    name: migReq
    type: ReservedZero#(1)
  - description: Padding byte count
    name: padCnt
    type: PAD
  - description: Transport header version
    name: tver
    type: ReservedZero#(4)
  - description: Partition key
    name: pkey
    type: PKEY
  - description: Forward ECN (not used in RoCEv2)
    name: fecn
    type: ReservedZero#(1)
  - description: Backward ECN (not used in RoCEv2)
    name: becn
    type: ReservedZero#(1)
  - description: Reserved field (6 bits)
    name: resv6
    type: ReservedZero#(6)
  - description: Destination Queue Pair Number
    name: dqpn
    type: QPN
  - description: Acknowledge request flag
    name: ackReq
    type: Bool
  - description: Reserved field (7 bits)
    name: resv7
    type: ReservedZero#(7)
  - description: Packet Sequence Number
    name: psn
    type: PSN
  name: BTH
- deriving: Bits, Bounded, FShow
  description: 'Acknowledge Extended Transport Header (4 bytes). Used in RDMA responses
    to carry acknowledgment information, credit counts, or NAK error codes.

    '
  fields:
  - description: Reserved
    name: rsvd
    type: ReservedZero#(1)
  - description: ACK/RNR/NAK code
    name: code
    type: AethCode
  - description: ACK credit count or NAK error code
    name: value
    type: AethValue
  - description: Message Sequence Number
    name: msn
    type: MSN
  name: AETH
- deriving: Bits, Bounded, FShow
  description: 'RDMA Extended Transport Header (16 bytes). Used in RDMA WRITE and
    READ requests to specify the remote virtual address, remote key, and data length.

    '
  fields:
  - description: Virtual address on remote node
    name: va
    type: ADDR
  - description: Remote key for access control
    name: rkey
    type: RKEY
  - description: Data length in bytes
    name: dlen
    type: Length
  name: RETH
- deriving: Bits, Bounded, FShow
  description: 'Local Extended Transport Header (16 bytes). Used in RDMA READ requests
    to specify the local virtual address and local key for the response data.

    '
  fields:
  - description: Virtual address on local node
    name: va
    type: ADDR
  - description: Local key for access control
    name: lkey
    type: LKEY
  - description: Data length in bytes
    name: dlen
    type: Length
  name: LETH
- deriving: Bits, Bounded, FShow
  description: 'Atomic Extended Transport Header (28 bytes). Used in atomic operations
    (Compare-and-Swap, Fetch-and-Add) to specify the remote address, key, swap value,
    and compare value.

    '
  fields:
  - description: Virtual address on remote node
    name: va
    type: ADDR
  - description: Remote key
    name: rkey
    type: RKEY
  - description: Swap value (64-bit)
    name: swap
    type: Long
  - description: Compare value (64-bit)
    name: comp
    type: Long
  name: AtomicEth
- deriving: Bits, Bounded, FShow
  description: 'Atomic Acknowledge Extended Transport Header (8 bytes). Carries the
    original value read during an atomic operation.

    '
  fields:
  - description: Original value before atomic operation
    name: orig
    type: Long
  name: AtomicAckEth
- deriving: Bits, Bounded, FShow
  description: 'Immediate Data Extended Transport Header (4 bytes). Carries 32 bits
    of immediate data in RDMA Send with Immediate operations.

    '
  fields:
  - description: Immediate data value
    name: data
    type: IMM
  name: ImmDt
- deriving: Bits, Bounded, FShow
  description: 'Invalidate Extended Transport Header (4 bytes). Used with Send with
    Invalidate to specify the remote key to invalidate.

    '
  fields:
  - description: Remote key to invalidate
    name: rkey
    type: RKEY
  name: IETH
- deriving: Bits, Bounded, FShow
  description: 'Datagram Extended Transport Header (8 bytes). Used in UD (Unreliable
    Datagram) operations to carry the queue key and source QP number.

    '
  fields:
  - description: Queue key
    name: qkey
    type: QKEY
  - description: Reserved
    name: rsvd
    type: ReservedZero#(8)
  - description: Source Queue Pair Number
    name: sqpn
    type: QPN
  name: DETH
- deriving: Bits, Bounded, FShow
  description: 'XRC Extended Transport Header (4 bytes). Used in XRC (eXtended Reliable
    Connected) operations to carry the shared receive queue number.

    '
  fields:
  - description: Reserved
    name: rsvd
    type: ReservedZero#(8)
  - description: Shared Receive Queue Number
    name: srqn
    type: QPN
  name: XRCETH
- deriving: Bits, Bounded, FShow
  description: 'Congestion Notification Packet payload (16 bytes). Contains two reserved
    64-bit fields.

    '
  fields:
  - description: Reserved
    name: rsvd1
    type: ReservedZero#(LONG_WIDTH)
  - description: Reserved
    name: rsvd2
    type: ReservedZero#(LONG_WIDTH)
  name: PayloadCNP
