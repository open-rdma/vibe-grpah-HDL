- name: lenGtEqPMTU
  return_type: Bool
  args: Length len, PMTU pmtu
  bsv_equivalent: "function Bool lenGtEqPMTU(Length len, PMTU pmtu);\n    return case\
    \ (pmtu)\n        IBV_MTU_256 : begin\n            // 8 = log2(256)\n        \
    \    Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 8)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 8];\n            (!isZeroR(lenHighPart)); // truncate len[7 : 0]\n       \
    \ end\n        IBV_MTU_512 : begin\n            // 9 = log2(512)\n           \
    \ Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 9)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 9];\n            (!isZeroR(lenHighPart)); // truncate len[8 : 0]\n       \
    \ end\n        IBV_MTU_1024: begin\n            // 10 = log2(1024)\n         \
    \   Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 10)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 10];\n            (!isZeroR(lenHighPart)); // truncate len[9 : 0]\n      \
    \  end\n        IBV_MTU_2048: begin\n            // 11 = log2(2048)\n        \
    \    Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 11)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 11];\n            (!isZeroR(lenHighPart)); // truncate len[10 : 0]\n     \
    \   end\n        IBV_MTU_4096: begin\n            // 12 = log2(4096)\n       \
    \     Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 12)) lenHighPart = truncateLSB(len); // [valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 12];\n            (!isZeroR(lenHighPart)); // truncate len[11 : 0]\n     \
    \   end\n    endcase;\nendfunction"
- name: lenGtEqPsnMultiplyPMTU
  return_type: Bool
  args: Length len, PSN psn, PMTU pmtu
  bsv_equivalent: "function Bool lenGtEqPsnMultiplyPMTU(Length len, PSN psn, PMTU\
    \ pmtu);\n    return case (pmtu)\n        IBV_MTU_256 : begin\n            //\
    \ 8 = log2(256)\n            (len[valueOf(RDMA_MAX_LEN_WIDTH)-1 : 8] >= psn);\n\
    \        end\n        IBV_MTU_512 : begin\n            // 9 = log2(512)\n    \
    \        (len[valueOf(RDMA_MAX_LEN_WIDTH)-1 : 9] >= psn);\n        end\n     \
    \   IBV_MTU_1024: begin\n            // 10 = log2(1024)\n            (len[valueOf(RDMA_MAX_LEN_WIDTH)-1\
    \ : 10] >= psn);\n        end\n        IBV_MTU_2048: begin\n            // 11\
    \ = log2(2048)\n            (len[valueOf(RDMA_MAX_LEN_WIDTH)-1 : 11] >= psn);\n\
    \        end\n        IBV_MTU_4096: begin\n            // 12 = log2(4096)\n  \
    \          (len[valueOf(RDMA_MAX_LEN_WIDTH)-1 : 12] >= psn);\n        end\n  \
    \  endcase;\nendfunction"
- name: pktLenAddBusByteWidth
  return_type: PktLen
  args: PktLen pktLen
  bsv_equivalent: "function PktLen pktLenAddBusByteWidth(PktLen pktLen);\n    Bit#(DATA_BUS_BYTE_NUM_WIDTH)\
    \ lowerPart = truncate(pktLen);\n    Bit#(TSub#(PKT_LEN_WIDTH, DATA_BUS_BYTE_NUM_WIDTH))\
    \ higherPart = truncateLSB(pktLen);\n    return { (higherPart + 1), lowerPart\
    \ };\nendfunction"
- name: fragLenEqBusByteWidth
  return_type: Bool
  args: ByteEnBitNum fragLen
  bsv_equivalent: "function Bool fragLenEqBusByteWidth(ByteEnBitNum fragLen);\n  \
    \  let tmpFragLen = fragLen;\n    let idx = valueOf(DATA_BUS_BYTE_NUM_WIDTH);\n\
    \    tmpFragLen[idx] = 0;\n    return isZero(tmpFragLen);\nendfunction"
- name: pktLenAddFragLen
  return_type: PktLen
  args: PktLen pktLen, ByteEnBitNum fragLen
  bsv_equivalent: "function PktLen pktLenAddFragLen(PktLen pktLen, ByteEnBitNum fragLen);\n\
    \    Bit#(DATA_BUS_BYTE_NUM_WIDTH) lowerPartFragLen = truncate(fragLen);\n   \
    \ Bit#(TSub#(PKT_LEN_WIDTH, DATA_BUS_BYTE_NUM_WIDTH)) higherPartPktLen = truncateLSB(pktLen);\n\
    \    return fragLenEqBusByteWidth(fragLen) ?\n        pktLenAddBusByteWidth(pktLen)\
    \ :\n        { higherPartPktLen, lowerPartFragLen };\nendfunction"
- name: checkAddrAndLenWithinRange
  return_type: Bool
  args: ADDR laddr, Length dlen, ADDR raddr, Length rlen
  bsv_equivalent: "function Bool checkAddrAndLenWithinRange(ADDR laddr, Length dlen,\
    \ ADDR raddr, Length rlen);\n    // Integer addrMSB        = valueOf(ADDR_WIDTH)\
    \ - 1;\n    // Integer addrMidHighBit = valueOf(ADDR_WIDTH) - valueOf(RDMA_MAX_LEN_WIDTH);\n\
    \    // Integer addrMidLowBit  = valueOf(ADDR_WIDTH) - valueOf(RDMA_MAX_LEN_WIDTH)\
    \ - 1;\n\n    Bit#(TSub#(ADDR_WIDTH, RDMA_MAX_LEN_WIDTH)) lAddrHighPart = truncateLSB(laddr);\
    \ // [addrMSB : addrMidHighBit];\n    Bit#(TSub#(ADDR_WIDTH, RDMA_MAX_LEN_WIDTH))\
    \ rAddrHighPart = truncateLSB(raddr); // [addrMSB : addrMidHighBit];\n    Bit#(TSub#(ADDR_WIDTH,\
    \ RDMA_MAX_LEN_WIDTH)) lAddrLowPart = truncate(laddr); // [addrMidLowBit : 0];\n\
    \    Bit#(TSub#(ADDR_WIDTH, RDMA_MAX_LEN_WIDTH)) rAddrLowPart = truncate(raddr);\
    \ // [addrMidLowBit : 0];\n\n    // 32-bit comparison\n    let addrHighPartEq\
    \ = lAddrHighPart == rAddrHighPart;\n    let addrLowPartMatch = lAddrLowPart >=\
    \ rAddrLowPart;\n\n    // 33-bit addition\n    let lAddrLenSum = { 1'b0, lAddrLowPart\
    \ } + { 1'b0, dlen };\n    let rAddrLenSum = { 1'b0, rAddrLowPart } + { 1'b0,\
    \ rlen };\n\n    // 33-bit comparison\n    let addrLenMatch = rAddrLenSum >= lAddrLenSum;\n\
    \n    return addrHighPartEq && addrLowPartMatch && addrLenMatch;\nendfunction"
