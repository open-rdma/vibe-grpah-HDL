      \ & enum2Flag(flag)));\nendfunction\n\n// BTH related\n\n/*\n111\n110\n101\n100\n011\n010\n001\n000\n*/\nfunction Bool psnInRangeExclusive(PSN psn, PSN psnStart, PSN psnEnd);\n    let result = False;\n\
      \    let psnGtStart = psnStart < psn;\n    let psnLtEnd = psn < psnEnd;\n\n    if (msb(psnStart) == msb(psnEnd)) begin\n        // PSN range no wrap around\n        result = psnGtStart && psnLtEnd;\n\
      \    end\n    else begin\n        // PSN range has wrap around max PSN\n        result = (psnGtStart && msb(psnStart) == msb(psn)) ||\n            (psnLtEnd && msb(psn) == msb(psnEnd));\n    end\n\
      \    return result;\nendfunction\n\nfunction PSN calcOldestValidPsn4RQ(PSN ePSN);\n    // PSN - 2^23\n    return { ~msb(ePSN), removeMSB(ePSN) };\nendfunction\n\nfunction PSN calcPsnDiff(PSN psnA,\
      \ PSN psnB);\n    return truncate({ 1'b1, psnA } - { 1'b0, psnB });\nendfunction\n\nfunction Bool isDefaultPKEY(PKEY pkey);\n    return isAllOnesR(pkey);\nendfunction\n\nfunction IndexMR key2IndexMR(Bit#(nSz)\
