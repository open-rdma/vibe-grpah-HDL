- name: unknown
  bsv_equivalent: "function Bit#(nSz) arbitrateBits(\n    Bit#(nSz) priorityBits,\
    \ Bit#(nSz) requestBits\n); // provisos(Add#(1, anysize, nSz));\n    let maskBits\
    \ = priorityBits - 1;\n    let maskedReqBits = requestBits & ~maskBits;\n    let\
    \ maskedGrantOneHot = maskedReqBits & ~(maskedReqBits - 1);\n    let noMaskedGrantOneHot\
    \ = requestBits & ~(requestBits - 1);\n    return isZero(maskedReqBits) ? noMaskedGrantOneHot\
    \ : maskedGrantOneHot;\nendfunction"
- name: unknown
  bsv_equivalent: "function Bit#(nSz) arbitrateByDoubleBits(\n    Bit#(nSz) priorityBits,\
    \ Bit#(nSz) requestBits\n) provisos(\n    Add#(1, anysizeJ, nSz),\n    Add#(nSz,\
    \ anysizeK, doubleSz),\n    NumAlias#(TMul#(nSz, 2), doubleSz)\n);\n    Bit#(doubleSz)\
    \ doubleMask = zeroExtend(priorityBits - 1);\n    let doubleReq = { requestBits,\
    \ requestBits };\n    let maskedDoubleReq = doubleReq & ~doubleMask;\n    let\
    \ doubleGrantOneHot = maskedDoubleReq & ~(maskedDoubleReq - 1);\n    Bit#(nSz)\
    \ highPart = truncateLSB(doubleGrantOneHot);\n    Bit#(nSz) lowPart = truncate(doubleGrantOneHot);\n\
    \    let grantOneHot = highPart | lowPart;\n    return grantOneHot;\nendfunction"
