      \            // 11 = log2(2048)\n            { (len[valueOf(RDMA_MAX_LEN_WIDTH)-1 : 11] - truncate(psn)), len[10 : 0] };\n        end\n        IBV_MTU_4096: begin\n            // 12 = log2(4096)\n\
      \            { (len[valueOf(RDMA_MAX_LEN_WIDTH)-1 : 12] - truncate(psn)), len[11 : 0] };\n        end\n    endcase;\nendfunction\n\nfunction Length lenAddPsnMultiplyPMTU(Length len, PSN psn, PMTU\
      \ pmtu);\n    return case (pmtu)\n        IBV_MTU_256 : begin\n            // 8 = log2(256)\n            { (len[valueOf(RDMA_MAX_LEN_WIDTH)-1 : 8] + psn), len[7 : 0] };\n        end\n        IBV_MTU_512\
