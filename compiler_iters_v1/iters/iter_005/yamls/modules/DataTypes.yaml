      \ // 6\n\n// typedef Bit#(TLog#(TAdd#(1, MAX_QP_WR)))        PendingReqCnt;\n// typedef Bit#(TLog#(TAdd#(1, MAX_QP_RD_ATOM)))   PendingReadAtomicReqCnt;\n// typedef Bit#(PENDING_READ_ATOMIC_REQ_CNT_WIDTH)\
