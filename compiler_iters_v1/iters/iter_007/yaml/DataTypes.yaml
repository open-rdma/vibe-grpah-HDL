functions:
- name: unknown
  bsv_equivalent: "    function Fmt fshow(HeaderMetaData hmd);\n        return $format(\n\
    \            \"HeaderMetaData { headerLen=%0d, headerFragNum=%0d, lastFragValidByteNum=%0d,\
    \ hasPayload=\",\n            hmd.headerLen, hmd.headerFragNum, hmd.lastFragValidByteNum,\
    \ fshow(hmd.hasPayload), \" }\"\n        );\n    endfunction"
- name: unknown
  bsv_equivalent: "    function Fmt fshow(RdmaPktMetaData rpmd);\n        return $format(\n\
    \            \"RdmaPktMetaData { pktPayloadLen=%0d, pktFragNum=%0d\",\n      \
    \      rpmd.pktPayloadLen, rpmd.pktFragNum,\n            \", pktHeader=\", fshow(rpmd.pktHeader),\n\
    \            \", pktValid=\", fshow(rpmd.pktValid), \" }\"\n        );\n    endfunction"
- name: unknown
  bsv_equivalent: "    function Bool isOneHotOrZero(MemAccessTypeFlag inputVal) =\
    \ 1 >= countOnes(pack(inputVal));\nendinstance\n\ntypedef enum {\n    IBV_MTU_256\
    \  = 1,\n    IBV_MTU_512  = 2,\n    IBV_MTU_1024 = 3,\n    IBV_MTU_2048 = 4,\n\
    \    IBV_MTU_4096 = 5\n} PMTU deriving(Bits, Eq, FShow);\n\ntypedef struct {\n\
    \    PendingReqCnt        maxSendWR;\n    PendingReqCnt        maxRecvWR;\n  \
    \  ScatterGatherElemCnt maxSendSGE;\n    ScatterGatherElemCnt maxRecvSGE;\n  \
    \  InlineDataSize       maxInlineData;\n} QpCapacity deriving(Bits, FShow);\n\n\
    typedef struct {\n    StateQP                       qpState;\n    StateQP    \
    \                   curQpState;\n    PMTU                          pmtu;\n   \
    \ QKEY                          qkey;\n    PSN                           rqPSN;\n\
    \    PSN                           sqPSN;\n    QPN                           dqpn;\n\
    \    FlagsType#(MemAccessTypeFlag) qpAccessFlags;\n    QpCapacity            \
    \        cap;\n    PKEY                          pkeyIndex;\n    Bool        \
    \                  sqDraining;\n    PendingReqCnt                 maxReadAtomic;\n\
    \    PendingReqCnt                 maxDestReadAtomic;\n    RnrTimer          \
    \            minRnrTimer;\n    TimeOutTimer                  timeout;\n    RetryCnt\
    \                      retryCnt;\n    RetryCnt                      rnrRetry;\n\
    \    // PKEY                          alt_pkey_index;\n    // enum ibv_mig_state\
    \            path_mig_state;\n    // struct ibv_ah_attr            ah_attr;\n\
    \    // struct ibv_ah_attr            alt_ah_attr;\n    // uint8_t           \
    \            en_sqd_async_notify;\n    // uint8_t                       port_num;\n\
    \    // uint8_t                       alt_port_num;\n    // uint8_t          \
    \             alt_timeout;\n    // uint32_t                      rate_limit;\n\
    } AttrQP deriving(Bits, FShow);\n\ntypedef struct {\n    TypeQP qpType;\n    Bool\
    \   sqSigAll;\n} QpInitAttr deriving(Bits, FShow);\n\ntypedef enum {\n    IBV_QP_NO_FLAGS\
    \            = 0,       // Not defined in rdma-core\n    IBV_QP_STATE        \
    \       = 1,       // 1 << 0\n    IBV_QP_CUR_STATE           = 2,       // 1 <<\
    \ 1\n    IBV_QP_EN_SQD_ASYNC_NOTIFY = 4,       // 1 << 2\n    IBV_QP_ACCESS_FLAGS\
    \        = 8,       // 1 << 3\n    IBV_QP_PKEY_INDEX          = 16,      // 1\
    \ << 4\n    IBV_QP_PORT                = 32,      // 1 << 5\n    IBV_QP_QKEY \
    \               = 64,      // 1 << 6\n    IBV_QP_AV                  = 128,  \
    \   // 1 << 7\n    IBV_QP_PATH_MTU            = 256,     // 1 << 8\n    IBV_QP_TIMEOUT\
    \             = 512,     // 1 << 9\n    IBV_QP_RETRY_CNT           = 1024,   \
    \ // 1 << 10\n    IBV_QP_RNR_RETRY           = 2048,    // 1 << 11\n    IBV_QP_RQ_PSN\
    \              = 4096,    // 1 << 12\n    IBV_QP_MAX_QP_RD_ATOMIC    = 8192, \
    \   // 1 << 13\n    IBV_QP_ALT_PATH            = 16384,   // 1 << 14\n    IBV_QP_MIN_RNR_TIMER\
    \       = 32768,   // 1 << 15\n    IBV_QP_SQ_PSN              = 65536,   // 1\
    \ << 16\n    IBV_QP_MAX_DEST_RD_ATOMIC  = 131072,  // 1 << 17\n    IBV_QP_PATH_MIG_STATE\
    \      = 262144,  // 1 << 18\n    IBV_QP_CAP                 = 524288,  // 1 <<\
    \ 19\n    IBV_QP_DEST_QPN            = 1048576, // 1 << 20\n    // These bits\
    \ were supported on older kernels, but never exposed from libibverbs\n    // _IBV_QP_SMAC\
    \               = 1 << 21,\n    // _IBV_QP_ALT_SMAC           = 1 << 22,\n   \
    \ // _IBV_QP_VID                = 1 << 23,\n    // _IBV_QP_ALT_VID           \
    \ = 1 << 24,\n    IBV_QP_RATE_LIMIT          = 33554432 // 1 << 25\n} QpAttrMaskFlag\
    \ deriving(Bits, Eq, FShow);\n\ninstance Flags#(QpAttrMaskFlag);\n    function\
    \ Bool isOneHotOrZero(QpAttrMaskFlag inputVal) = 1 >= countOnes(pack(inputVal));\n\
    endinstance\n\n// WorkReq related\n\ntypedef enum {\n    IBV_WR_RDMA_WRITE   \
    \        =  0,\n    IBV_WR_RDMA_WRITE_WITH_IMM  =  1,\n    IBV_WR_SEND       \
    \          =  2,\n    IBV_WR_SEND_WITH_IMM        =  3,\n    IBV_WR_RDMA_READ\
    \            =  4,\n    IBV_WR_ATOMIC_CMP_AND_SWP   =  5,\n    IBV_WR_ATOMIC_FETCH_AND_ADD\
    \ =  6,\n    IBV_WR_LOCAL_INV            =  7,\n    IBV_WR_BIND_MW           \
    \   =  8,\n    IBV_WR_SEND_WITH_INV        =  9,\n    IBV_WR_TSO             \
    \     = 10,\n    IBV_WR_DRIVER1              = 11,\n    IBV_WR_RDMA_READ_RESP\
    \       = 12, // Not defined in rdma-core\n    IBV_WR_FLUSH                = 14,\n\
    \    IBV_WR_ATOMIC_WRITE         = 15\n} WorkReqOpCode deriving(Bits, Eq, FShow);\n\
    \ntypedef enum {\n    IBV_SEND_NO_FLAGS  = 0, // Not defined in rdma-core\n  \
    \  IBV_SEND_FENCE     = 1,\n    IBV_SEND_SIGNALED  = 2,\n    IBV_SEND_SOLICITED\
    \ = 4,\n    IBV_SEND_INLINE    = 8,\n    IBV_SEND_IP_CSUM   = 16\n} WorkReqSendFlag\
    \ deriving(Bits, Eq, FShow);\n\ninstance Flags#(WorkReqSendFlag);\n    function\
    \ Bool isOneHotOrZero(WorkReqSendFlag inputVal) = 1 >= countOnes(pack(inputVal));\n\
    endinstance\n\ntypedef struct {\n    WorkReqID id;\n    WorkReqOpCode opcode;\n\
    \    FlagsType#(WorkReqSendFlag) flags;\n    ADDR raddr;\n    RKEY rkey;\n   \
    \ Length len;\n    ADDR laddr;\n    LKEY lkey;\n    QPN sqpn; // For WR dispatching\n\
    \    Bool solicited; // Relevant only for the Send and RDMA Write with immediate\
    \ data\n    Maybe#(Long) comp;\n    Maybe#(Long) swap;\n    Maybe#(IMM) immDt;\n\
    \    Maybe#(RKEY) rkey2Inv;\n    Maybe#(QPN) srqn; // for XRC\n    Maybe#(QPN)\
    \ dqpn; // for UD\n    Maybe#(QKEY) qkey; // for UD\n} WorkReq deriving(Bits);\n\
    \ninstance FShow#(WorkReq);\n    function Fmt fshow(WorkReq wr);\n        return\
    \ $format(\n            \"WorkReq { ID=%h\", wr.id, \", opcode=\", fshow(wr.opcode),\
    \ \", flags=\", fshow(wr.flags),\n            \", raddr=%h, rkey=%h, len=%0d,\
    \ laddr=%h, lkey=%h, sqpn=%h\",\n            wr.raddr, wr.rkey, wr.len, wr.laddr,\
    \ wr.lkey, wr.sqpn,\n            \", solicited=\", fshow(wr.solicited), \", comp=\"\
    , fshow(wr.comp), \", swap=\", fshow(wr.swap),\n            \", immDt=\", fshow(wr.immDt),\
    \ \", rkey2Inv=\", fshow(wr.rkey2Inv), \", srqn=\", fshow(wr.srqn),\n        \
    \    \", dqpn=\", fshow(wr.dqpn), \", qkey=\", fshow(wr.qkey), \" }\"\n      \
    \  );\n    endfunction"
- name: unknown
  bsv_equivalent: "    function Fmt fshow(PendingWorkReq pwr);\n        let pktNumFmt\
    \ = case (pwr.pktNum) matches\n            tagged Valid .pn: $format(\"tagged\
    \ Valid %0d\", pn);\n            tagged Invalid  : $format(\"tagged Invalid PktNum\"\
    );\n        endcase;\n        return $format(\n            \"PendingWorkReq {\
    \ wr=\", fshow(pwr.wr),\n            \", startPSN=\", fshow(pwr.startPSN), \"\
    , endPSN=\", fshow(pwr.endPSN),\n            \", pktNum=\", pktNumFmt, \", isOnlyReqPkt=\"\
    , fshow(pwr.isOnlyReqPkt), \" }\"\n        );\n    endfunction"
- name: unknown
  bsv_equivalent: "    function Bool isOneHotOrZero(WorkCompFlags inputVal) = 1 >=\
    \ countOnes(pack(inputVal));\nendinstance\n\ntypedef struct {\n    WorkReqID id;\n\
    \    WorkCompOpCode opcode;\n    WorkCompFlags flags; // TODO: support multiple\
    \ flags\n    WorkCompStatus status;\n    Length len;\n    PKEY pkey;\n    QPN\
    \ qpn;\n    // QPN dqpn;\n    // QPN sqpn;\n    Maybe#(IMM) immDt;\n    Maybe#(RKEY)\
    \ rkey2Inv;\n} WorkComp deriving(Bits, FShow);\n\ntypedef enum {\n    WC_REQ_TYPE_FULL_ACK,\n\
    \    WC_REQ_TYPE_PARTIAL_ACK,\n    WC_REQ_TYPE_NO_WC,\n    WC_REQ_TYPE_UNKNOWN\n\
    } WorkCompReqType deriving(Bits, Eq, FShow);\n\ntypedef struct {\n    Maybe#(WorkReqID)\
    \ rrID;\n    Length len;\n    // QPN sqpn;\n    PSN reqPSN;\n    Bool isZeroDmaLen;\n\
    \    WorkCompStatus wcStatus;\n    RdmaOpCode reqOpCode;\n    Maybe#(IMM) immDt;\n\
    \    Maybe#(RKEY) rkey2Inv;\n} WorkCompGenReqRQ deriving(Bits, FShow);\n\ntypedef\
    \ struct {\n    WorkReq wr;\n    Bool wcWaitDmaResp;\n    WorkCompReqType wcReqType;\n\
    \    PSN triggerPSN;\n    WorkCompStatus wcStatus;\n} WorkCompGenReqSQ deriving(Bits,\
    \ FShow);\n\n// Async event related\n\ntypedef enum {\n    IBV_EVENT_CQ_ERR,\n\
    \    IBV_EVENT_QP_FATAL,\n    IBV_EVENT_QP_REQ_ERR,\n    IBV_EVENT_QP_ACCESS_ERR,\n\
    \    IBV_EVENT_COMM_EST,\n    IBV_EVENT_SQ_DRAINED,\n    IBV_EVENT_PATH_MIG,\n\
    \    IBV_EVENT_PATH_MIG_ERR,\n    IBV_EVENT_DEVICE_FATAL,\n    IBV_EVENT_PORT_ACTIVE,\n\
    \    IBV_EVENT_PORT_ERR,\n    IBV_EVENT_LID_CHANGE,\n    IBV_EVENT_PKEY_CHANGE,\n\
    \    IBV_EVENT_SM_CHANGE,\n    IBV_EVENT_SRQ_ERR,\n    IBV_EVENT_SRQ_LIMIT_REACHED,\n\
    \    IBV_EVENT_QP_LAST_WQE_REACHED,\n    IBV_EVENT_CLIENT_REREGISTER,\n    IBV_EVENT_GID_CHANGE,\n\
    \    IBV_EVENT_WQ_FATAL\n} AsyncEventType deriving(Bits, Eq);\n"
