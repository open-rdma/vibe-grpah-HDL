# YAML representation of Settings.bsv
# Iteration 001 - Baseline: direct structural mapping
# Direction: "baseline-handcrafted-yaml"

meta:
  name: Settings
  description: >
    RDMA device attribute constants and configuration parameters.
    Defines all top-level typedefs for data bus width, queue sizes,
    memory region limits, and other hardware configuration constants.

knowledge:
  bsv:
    imports:
      - Reserved

types:
  - id: TARGET_CYCLE_NS
    description: Target clock cycle period in nanoseconds
    bsv_typedef: "typedef 2 TARGET_CYCLE_NS"

  - id: MIN_PKT_NUM_IN_RECV_BUF
    description: Minimum number of packets in receive buffer
    bsv_typedef: "typedef 2 MIN_PKT_NUM_IN_RECV_BUF"

  - id: MAX_PENDING_WORK_COMP_NUM
    description: Maximum pending work completion count, equals 2 * MAX_QP_WR
    bsv_typedef: "typedef TMul#(2, MAX_QP_WR) MAX_PENDING_WORK_COMP_NUM"

  - id: DATA_BUS_WIDTH
    description: RDMA data bus width in bits, must be power of 2
    bsv_typedef: "typedef 256 DATA_BUS_WIDTH"

  - id: MAX_MR_SIZE
    description: Maximum memory region size (2^31 = 2GB)
    bsv_typedef: "typedef TExp#(31) MAX_MR_SIZE"

  - id: PAGE_SIZE_CAP
    description: Page size capability (2^21 = 2MB)
    bsv_typedef: "typedef TExp#(21) PAGE_SIZE_CAP"

  - id: MAX_QP
    description: Maximum number of Queue Pairs
    bsv_typedef: "typedef 4 MAX_QP"

  - id: MAX_QP_WR
    description: Maximum Work Requests per Queue Pair
    bsv_typedef: "typedef 32 MAX_QP_WR"

  - id: MAX_SGE
    description: Maximum Scatter/Gather Elements
    bsv_typedef: "typedef 8 MAX_SGE"

  - id: MAX_CQ
    description: Maximum Completion Queues
    bsv_typedef: "typedef 8 MAX_CQ"

  - id: MAX_CQE
    description: Maximum Completion Queue Entries
    bsv_typedef: "typedef MAX_QP_WR MAX_CQE"

  - id: MAX_MR
    description: Maximum Memory Regions
    bsv_typedef: "typedef 256 MAX_MR"

  - id: MAX_PD
    description: Maximum Protection Domains
    bsv_typedef: "typedef 2 MAX_PD"

  - id: MAX_QP_RD_ATOM
    description: Maximum RDMA Read / Atomic operations per QP
    bsv_typedef: "typedef TDiv#(MAX_QP_WR, 2) MAX_QP_RD_ATOM"

  - id: MAX_QP_DST_RD_ATOM
    description: Maximum destination RDMA Read / Atomic operations per QP
    bsv_typedef: "typedef TDiv#(MAX_QP_WR, 2) MAX_QP_DST_RD_ATOM"

  - id: MAX_SRQ
    description: Maximum Shared Receive Queues
    bsv_typedef: "typedef 0 MAX_SRQ"

  - id: MAX_SRQ_WR
    description: Maximum Work Requests per Shared Receive Queue
    bsv_typedef: "typedef MAX_QP_WR MAX_SRQ_WR"

  - id: MAX_SRQ_SGE
    description: Maximum Scatter/Gather Elements per Shared Receive Queue
    bsv_typedef: "typedef MAX_SGE MAX_SRQ_SGE"

  - id: MAX_SEND_SGE
    description: Maximum Send Scatter/Gather Elements
    bsv_typedef: "typedef 1 MAX_SEND_SGE"

  - id: MAX_RECV_SGE
    description: Maximum Receive Scatter/Gather Elements
    bsv_typedef: "typedef 1 MAX_RECV_SGE"

  - id: MAX_INLINE_DATA
    description: Maximum inline data size, 0 means no inline data
    bsv_typedef: "typedef 0 MAX_INLINE_DATA"
