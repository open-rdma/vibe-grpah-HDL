    \            //     \", firstPktLastFragInvalidBitNum=%0d\", firstPktLastFragInvalidBitNum,\n\
    \            //     // \", sgeFirstPktLastFragValidByteNumReg=%0d\", sgeFirstPktLastFragValidByteNumReg,\n\
    \            //     \", sgeFirstPktLastFragInvalidByteNumReg=%0d\", sgeFirstPktLastFragInvalidByteNumReg,\n\
    \            //     \", sgeFirstPktLastFragInvalidBitNumReg=%0d\", sgeFirstPktLastFragInvalidBitNumReg,\n\
