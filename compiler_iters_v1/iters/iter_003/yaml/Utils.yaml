- name: truncateByPMTU
  return_type: ResiduePMTU
  args: Bit#(nSz
  bsv_equivalent: "function ResiduePMTU truncateByPMTU(Bit#(nSz) bits, PMTU pmtu)\
    \ provisos(\n    Add#(MAX_PMTU_WIDTH, anysizeJ, nSz),\n    Add#(TSub#(MAX_PMTU_WIDTH,\
    \ 1), anysizeK, nSz),\n    Add#(TSub#(MAX_PMTU_WIDTH, 2), anysizeL, nSz),\n  \
    \  Add#(TSub#(MAX_PMTU_WIDTH, 3), anysizeM, nSz),\n    Add#(TSub#(MAX_PMTU_WIDTH,\
    \ 4), anysizeN, nSz)\n);\n    return case (pmtu)\n        IBV_MTU_256 : begin\n\
    \            Bit#(TSub#(MAX_PMTU_WIDTH, 4)) residue = truncate(bits); // [7 :\
    \ 0]\n            zeroExtend(residue);\n        end\n        IBV_MTU_512 : begin\n\
    \            Bit#(TSub#(MAX_PMTU_WIDTH, 3)) residue = truncate(bits); // [8 :\
    \ 0]\n            zeroExtend(residue);\n        end\n        IBV_MTU_1024: begin\n\
    \            Bit#(TSub#(MAX_PMTU_WIDTH, 2)) residue = truncate(bits); // [9 :\
    \ 0]\n            zeroExtend(residue);\n        end\n        IBV_MTU_2048: begin\n\
    \            Bit#(TSub#(MAX_PMTU_WIDTH, 1)) residue = truncate(bits); // [10 :\
    \ 0]\n            zeroExtend(residue);\n        end\n        IBV_MTU_4096: begin\n\
    \            Bit#(MAX_PMTU_WIDTH) residue = truncate(bits); // [11 : 0]\n    \
    \        zeroExtend(residue);\n        end\n    endcase;\nendfunction"
- name: unknown
  bsv_equivalent: "function Tuple2#(PktNum, ResiduePMTU) truncateLenByPMTU(Length\
    \ len, PMTU pmtu);\n    return case (pmtu)\n        IBV_MTU_256 : begin\n    \
    \        Bit#(8) residue = truncate(len); // [7 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 8)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(residue));\n        end\n        IBV_MTU_512 : begin\n          \
    \  Bit#(9) residue = truncate(len); // [8 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 9)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(residue));\n        end\n        IBV_MTU_1024: begin\n          \
    \  Bit#(10) residue = truncate(len); // [9 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 10)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(residue));\n        end\n        IBV_MTU_2048: begin\n          \
    \  Bit#(11) residue = truncate(len); // [10 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 11)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(residue));\n        end\n        IBV_MTU_4096: begin\n          \
    \  Bit#(12) residue = truncate(len); // [11 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 12)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(residue));\n        end\n    endcase;\nendfunction"
- name: unknown
  bsv_equivalent: "function Tuple2#(PSN, PSN) calcNextAndEndPSN(\n    PSN startPSN,\
    \ PktNum pktNum, Bool isOnlyPkt, PMTU pmtu\n);\n    let startPlusOne = startPSN\
    \ + 1;\n    // In case pktNum is zero\n    PSN nextPSN = isOnlyPkt ? startPlusOne\
    \ : truncate(zeroExtend(startPSN) + pktNum);\n    PSN endPSN = isOnlyPkt ? startPSN\
    \ : (nextPSN - 1);\n    return tuple2(nextPSN, endPSN);\nendfunction"
