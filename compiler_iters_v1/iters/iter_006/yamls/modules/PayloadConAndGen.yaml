      \ <- mkCReg(2, False);\n\n    rule issueReq if (!cancelReg[1] && stateReg != DMA_WRITE_CNTRL_WAIT_RESP);\n        let dmaReq = dmaReqQ.first;\n        dmaReqQ.deq;\n\n        dmaWriteSrv.request.put(dmaReq);\n\
