meta:
  name: "datastream2header"
  description: "Converts a DataStream pipe (DataStreamPipeOut) plus a HeaderMetaData pipe into a HeaderRDMA pipe (PipeOut#(HeaderRDMA)). Reverse of mkHeader2DataStream."
ports:
  - name: "dataPipeIn"
    direction: "input"
    category: "data"
    type: "DataStreamPipeOut"
  - name: "headerMetaDataPipeIn"
    direction: "input"
    category: "data"
    type: "PipeOut_HeaderMetaData"
  - name: "headerPipeOut"
    direction: "output"
    category: "data"
    type: "PipeOut_HeaderRDMA"
