# Iteration 004 - Hybrid: Structural YAML + Algorithmic Hints
# Direction: "structural-plus-hints"
# Hypothesis: Pure structural YAML (iter_003) works for data-flow modules,
# but algorithmic modules need minimal behavioral hints.
# Target: mkBinaryPipeOutArbiter (2-input round-robin)

meta:
  name: BinaryArbiter
  description: >
    Two-input round-robin arbiter for PipeOut interfaces.
    Selects one of two input pipes when a new arbitration round starts.
    Maintains priority state to ensure fairness: the port NOT granted
    last time gets priority next time. When only one port has data,
    it's selected unconditionally.

knowledge:
  bsv:
    imports:
      - FIFOF
      - Vector
      - GetPut
    provisos:
      - Bits#(anytype, tSz)

ports:
  - { name: pipeIn1, direction: input, type: "PipeOut#(anytype)", description: "First input pipe" }
  - { name: pipeIn2, direction: input, type: "PipeOut#(anytype)", description: "Second input pipe" }
  - { name: pipeOut, direction: output, type: "PipeOut#(anytype)", description: "Arbitrated output pipe" }

behavior:
  algorithm:
    description: >
      Round-robin arbitration between two PipeOut inputs.
      - Maintains a priority flag (True = pipeIn2 has priority)
      - When arbitration needed: grant to priority port if it has data,
        else grant to other port. Update priority to favor the non-granted port.
      - When pipelining (isPipePayloadFinished=False): maintain current grant,
        continue dequeueing from the same port until payload finished.
      - Push selected data to output FIFO.

  rules:
    - name: doArbitrate
      description: >
        Fire every cycle. If needArbitration is true (new round):
        determine grant using priority + availability, flip priority.
        Dequeue from selected input and enqueue to output FIFO.
        Update needArbitration based on isPipePayloadFinished.

nodes:
  - id: input_vec
    ref: "Vector#(2, PipeOut#(anytype))"
    description: "Two input pipes wrapped in a vector"

  - id: pipe_out_q
    ref: "FIFOF#(anytype)"
    description: "Output queue for arbitrated data"

  - id: need_arbitration
    ref: "Reg#(Bool)"
    description: "True when a new arbitration decision is needed"
    init: True

  - id: priority
    ref: "Reg#(Bool)"
    description: "True = pipeIn2 has higher priority in next round"
    init: False

  - id: grant
    ref: "Reg#(Bool)"
    description: "Current grant: False = pipeIn1, True = pipeIn2"
    init: False

interface:
  type: "PipeOut#(anytype)"
  methods:
    - { name: first, type: anytype, description: "Return first element from output FIFO" }
    - { name: deq, type: Action, description: "Dequeue from output FIFO" }
    - { name: notEmpty, type: Bool, description: "True if output FIFO has data" }
