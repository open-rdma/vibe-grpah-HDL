# Iteration 005 - Two-Phase: Phase 1 Types
# Direction: "two-phase-compiler"
# This file describes all type definitions for Headers module

meta:
  name: HeadersTypes
  description: "RDMA protocol header type definitions"

knowledge:
  bsv:
    imports: [Reserved]
    typedefs:
      - { id: ADDR_WIDTH, value: 64 }
      - { id: LONG_WIDTH, value: 64 }
      - { id: PSN_WIDTH, value: 24 }
      - { id: QPN_WIDTH, value: 24 }
      - { id: RDMA_MAX_LEN_WIDTH, value: 32 }
      - { id: WR_ID_WIDTH, value: 64 }
      - { id: PAD_WIDTH, value: 2 }
      - { id: PKEY_WIDTH, value: 16 }
      - { id: AETH_VALUE_WIDTH, value: 5 }
      - { id: MSN_WIDTH, value: 24 }
      - { id: KEY_WIDTH, value: 32 }
      - { id: IMM_WIDTH, value: 32 }
    bit_typedefs:
      - { id: ADDR, width: ADDR_WIDTH }
      - { id: Length, width: RDMA_MAX_LEN_WIDTH }
      - { id: Long, width: LONG_WIDTH }
      - { id: QPN, width: QPN_WIDTH }
      - { id: PSN, width: PSN_WIDTH }
      - { id: PAD, width: PAD_WIDTH }
      - { id: PKEY, width: PKEY_WIDTH }
      - { id: AethValue, width: AETH_VALUE_WIDTH }
      - { id: MSN, width: MSN_WIDTH }
      - { id: RKEY, width: KEY_WIDTH }
      - { id: LKEY, width: KEY_WIDTH }
      - { id: QKEY, width: KEY_WIDTH }
      - { id: IMM, width: IMM_WIDTH }
    constants:
      - { id: MIN_PMTU, width: 256 }
      - { id: MAX_PMTU, width: 4096 }

enums:
  - id: TransType
    width: 3
    variants:
      - { name: TRANS_TYPE_RC, value: 0 }
      - { name: TRANS_TYPE_UC, value: 1 }
      - { name: TRANS_TYPE_RD, value: 2 }
      - { name: TRANS_TYPE_UD, value: 3 }
      - { name: TRANS_TYPE_CNP, value: 4 }
      - { name: TRANS_TYPE_XRC, value: 5 }
    deriving: [Bits, Bounded, Eq, FShow]

  - id: RdmaOpCode
    width: 5
    variants:
      - { name: SEND_FIRST, value: "5'h00" }
      - { name: SEND_MIDDLE, value: "5'h01" }
      - { name: SEND_LAST, value: "5'h02" }
      - { name: SEND_LAST_WITH_IMMEDIATE, value: "5'h03" }
      - { name: SEND_ONLY, value: "5'h04" }
      - { name: SEND_ONLY_WITH_IMMEDIATE, value: "5'h05" }
      - { name: RDMA_WRITE_FIRST, value: "5'h06" }
      - { name: RDMA_WRITE_MIDDLE, value: "5'h07" }
      - { name: RDMA_WRITE_LAST, value: "5'h08" }
      - { name: RDMA_WRITE_LAST_WITH_IMMEDIATE, value: "5'h09" }
      - { name: RDMA_WRITE_ONLY, value: "5'h0a" }
      - { name: RDMA_WRITE_ONLY_WITH_IMMEDIATE, value: "5'h0b" }
      - { name: RDMA_READ_REQUEST, value: "5'h0c" }
      - { name: RDMA_READ_RESPONSE_FIRST, value: "5'h0d" }
      - { name: RDMA_READ_RESPONSE_MIDDLE, value: "5'h0e" }
      - { name: RDMA_READ_RESPONSE_LAST, value: "5'h0f" }
      - { name: RDMA_READ_RESPONSE_ONLY, value: "5'h10" }
      - { name: ACKNOWLEDGE, value: "5'h11" }
      - { name: ATOMIC_ACKNOWLEDGE, value: "5'h12" }
      - { name: COMPARE_SWAP, value: "5'h13" }
      - { name: FETCH_ADD, value: "5'h14" }
      - { name: RESYNC, value: "5'h15" }
      - { name: SEND_LAST_WITH_INVALIDATE, value: "5'h16" }
      - { name: SEND_ONLY_WITH_INVALIDATE, value: "5'h17" }
    deriving: [Bits, Bounded, Eq, FShow]

structs:
  - id: BTH
    description: "Base Transport Header (12 bytes)"
    fields:
      - { name: trans, type: TransType }
      - { name: opcode, type: RdmaOpCode }
      - { name: solicited, type: Bool }
      - { name: migReq, type: "ReservedZero#(1)" }
      - { name: padCnt, type: PAD }
      - { name: tver, type: "ReservedZero#(4)" }
      - { name: pkey, type: PKEY }
      - { name: fecn, type: "ReservedZero#(1)" }
      - { name: becn, type: "ReservedZero#(1)" }
      - { name: resv6, type: "ReservedZero#(6)" }
      - { name: dqpn, type: QPN }
      - { name: ackReq, type: Bool }
      - { name: resv7, type: "ReservedZero#(7)" }
      - { name: psn, type: PSN }
    deriving: [Bits, Bounded, FShow]

  - id: AETH
    description: "ACK Extended Transport Header (4 bytes)"
    fields:
      - { name: rsvd, type: "ReservedZero#(1)" }
      - { name: code, type: AethCode }
      - { name: value, type: AethValue }
      - { name: msn, type: MSN }
    deriving: [Bits, Bounded, FShow]

  - id: RETH
    description: "RDMA Extended Transport Header (16 bytes)"
    fields:
      - { name: va, type: ADDR }
      - { name: rkey, type: RKEY }
      - { name: dlen, type: Length }
    deriving: [Bits, Bounded, FShow]
