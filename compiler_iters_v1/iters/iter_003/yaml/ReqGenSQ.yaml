functions:
- name: getMaybeDestQpnSQ
  return_type: Maybe#(QPN)
  args: WorkReq wr, CntrlStatus cntrlStatus
  bsv_equivalent: "function Maybe#(QPN) getMaybeDestQpnSQ(WorkReq wr, CntrlStatus\
    \ cntrlStatus);\n    return case (cntrlStatus.getTypeQP)\n        IBV_QPT_RC \
    \     ,\n        IBV_QPT_UC      ,\n        IBV_QPT_XRC_SEND: tagged Valid cntrlStatus.comm.getDQPN;\n\
    \        IBV_QPT_UD      : wr.dqpn;\n        default         : tagged Invalid;\n\
    \    endcase;\nendfunction"
- name: genFirstOrOnlyReqRdmaOpCode
  return_type: Maybe#(RdmaOpCode)
  args: WorkReqOpCode wrOpCode, Bool isOnlyReqPkt
  bsv_equivalent: "function Maybe#(RdmaOpCode) genFirstOrOnlyReqRdmaOpCode(WorkReqOpCode\
    \ wrOpCode, Bool isOnlyReqPkt);\n    return case (wrOpCode)\n        IBV_WR_RDMA_WRITE\
    \          : tagged Valid (isOnlyReqPkt ? RDMA_WRITE_ONLY                : RDMA_WRITE_FIRST);\n\
    \        IBV_WR_RDMA_WRITE_WITH_IMM : tagged Valid (isOnlyReqPkt ? RDMA_WRITE_ONLY_WITH_IMMEDIATE\
    \ : RDMA_WRITE_FIRST);\n        IBV_WR_SEND                : tagged Valid (isOnlyReqPkt\
    \ ? SEND_ONLY                      : SEND_FIRST);\n        IBV_WR_SEND_WITH_IMM\
    \       : tagged Valid (isOnlyReqPkt ? SEND_ONLY_WITH_IMMEDIATE       : SEND_FIRST);\n\
    \        IBV_WR_SEND_WITH_INV       : tagged Valid (isOnlyReqPkt ? SEND_ONLY_WITH_INVALIDATE\
    \      : SEND_FIRST);\n        IBV_WR_RDMA_READ           : tagged Valid RDMA_READ_REQUEST;\n\
    \        IBV_WR_ATOMIC_CMP_AND_SWP  : tagged Valid COMPARE_SWAP;\n        IBV_WR_ATOMIC_FETCH_AND_ADD:\
    \ tagged Valid FETCH_ADD;\n        default                    : tagged Invalid;\n\
    \    endcase;\nendfunction"
- name: genMiddleOrLastReqRdmaOpCode
  return_type: Maybe#(RdmaOpCode)
  args: WorkReqOpCode wrOpCode, Bool isLastReqPkt
  bsv_equivalent: "function Maybe#(RdmaOpCode) genMiddleOrLastReqRdmaOpCode(WorkReqOpCode\
    \ wrOpCode, Bool isLastReqPkt);\n    return case (wrOpCode)\n        IBV_WR_RDMA_WRITE\
    \         : tagged Valid (isLastReqPkt ? RDMA_WRITE_LAST                : RDMA_WRITE_MIDDLE);\n\
    \        IBV_WR_RDMA_WRITE_WITH_IMM: tagged Valid (isLastReqPkt ? RDMA_WRITE_LAST_WITH_IMMEDIATE\
    \ : RDMA_WRITE_MIDDLE);\n        IBV_WR_SEND               : tagged Valid (isLastReqPkt\
    \ ? SEND_LAST                      : SEND_MIDDLE);\n        IBV_WR_SEND_WITH_IMM\
    \      : tagged Valid (isLastReqPkt ? SEND_LAST_WITH_IMMEDIATE       : SEND_MIDDLE);\n\
    \        IBV_WR_SEND_WITH_INV      : tagged Valid (isLastReqPkt ? SEND_LAST_WITH_INVALIDATE\
    \      : SEND_MIDDLE);\n        default                   : tagged Invalid;\n\
    \    endcase;\nendfunction"
