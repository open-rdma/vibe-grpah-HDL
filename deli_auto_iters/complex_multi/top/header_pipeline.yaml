meta:
  name: "header_pipeline"
  description: "Complete header processing pipeline: 5 modules for segmenting, reassembling, prepending, extracting, and combining header/payload data streams."
  knowledge: |
    # Header Processing Pipeline

    This file contains five modules that form a complete header processing pipeline for RDMA packets.

    ## Common Imports
    FIFOF, GetPut, PAClib, Vector, Controller, DataTypes, Headers, PrimUtils, Settings, Utils.

    ## Common Enum
    ExtractOrPrependHeaderStage: { HEADER_META_DATA_POP, HEADER_OUTPUT, DATA_OUTPUT, EXTRA_LAST_FRAG_OUTPUT } deriving (Bits, Eq, FShow)

    ---

    ## Module 1: mkHeader2DataStream

    Segments a HeaderRDMA pipe into DataStream fragments and HeaderMetaData pipe.

    ### Parameters
    - clearAll (Bool): reset signal
    - headerPipeIn (PipeOut#(HeaderRDMA)): source of headers

    ### Interface
    Returns HeaderDataStreamAndMetaDataPipeOut { headerDataStream, headerMetaData }.

    ### Internal State
    - headerDataStreamOutQ: FIFOF#(DataStream)
    - headerMetaDataOutQ: FIFOF#(HeaderMetaData)
    - rdmaHeaderReg: Reg#(HeaderRDMA), uninitialized
    - headerValidReg: Reg#(Bool), initialized False

    ### Rules
    1. resetAndClear (clearAll): clear all FIFOs, set headerValidReg=False
    2. outputHeader (!clearAll):
      - If !headerValidReg: deq headerPipeIn, enq headerMetaData to headerMetaDataOutQ
      - Extract first DATA_BUS_WIDTH bits from curHeader, shift left for next cycle
      - Compute remainingHeaderLen/remainingHeaderFragNum
      - Create DataStream with isFirst = !headerValidReg, isLast = isEmptyHeader || remainingFragNum==0
      - If isLast: deq headerPipeIn; else: store nextHeaderRDMA in rdmaHeaderReg
      - If !isEmptyHeader: enq dataStream to headerDataStreamOutQ
      - Set headerValidReg = !isLast

    ---

    ## Module 2: mkDataStream2Header

    Reassembles DataStream fragments back into HeaderRDMA. Inverse of mkHeader2DataStream.

    ### Parameters
    - dataPipeIn (DataStreamPipeOut): source of DataStream fragments
    - headerMetaDataPipeIn (PipeOut#(HeaderMetaData)): metadata describing expected header

    ### Interface
    Returns PipeOut#(HeaderRDMA).

    ### Internal State
    - headerOutQ: FIFOF#(HeaderRDMA)
    - rdmaHeaderReg: Reg#(HeaderRDMA), uninitialized
    - headerMetaDataReg: Reg#(HeaderMetaData), uninitialized
    - headerInvalidFragByteNumReg: Reg#(HeaderByteNum), uninitialized
    - headerInvalidFragBitNumReg: Reg#(HeaderBitNum), uninitialized
    - busyReg: Reg#(Bool), initialized False

    ### Rules
    1. popHeaderMetaData (!busyReg):
      - Read headerMetaDataPipeIn. immAssert headerLen non-zero.
      - Compute calcHeaderInvalidFragByteAndBitNum(headerMetaData.headerFragNum) → {byteNum, bitNum}
      - Store metadata & computed values. Set busyReg=True.

    2. accumulate (busyReg):
      - Read one DataStream fragment per cycle
      - isFirst: zeroExtend fragment data/byteEn to header width, copy headerMetaDataReg, set fragNum=1
      - !isFirst: concatenate {rdmaHeader.headerData, frag.data} and truncate, increment fragNum
      - isLast: left-shift by headerInvalidFragBitNumReg/BitNumReg, genByteEn for assertion, enq, busyReg=False
      - !isLast: immAssert byteEn is all ones (isAllOnesR)
      - Always write rdmaHeader back to rdmaHeaderReg

    Return toPipeOut(headerOutQ).

    ---

    ## Module 3: mkPrependHeader2PipeOut

    Prepends header DataStream before payload data stream.

    ### Parameters
    - clearAll (Bool)
    - headerPipeIn (DataStreamPipeOut): header fragments
    - headerMetaDataPipeIn (PipeOut#(HeaderMetaData))
    - dataPipeIn (DataStreamPipeOut): payload fragments

    ### Interface
    Returns DataStreamPipeOut.

    ### Internal State
    - dataStreamOutQ: FIFOF#(DataStream)
    - preDataStreamReg, isFirstReg, headerHasPayloadReg
    - headerFragCntReg, headerLastFragInvalidBitNumReg, headerLastFragInvalidByteNumReg, headerLastFragValidBitNumReg, headerLastFragValidByteNumReg
    - stageReg: Reg#(ExtractOrPrependHeaderStage), initialized HEADER_META_DATA_POP

    ### Rules
    1. resetAndClear (clearAll): clear output FIFO, reset stageReg
    2. popHeaderMetaData (stageReg==HEADER_META_DATA_POP):
      - Read headerMetaData. Use calcFragBitNumAndByteNum(lastFragValidByteNum) → {validBitNum, invalidByteNum, invalidBitNum}
      - Assert headerLen non-zero if !isEmptyHeader
      - Set fragment counters. If isEmptyHeader: skip to DATA_OUTPUT; else: go to HEADER_OUTPUT
    3. outputHeader (stageReg==HEADER_OUTPUT):
      - Read header data fragments from headerPipeIn
      - If isLast: right-shift by invalid bit/byte counts, store in preDataStreamReg, transition to DATA_OUTPUT (or HEADER_META_DATA_POP if no payload)
      - If !isLast: enq fragment to dataStreamOutQ, decrement headerFragCntReg
    4. outputData (stageReg==DATA_OUTPUT):
      - Read payload fragment from dataPipeIn
      - Shift-register combine: {preDataStreamReg.data, curDataStreamFrag.data} >> headerLastFragValidBitNumReg
      - Detect extra last fragment via byteEn check
      - Enq combined fragment to dataStreamOutQ
      - Transition to EXTRA_LAST_FRAG_OUTPUT or HEADER_META_DATA_POP
    5. extraLastFrag (stageReg==EXTRA_LAST_FRAG_OUTPUT):
      - Output remaining shifted data from preDataStreamReg as extra last fragment
      - Return to HEADER_META_DATA_POP

    Return toPipeOut(dataStreamOutQ).

    ---

    ## Module 4: mkExtractHeaderFromDataStreamPipeOut

    Extracts header from combined DataStream into separate header and payload pipes.

    ### Parameters
    - dataPipeIn (DataStreamPipeOut): combined data stream
    - headerMetaDataPipeIn (PipeOut#(HeaderMetaData)): describes header layout

    ### Interface
    Returns HeaderAndPayloadSeperateDataStreamPipeOut { header, payload }.

    ### Internal State
    - headerDataStreamOutQ, payloadDataStreamOutQ: FIFOF#(DataStream)
    - preDataStreamReg, curDataStreamReg, headerMetaDataReg
    - headerLastFragByteEnReg, headerLastFragInvalidBitNumReg, headerLastFragInvalidByteNumReg, headerLastFragValidBitNumReg, headerLastFragValidByteNumReg
    - isFirstDataFragReg, isHeaderLastFragReg, shiftedCurDataFragByteEnReg
    - stageReg: Reg#(ExtractOrPrependHeaderStage), initialized HEADER_META_DATA_POP

    ### Rules
    1. popHeaderMetaData (stageReg==HEADER_META_DATA_POP):
      - Read metadata, assert headerLen non-zero. Compute calcFragBitNumAndByteNum.
      - Decrement headerFragNum in stored meta (for sub-header logic). Store genByteEn result.
      - Read first data fragment from dataPipeIn, compute shifted byteEn for next-fragment detection.
      - Transition to HEADER_OUTPUT.

    2. outputHeader (stageReg==HEADER_OUTPUT):
      - If curDataStreamFrag.isLast (insufficient data): mark as last, enq to header queue
      - If hasDataFragAfterHeader: set up for payload extraction; else: enq empty payload DataStream
      - Else: read next data fragment from dataPipeIn, enq current to header queue
      - Detect header/payload boundary using shiftedCurDataFragByteEnReg

    3. DATA_OUTPUT/EXTRA_LAST_FRAG_OUTPUT: similar shift-register logic as PrependHeader

    ---

    ## Module 5: mkCombineHeaderAndPayload

    Combines header and payload into a single output DataStream.

    ### Parameters
    - headerDataStreamPipeIn (DataStreamPipeOut)
    - payloadDataStreamPipeIn (DataStreamPipeOut)

    ### Interface
    Returns DataStreamPipeOut.

    ### Internal State
    - dataStreamOutQ: FIFOF#(DataStream)
    - curHeaderDataStreamFragReg, isHeaderLastFragReg, isPayloadFirstFragReg

    ### Rules
    1. combine: read from headerPipeIn and/or payloadPipeIn, concatenate as needed
      - Pass through header fragments directly
      - When header ends: start consuming payload, mark first payload frag as isFirst
      - Forward payload fragments as-is

    Return toPipeOut(dataStreamOutQ).

