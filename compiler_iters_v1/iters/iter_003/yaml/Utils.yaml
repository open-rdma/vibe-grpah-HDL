    \ pendingWR=\", $time, fshow(pendingWR)\n        //     \"time=%0t: fill pendingWR.wr.id=%h\"\
    , $time, pendingWR.wr.id\n        // );\n    endrule\nendmodule\n*/\n// WorkComp\
    \ related\n\n// TODO: support multiple WC flags\nfunction Bool containWorkCompFlag(\n\
