meta:
  name: Headers
  description: RDMA protocol header definitions and utility functions

module_type: typedef_and_functions

project_context: >
  This is part of an RDMA (RoCEv2) hardware engine. The Headers module defines
  all RDMA protocol header structures, opcode enums, transport types, and
  helper functions for calculating header lengths.

design_knowledge:
  description: >
    Defines the RDMA wire protocol headers used in RoCEv2 (RDMA over Converged Ethernet v2).
    Includes the Base Transport Header (BTH), various extended transport headers
    (AETH, RETH, LETH, AtomicEth, etc.), and enumeration types for transport types,
    RDMA opcodes, and AETH acknowledgment/error codes.

typedefs:
  - name: ADDR_WIDTH
    description: Address bit width
    value: "64"
  - name: LONG_WIDTH
    description: Long integer bit width
    value: "64"
  - name: PSN_WIDTH
    description: Packet Sequence Number bit width
    value: "24"
  - name: QPN_WIDTH
    description: Queue Pair Number bit width
    value: "24"
  - name: RDMA_MAX_LEN_WIDTH
    description: Maximum RDMA transfer length bit width
    value: "32"
  - name: WR_ID_WIDTH
    description: Work Request ID bit width
    value: "64"
  - name: PAD_WIDTH
    description: Padding count bit width
    value: "2"
  - name: PKEY_WIDTH
    description: Partition Key bit width
    value: "16"
  - name: AETH_VALUE_WIDTH
    description: AETH value field bit width
    value: "5"
  - name: MSN_WIDTH
    description: Message Sequence Number bit width
    value: "24"
  - name: KEY_WIDTH
    description: Key (R_Key/L_Key/Q_Key) bit width
    value: "32"
  - name: IMM_WIDTH
    description: Immediate data bit width
    value: "32"
  - name: MIN_PMTU
    description: Minimum Path MTU in bytes
    value: "256"
  - name: MAX_PMTU
    description: Maximum Path MTU in bytes
    value: "4096"

  # Bit-type aliases
  - name: ADDR
    description: Address type
    value: "Bit#(ADDR_WIDTH)"
  - name: Length
    description: Byte length type for RDMA operations
    value: "Bit#(RDMA_MAX_LEN_WIDTH)"
  - name: Long
