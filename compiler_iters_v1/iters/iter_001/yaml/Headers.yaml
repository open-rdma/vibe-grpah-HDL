  bsv_equivalent: "function Integer calcHeaderLenByTransTypeAndRdmaOpCode(\n    TransType\
    \ transType, RdmaOpCode rdmaOpCode\n);\n    return case ({ pack(transType), pack(rdmaOpCode)\
    \ } )\n        // RC requests\n        fromInteger(valueOf(RC_SEND_FIRST))   \
    \                 : valueOf(BTH_BYTE_WIDTH);\n        fromInteger(valueOf(RC_SEND_MIDDLE))\
    \                   : valueOf(BTH_BYTE_WIDTH);\n        fromInteger(valueOf(RC_SEND_LAST))\
    \                     : valueOf(BTH_BYTE_WIDTH);\n        fromInteger(valueOf(RC_SEND_LAST_WITH_IMMEDIATE))\
    \      : valueOf(BTH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH);\n        fromInteger(valueOf(RC_SEND_ONLY))\
    \                     : valueOf(BTH_BYTE_WIDTH);\n        fromInteger(valueOf(RC_SEND_ONLY_WITH_IMMEDIATE))\
    \      : valueOf(BTH_BYTE_WIDTH) + valueOf(IMM_DT_BYTE_WIDTH);\n        fromInteger(valueOf(RC_RDMA_WRITE_FIRST))\
    \              : valueOf(BTH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH);\n       \
    \ fromInteger(valueOf(RC_RDMA_WRITE_MIDDLE))             : valueOf(BTH_BYTE_WIDTH);\n\
    \        fromInteger(valueOf(RC_RDMA_WRITE_LAST))               : valueOf(BTH_BYTE_WIDTH);\n\
    \        fromInteger(valueOf(RC_RDMA_WRITE_LAST_WITH_IMMEDIATE)): valueOf(BTH_BYTE_WIDTH)\
    \ + valueOf(IMM_DT_BYTE_WIDTH);\n        fromInteger(valueOf(RC_RDMA_WRITE_ONLY))\
    \               : valueOf(BTH_BYTE_WIDTH) + valueOf(RETH_BYTE_WIDTH);\n      \
