    \ pipeIn, FIFOF#(PendingWorkReq) pendingWorkReqBufQ\n)(Empty);\n    rule connect;\n\
    \        let pendingWR = pipeIn.first;\n        pendingWorkReqBufQ.enq(pendingWR);\n\
