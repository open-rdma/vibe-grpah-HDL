    \ = HeaderMetaData {\n        headerLen: headerLen,\n        headerFragNum: headerFragNum,\n\
    \        lastFragValidByteNum: lastFragValidByteNum,\n        hasPayload: hasPayload,\n\
    \        isEmptyHeader : False\n    };\n    return headerMetaData;\nendfunction"
