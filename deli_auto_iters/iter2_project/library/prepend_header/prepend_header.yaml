meta:
  name: "prepend_header"
  description: "Prepends header DataStream fragments before payload DataStream fragments"
  knowledge: |
    # Library Module: mkPrependHeader2PipeOut

    Prepends header data stream fragments before payload data stream fragments at the
    fragment level. The last header fragment and first payload fragment are properly
    merged at the bit/byte level so there are no gaps or overlaps.

    Module signature:
    mkPrependHeader2PipeOut#(Bool clearAll, DataStreamPipeOut headerDataStream, PipeOut#(HeaderMetaData) headerMetaData, DataStreamPipeOut payloadDataStream)

    Returns: DataStreamPipeOut

    Import from ExtractAndPrependPipeOut package.

ports:
  - name: "clearAll"
    direction: "input"
    category: "data"
    type: "Bool"
  - name: "headerDataStream"
    direction: "input"
    category: "data"
    type: "DataStreamPipeOut"
  - name: "headerMetaData"
    direction: "input"
    category: "data"
    type: "PipeOut_HeaderMetaData"
  - name: "payloadDataStream"
    direction: "input"
    category: "data"
    type: "DataStreamPipeOut"
  - name: "dataStreamOut"
    direction: "output"
    category: "data"
    type: "DataStreamPipeOut"
