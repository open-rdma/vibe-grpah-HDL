      , fshow(workReqPsnQ.notFull),\n    //         \", workReqOutQ.notFull=\", fshow(workReqOutQ.notFull),\n    //         \", workReqCheckQ.notFull=\", fshow(workReqCheckQ.notFull),\n    //         \"\
