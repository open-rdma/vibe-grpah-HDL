    \ \" }\"\n        );\n    endfunction"
- name: alignAddrByPMTU
  return_type: ADDR
  args: ADDR addr, PMTU pmtu
  bsv_equivalent: "function ADDR alignAddrByPMTU(ADDR addr, PMTU pmtu);\n    return\
    \ case (pmtu)\n        IBV_MTU_256 : begin\n            // 8 = log2(256)\n   \
    \         { addr[valueOf(ADDR_WIDTH)-1 : 8], 8'b0 };\n        end\n        IBV_MTU_512\
    \ : begin\n            // 9 = log2(512)\n            { addr[valueOf(ADDR_WIDTH)-1\
    \ : 9], 9'b0 };\n        end\n        IBV_MTU_1024: begin\n            // 10 =\
    \ log2(1024)\n            { addr[valueOf(ADDR_WIDTH)-1 : 10], 10'b0 };\n     \
    \   end\n        IBV_MTU_2048: begin\n            // 11 = log2(2048)\n       \
    \     { addr[valueOf(ADDR_WIDTH)-1 : 11], 11'b0 };\n        end\n        IBV_MTU_4096:\
    \ begin\n            // 12 = log2(4096)\n            { addr[valueOf(ADDR_WIDTH)-1\
    \ : 12], 12'b0 };\n        end\n    endcase;\nendfunction"
- name: unknown
  bsv_equivalent: "function Tuple7#(PktLen, PktLen, PktLen, PktLen, PktLen, PktNum,\
    \ ADDR) stepOneCalcPktNumAndPktLenByAddrAndPMTU(\n    ADDR startAddr, Length len,\
    \ PMTU pmtu\n);\n    let pmtuAlignedStartAddr = alignAddrByPMTU(startAddr, pmtu);\n\
    \    let pmtuLen = calcPmtuLen(pmtu);\n\n    Tuple4#(PktLen, PktNum, PktLen, PktLen)\
    \ tmpTuple = case (pmtu)\n        IBV_MTU_256 : begin\n            Bit#(8) addrLowPart\
    \ = truncate(startAddr); // [7 : 0]\n            Bit#(8) lenLowPart = truncate(len);\n\
    \            Bit#(8) pmtuMask = maxBound;\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 8)) truncatedLen = truncateLSB(len);\n            tuple4(zeroExtend(pmtuMask),\
    \ zeroExtend(truncatedLen), zeroExtend(addrLowPart), zeroExtend(lenLowPart));\n\
    \        end\n        IBV_MTU_512 : begin\n            Bit#(9) addrLowPart = truncate(startAddr);\
    \ // [8 : 0]\n            Bit#(9) lenLowPart = truncate(len);\n            Bit#(9)\
    \ pmtuMask = maxBound;\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 9)) truncatedLen\
    \ = truncateLSB(len);\n            tuple4(zeroExtend(pmtuMask), zeroExtend(truncatedLen),\
    \ zeroExtend(addrLowPart), zeroExtend(lenLowPart));\n        end\n        IBV_MTU_1024:\
    \ begin\n            Bit#(10) addrLowPart = truncate(startAddr); // [9 : 0]\n\
    \            Bit#(10) lenLowPart = truncate(len);\n            Bit#(10) pmtuMask\
    \ = maxBound;\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 10)) truncatedLen =\
    \ truncateLSB(len);\n            tuple4(zeroExtend(pmtuMask), zeroExtend(truncatedLen),\
    \ zeroExtend(addrLowPart), zeroExtend(lenLowPart));\n        end\n        IBV_MTU_2048:\
    \ begin\n            Bit#(11) addrLowPart = truncate(startAddr); // [10 : 0]\n\
    \            Bit#(11) lenLowPart = truncate(len);\n            Bit#(11) pmtuMask\
    \ = maxBound;\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 11)) truncatedLen =\
    \ truncateLSB(len);\n            tuple4(zeroExtend(pmtuMask), zeroExtend(truncatedLen),\
    \ zeroExtend(addrLowPart), zeroExtend(lenLowPart));\n        end\n        IBV_MTU_4096:\
    \ begin\n            Bit#(12) addrLowPart = truncate(startAddr); // [11 : 0]\n\
    \            Bit#(12) lenLowPart = truncate(len);\n            Bit#(12) pmtuMask\
    \ = maxBound;\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH, 12)) truncatedLen =\
    \ truncateLSB(len);\n            tuple4(zeroExtend(pmtuMask), zeroExtend(truncatedLen),\
    \ zeroExtend(addrLowPart), zeroExtend(lenLowPart));\n        end\n    endcase;\n\
    \n    let { pmtuMask, truncatedPktNum, addrLowPart, lenLowPart } = tmpTuple;\n\
    \    let maxFirstPktLen = pmtuLen - addrLowPart;\n    let addrAndLenLowPartSum\
    \ = addrLowPart + lenLowPart;\n\n    return tuple7(\n        pmtuMask, addrAndLenLowPartSum,\
    \ pmtuLen, lenLowPart,\n        maxFirstPktLen, truncatedPktNum, pmtuAlignedStartAddr\n\
    \    );\nendfunction"
- name: unknown
  bsv_equivalent: "function Tuple6#(ADDR, PktLen, PktNumAddOn, Bool, Bool, Bool) stepTwoCalcPktNumAndPktLenByAddrAndPMTU(\n\
    \    ADDR pmtuAlignedStartAddr, PMTU pmtu, PktLen pmtuMask,\n    PktLen addrAndLenLowPartSum,\
    \ PktNum truncatedPktNum\n);\n    let oneAsPSN = 1;\n    let secondChunkStartAddr\
    \ = addrAddPsnMultiplyPMTU(pmtuAlignedStartAddr, oneAsPSN, pmtu);\n\n    ResiduePMTU\
    \ residue  = truncateByPMTU(addrAndLenLowPartSum, pmtu);\n    PktLen tmpLastPktLen\
    \ = zeroExtend(residue);\n\n    let pmtuInvMask = ~pmtuMask;\n    let noResidue\
    \   = isZeroR(pmtuMask & addrAndLenLowPartSum);\n    let noExtraPkt  = isZeroR(pmtuInvMask\
    \ & addrAndLenLowPartSum);\n    let hasResidue  = !noResidue;\n    let hasExtraPkt\
    \ = !noExtraPkt;\n    let notFullPkt  = isZeroR(truncatedPktNum);\n    PktNumAddOn\
    \ residuePktNum = zeroExtend(pack(hasResidue));\n    PktNumAddOn extraPktNum \
    \  = zeroExtend(pack(hasExtraPkt));\n\n    let pktNumAddOne = residuePktNum +\
    \ extraPktNum;\n    return tuple6(secondChunkStartAddr, tmpLastPktLen, pktNumAddOne,\
    \ notFullPkt, hasExtraPkt, hasResidue);\nendfunction"
- name: unknown
  bsv_equivalent: "function Tuple3#(PktLen, PktLen, PktNum) stepThreeCalcPktNumAndPktLenByAddrAndPMTU(\n\
    \    PktNum truncatedPktNum, PktNumAddOn pktNumAddOne, PktLen lenLowPart,\n  \
    \  PktLen maxFirstPktLen, PktLen tmpLastPktLen, PktLen pmtuLen,\n    Bool notFullPkt,\
    \ Bool hasExtraPkt, Bool hasResidue\n);\n    let totalPktNum = truncatedPktNum\
    \ + zeroExtend(pktNumAddOne);\n    let firstPktLen = (notFullPkt && !hasExtraPkt)\
    \ ? lenLowPart : maxFirstPktLen;\n    let lastPktLen  = hasResidue ? tmpLastPktLen\
    \ : (notFullPkt ? lenLowPart : pmtuLen);\n    // let lastPktLen  = notFullPkt\
    \ ? (hasExtraPkt ? tmpLastPktLen : lenLowPart) : (hasResidue ? tmpLastPktLen :\
    \ pmtuLen);\n\n    return tuple3(firstPktLen, lastPktLen, totalPktNum);\nendfunction"
- name: unknown
  bsv_equivalent: "function Tuple4#(PktLen, PktLen, PktNum, ADDR) stepTwoCalcPktNumAndPktLenByAddrAndPMTU(\n\
    \    PktLen pmtuMask, PktLen addrAndLenLowPartSum, PktLen pmtuLen, PktLen lenLowPart,\n\
    \    PktLen maxFirstPktLen, PktNum truncatedPktNum, ADDR pmtuAlignedStartAddr,\
    \ PMTU pmtu\n);\n    let oneAsPSN = 1;\n    let secondChunkStartAddr = addrAddPsnMultiplyPMTU(pmtuAlignedStartAddr,\
    \ oneAsPSN, pmtu);\n\n    ResiduePMTU residue  = truncateByPMTU(addrAndLenLowPartSum,\
    \ pmtu);\n    PktLen tmpLastPktLen = zeroExtend(residue);\n\n    let pmtuInvMask\
    \   = ~pmtuMask;\n    let noResidue     = isZeroR(pmtuMask & addrAndLenLowPartSum);\n\
    \    let noExtraPkt    = isZeroR(pmtuInvMask & addrAndLenLowPartSum);\n    let\
    \ hasResidue    = !noResidue;\n    let hasExtraPkt   = !noExtraPkt;\n    let residuePktNum\
    \ = pack(hasResidue);\n    let extraPktNum   = pack(hasExtraPkt);\n    let notFullPkt\
    \    = isZeroR(truncatedPktNum);\n    // let residuePktNum = |(pmtuMask & addrAndLenLowPartSum);\n\
    \    // let extraPktNum = |(pmtuInvMask & addrAndLenLowPartSum);\n    // Bool\
    \ hasResidue = unpack(residuePktNum);\n    // Bool hasExtraPkt = unpack(extraPktNum);\n\
    \n    let totalPktNum = truncatedPktNum + zeroExtend(residuePktNum) + zeroExtend(extraPktNum);\n\
    \    let firstPktLen = (notFullPkt && !hasExtraPkt) ? lenLowPart : maxFirstPktLen;\n\
    \    let lastPktLen  = notFullPkt ? (hasExtraPkt ? tmpLastPktLen : lenLowPart)\
    \ : (hasResidue ? tmpLastPktLen : pmtuLen);\n    // let isSinglePkt = isLessOrEqOneR(totalPktNum);\n\
    \n    return tuple4(firstPktLen, lastPktLen, totalPktNum, secondChunkStartAddr);\n\
    endfunction"
- name: calcFragNumByPktLen
  return_type: PktFragNum
  args: PktLen pktLen
  bsv_equivalent: "function PktFragNum calcFragNumByPktLen(PktLen pktLen) provisos(\n\
    \    Add#(PMTU_FRAG_NUM_WIDTH, DATA_BUS_BYTE_NUM_WIDTH, PKT_LEN_WIDTH)\n);\n \
    \   BusByteWidthMask lastFragByteNumResidue = truncate(pktLen);\n    PktFragNum\
    \ truncatedPktLen = truncateLSB(pktLen);\n    let pktFragNum = truncatedPktLen\
    \ + zeroExtend(pack(!isZeroR(lastFragByteNumResidue)));\n    return pktFragNum;\n\
    endfunction"
- name: unknown
  bsv_equivalent: "function Tuple2#(PktLen, PktNum) calcPktNumAndLastPktLenByPMTU(Length\
    \ len, PMTU pmtu);\n    let pmtuLen = calcPmtuLen(pmtu);\n\n    Tuple2#(PktNum,\
    \ PktLen) tmpTuple = case (pmtu)\n        IBV_MTU_256 : begin\n            Bit#(8)\
    \ lenLowPart = truncate(len); // [7 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 8)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(lenLowPart));\n        end\n        IBV_MTU_512 : begin\n       \
    \     Bit#(9) lenLowPart = truncate(len); // [8 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 9)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(lenLowPart));\n        end\n        IBV_MTU_1024: begin\n       \
    \     Bit#(10) lenLowPart = truncate(len); // [9 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 10)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(lenLowPart));\n        end\n        IBV_MTU_2048: begin\n       \
    \     Bit#(11) lenLowPart = truncate(len); // [10 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 11)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(lenLowPart));\n        end\n        IBV_MTU_4096: begin\n       \
    \     Bit#(12) lenLowPart = truncate(len); // [11 : 0]\n            Bit#(TSub#(RDMA_MAX_LEN_WIDTH,\
    \ 12)) truncatedLen = truncateLSB(len);\n            tuple2(zeroExtend(truncatedLen),\
    \ zeroExtend(lenLowPart));\n        end\n    endcase;\n\n    let { truncatedPktNum,\
    \ residuePktLen } = tmpTuple;\n    let residuePktNum = |residuePktLen;\n    Bool\
    \ hasResidue = unpack(residuePktNum);\n    let noFullPkt = isZeroR(truncatedPktNum);\n\
    \n    let totalPktNum = truncatedPktNum + zeroExtend(residuePktNum);\n    let\
    \ lastPktLen = noFullPkt ? (hasResidue ? residuePktLen : 0) : (hasResidue ? residuePktLen\
    \ : pmtuLen);\n    // let isSinglePkt = isLessOrEqOneR(totalPktNum);\n\n    return\
    \ tuple2(lastPktLen, totalPktNum);\nendfunction"
- name: unknown
  bsv_equivalent: "function DataStream leftShiftAndMergeFragData(\n    DataStream\
    \ preFrag,\n    DataStream curFrag,\n    ShiftByteNum leftShiftByteNum,\n    ShiftBitNum\
    \ leftShiftBitNum\n);\n    let resultFrag    = preFrag;\n    resultFrag.byteEn\
    \ = truncateLSB({ preFrag.byteEn, curFrag.byteEn } << leftShiftByteNum);\n   \
    \ resultFrag.data   = truncateLSB({ preFrag.data,   curFrag.data   } << leftShiftBitNum);\n\
    \    return resultFrag;\nendfunction"
- name: unknown
  bsv_equivalent: "function DataStream leftShiftMergeFragData(\n    DataStream preFrag,\n\
    \    DataStream curFrag,\n    ByteEnBitNum preFragInvalidByteNum,\n    BusBitNum\
    \ preFragInvalidBitNum\n);\n    let resultFrag    = preFrag;\n    resultFrag.byteEn\
    \ = truncateLSB({ preFrag.byteEn, curFrag.byteEn } << preFragInvalidByteNum);\n\
    \    resultFrag.data   = truncateLSB({ preFrag.data,   curFrag.data   } << preFragInvalidBitNum);\n\
    \    return resultFrag;\nendfunction"
