meta:
  name: "arbiter_tree"
  description: "Two-level hierarchical arbiter tree that splits requests into two halves, arbitrates each half independently, then arbitrates between the two winners."
  knowledge: |
    # mkArbiterTree

    ## Purpose
    Hierarchical arbiter that handles wide request vectors by splitting them into
    two halves, arbitrating each half with independent round-robin arbiters, then
    selecting between the two winners at the top level.

    ## Internal Architecture
    - Splits the input request vector into lower and upper halves
    - Each half goes to a dedicated mkRoundRobinArbiter
    - The winners compete at a top-level mkRoundRobinArbiter (2-port)
    - The combined grant is assembled from which half won and the internal grant position

    ## Arbitration Flow
    1. Split reqVec: leftReq = truncate(reqVec), rightReq = truncateLSB(reqVec)
    2. leftGrant = left_arb_inst.grant(leftReq)
    3. rightGrant = right_arb_inst.grant(rightReq)
    4. Build top-level request: topReq[0] = (leftGrant != 0), topReq[1] = (rightGrant != 0)
    5. topGrant = top_arb_inst.grant(topReq)
    6. If topGrant[0] == 1: combinedGrant = zeroExtend(leftGrant)
    7. If topGrant[1] == 1: combinedGrant = {rightGrant, 0}  (rightGrant in upper half, zeros in lower)

provisos:
  - "NumAlias#(TLog#(reqNum), logReqNum)"
  - "Add#(TLog#(TDiv#(reqNum, 2)), 1, TLog#(TAdd#(1, TDiv#(reqNum, 2))))"
  - "Add#(TDiv#(reqNum, 2), TDiv#(reqNum, 2), reqNum)"   # two halves form the whole
  - "Add#(1, _, TDiv#(reqNum, 2))"                        # half must be >= 1

ports:
  - name: "reqVec"
    direction: "input"
    category: "data"
    type: "Bit#(reqNum)"
    description: "Full request vector"

  - name: "grantVec"
    direction: "output"
    category: "data"
    type: "Bit#(reqNum)"
    description: "Final one-hot grant across all requestors"

signals:
  - name: "leftReq"
    type: "Bit#(TDiv#(reqNum, 2))"
    description: "Lower half of request vector"

  - name: "rightReq"
    type: "Bit#(TDiv#(reqNum, 2))"
    description: "Upper half of request vector"

  - name: "leftGrant"
    type: "Bit#(TDiv#(reqNum, 2))"
    description: "Grant result from left arbiter"

  - name: "rightGrant"
    type: "Bit#(TDiv#(reqNum, 2))"
    description: "Grant result from right arbiter"

  - name: "topReq"
    type: "Bit#(2)"
    description: "2-bit request for top arbiter: bit0=left_has_winner, bit1=right_has_winner"

  - name: "topGrant"
    type: "Bit#(2)"
    description: "Top arbiter's decision: which half wins"

methods:
  - name: "arbitrate"
    arguments:
      - name: "reqVec"
        type: "Bit#(reqNum)"
    returns: "ActionValue#(Bit#(reqNum))"
    maps_to_port: "grantVec"
    description: "Arbitrate among all requestors using tree structure"

nodes:
  - id: "left_arb_inst"
    ref: "library/round_robin_arbiter/round_robin_arbiter.yaml"
    description: "Round-robin arbiter for the lower half of request bits"
    parameters:
      reqNum: "TDiv#(reqNum, 2)"

  - id: "right_arb_inst"
    ref: "library/round_robin_arbiter/round_robin_arbiter.yaml"
    description: "Round-robin arbiter for the upper half of request bits"
    parameters:
      reqNum: "TDiv#(reqNum, 2)"

  - id: "top_arb_inst"
    ref: "library/round_robin_arbiter/round_robin_arbiter.yaml"
    description: "Top-level 2-port round-robin arbiter choosing between left and right winners"
    parameters:
      reqNum: "2"

connections:
  - from: { node: "graph_input", port: "reqVec" }
    transform: "truncate(reqVec)"
    to: [{ signal: "leftReq" }]
    description: "Extract lower half of request vector"

  - from: { node: "graph_input", port: "reqVec" }
    transform: "truncateLSB(reqVec)"
    to: [{ signal: "rightReq" }]
    description: "Extract upper half of request vector"

  - from: { signal: "leftReq" }
    to: [{ node: "left_arb_inst", port: "reqVec" }]
    description: "Lower half → left arbiter"

  - from: { signal: "rightReq" }
    to: [{ node: "right_arb_inst", port: "reqVec" }]
    description: "Upper half → right arbiter"

  - from: { node: "left_arb_inst", port: "grantVec" }
    to: [{ signal: "leftGrant" }]
    description: "Left arbiter's grant result"

  - from: { node: "right_arb_inst", port: "grantVec" }
    to: [{ signal: "rightGrant" }]
    description: "Right arbiter's grant result"

  - from: { signal: "leftGrant" }
    transform: "(leftGrant != 0) ? 1 : 0 → topReq[0]"
    to: [{ signal: "topReq" }]
    description: "Left has winner → topReq bit 0"

  - from: { signal: "rightGrant" }
    transform: "(rightGrant != 0) ? 1 : 0 → topReq[1]"
    to: [{ signal: "topReq" }]
    description: "Right has winner → topReq bit 1"

  - from: { signal: "topReq" }
    to: [{ node: "top_arb_inst", port: "reqVec" }]
    description: "2-bit top request → top arbiter"

  - from: { node: "top_arb_inst", port: "grantVec" }
    to: [{ signal: "topGrant" }]
    description: "Top arbiter's decision"

  - from: { signal: "topGrant" }
    transform: |
      topGrant[0] == 1 → combinedGrant = zeroExtend(leftGrant)
      topGrant[1] == 1 → combinedGrant = {rightGrant, 0}
    to: [{ node: "graph_output", port: "grantVec" }]
    description: "Assemble final grant from winning half"
