      /*\n    rule debug;\n        $display(\n            \"time=%0t: mkPipeOutMux debug\", $time,\n            \", sel=\", fshow(sel),\n            \", pipeIn1.notEmpty=\", fshow(pipeIn1.notEmpty),\n \
