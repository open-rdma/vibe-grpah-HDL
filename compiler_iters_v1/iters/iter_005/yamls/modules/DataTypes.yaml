      \    IBV_WC_TM_RNDV_INCOMPLETE = 23\n} WorkCompStatus deriving(Bits, Eq, FShow);\n\ntypedef enum {\n    IBV_WC_NO_FLAGS      =  0, // Not defined in rdma-core\n    IBV_WC_GRH           =  1,\n   \
