    \    function Bool isAlmostEmpty() = isOne(itemCnt);\n\n    (* no_implicit_conditions,\
    \ fire_when_enabled *)\n    rule clearAll if (clearReg[1]);\n        scanOutQ.clear;\n\
    \n        enqPtrReg     <= 0;\n        deqPtrReg     <= 0;\n        itemCnt  \
