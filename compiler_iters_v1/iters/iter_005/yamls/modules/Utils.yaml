      \ isZero(tmpPktLen);\nendfunction\n\nfunction Bool pktLenGtPMTU(PktLen pktLen, PMTU pmtu);\n    return case (pmtu)\n        IBV_MTU_256 : begin\n            // 8 = log2(256)\n            (pktLen[8]\
      \ == 1 && !isZero(pktLen[7: 0]));\n        end\n        IBV_MTU_512 : begin\n            // 9 = log2(512)\n            (pktLen[9] == 1 && !isZero(pktLen[8: 0]));\n        end\n        IBV_MTU_1024:\
