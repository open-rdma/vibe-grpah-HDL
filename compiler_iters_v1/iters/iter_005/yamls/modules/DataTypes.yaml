      , pktNum=\", pktNumFmt, \", isOnlyReqPkt=\", fshow(pwr.isOnlyReqPkt), \" }\"\n        );\n    endfunction\nendinstance\n\ntypedef struct {\n    WorkReqID id;\n    Length len;\n    ADDR laddr;\n  \
