      \        // );\n    endrule\n\n    interface srvPort = toGPServer(reqQ, respQ);\n    method Bool isIdle() = !busyReg && !reqQ.notEmpty && !respQ.notEmpty;\nendmodule\n\ntypedef struct {\n    DmaReadMetaData\
