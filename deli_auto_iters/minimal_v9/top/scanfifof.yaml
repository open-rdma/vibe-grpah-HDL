meta:
  name: "scanfifof"
  description: "FIFO with scan/search capability that supports push, pop, and scan modes"
  knowledge: |
    # mkScanFIFOF
    FIFO that supports normal push/pop AND scan mode to search contents without removing.
    Uses circular buffer with enqPtr/deqPtr and scanPtr.
    Three states: FIFOF_MODE, PRE_SCAN_MODE, SCAN_MODE (defined by ScanState enum).
    Scan output goes to scanOutQ.
ports:
  - name: "scanfifo_ifc"
    direction: "output"
    category: "data"
    type: "ScanFIFOF_T"
