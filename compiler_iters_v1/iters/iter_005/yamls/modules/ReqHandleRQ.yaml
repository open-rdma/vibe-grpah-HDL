      \n        let bth = reqPktInfo.bth;\n\n        let isSendReq       = reqPktInfo.isSendReq;\n        let isWriteReq      = reqPktInfo.isWriteReq;\n        let isReadReq       = reqPktInfo.isReadReq;\n\
