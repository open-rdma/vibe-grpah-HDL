meta:
  name: "countcf"
  description: "Counter with increment/decrement FIFO queues plus write capability"
  knowledge: |
    # mkCountCF
    Counter that counts up/down with increment and decrement FIFO inputs.
    Write operation overrides count value and clears pending incr/decr.
    Uses CReg for concurrent rule access.
ports:
  - name: "count_ifc"
    direction: "output"
    category: "data"
    type: "CountCF_T"
