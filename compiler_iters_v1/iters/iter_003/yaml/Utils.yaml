- name: pktLenGtPMTU
  return_type: Bool
  args: PktLen pktLen, PMTU pmtu
  bsv_equivalent: "function Bool pktLenGtPMTU(PktLen pktLen, PMTU pmtu);\n    return\
    \ case (pmtu)\n        IBV_MTU_256 : begin\n            // 8 = log2(256)\n   \
    \         (pktLen[8] == 1 && !isZero(pktLen[7: 0]));\n        end\n        IBV_MTU_512\
    \ : begin\n            // 9 = log2(512)\n            (pktLen[9] == 1 && !isZero(pktLen[8:\
    \ 0]));\n        end\n        IBV_MTU_1024: begin\n            // 10 = log2(1024)\n\
    \            (pktLen[10] == 1 && !isZero(pktLen[9: 0]));\n        end\n      \
    \  IBV_MTU_2048: begin\n            // 11 = log2(2048)\n            (pktLen[11]\
    \ == 1 && !isZero(pktLen[10: 0]));\n        end\n        IBV_MTU_4096: begin\n\
    \            // 12 = log2(4096)\n            (pktLen[12] == 1 && !isZero(pktLen[11:\
