  bsv_equivalent: "function Maybe#(RETH) genRETH(WorkReq wr);\n    return case (wr.opcode)\n\
    \        IBV_WR_RDMA_WRITE         ,\n        IBV_WR_RDMA_WRITE_WITH_IMM,\n  \
    \      IBV_WR_RDMA_READ          : tagged Valid RETH {\n            va: wr.raddr,\n\
    \            rkey: wr.rkey,\n            dlen: wr.len\n        };\n        default\
    \                   : tagged Invalid;\n    endcase;\nendfunction"
- name: genAtomicEth
  return_type: Maybe#(AtomicEth)
  args: WorkReq wr
  bsv_equivalent: "function Maybe#(AtomicEth) genAtomicEth(WorkReq wr);\n    if (wr.swap\
    \ matches tagged Valid .swap &&& wr.comp matches tagged Valid .comp) begin\n \
    \       return case (wr.opcode)\n            IBV_WR_ATOMIC_CMP_AND_SWP  ,\n  \
    \          IBV_WR_ATOMIC_FETCH_AND_ADD: tagged Valid AtomicEth {\n           \
    \     va: wr.raddr,\n                rkey: wr.rkey,\n                swap: swap,\n\
    \                comp: comp\n            };\n            default             \
    \       : tagged Invalid;\n        endcase;\n    end\n    else begin\n       \
    \ return tagged Invalid;\n    end\nendfunction"
- name: genImmDt
